<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Browsers respect the media query and swap the favicon when the
         OS theme flips. Light scheme uses the dark-inked logo (legible
         on white tabs); dark scheme uses the white-inked logo. -->
    <link
      rel="icon"
      type="image/svg+xml"
      href="/booked-logo-light.svg"
      media="(prefers-color-scheme: light)"
    />
    <link
      rel="icon"
      type="image/svg+xml"
      href="/booked-logo-dark.svg"
      media="(prefers-color-scheme: dark)"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Booked</title>
    <script>
      // Apply the theme before React mounts so dark-mode users don't see a
      // white flash. The shared @readysetcloud/ui system selects dark mode
      // via the data-theme attribute; App.tsx seeds AppNav from and writes
      // back to this same 'booked-theme' key ('light' | 'dark' | 'system').
      (function () {
        try {
          var stored = localStorage.getItem('booked-theme');
          var pref =
            stored === 'light' || stored === 'dark' || stored === 'system'
              ? stored
              : 'system';
          var dark =
            pref === 'dark' ||
            (pref === 'system' &&
              window.matchMedia('(prefers-color-scheme: dark)').matches);
          document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
          document.documentElement.style.colorScheme = dark ? 'dark' : 'light';
        } catch (_) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
