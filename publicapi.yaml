openapi: 3.0.0
info:
  title: Booked API
  description: |
    Campaign and Link management for the influencer analytics aggregator.
    Short-code minting is delegated to newsletter-service; this API owns
    the Campaign/Link metadata and orchestrates the mint call.
  version: 1.0.0

x-amazon-apigateway-request-validators:
  Validate All:
    validateRequestParameters: true
    validateRequestBody: true
x-amazon-apigateway-gateway-responses:
  BAD_REQUEST_BODY:
    statusCode: 400
    responseTemplates:
      application/json: '{ "message": "$context.error.validationErrorString" }'

tags:
  - name: Campaigns
  - name: Links

paths:
  /campaigns:
    post:
      summary: Create a campaign
      tags:
        - Campaigns
      security:
        - CognitoUserPoolAuthorizer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCampaignRequest"
      responses:
        201:
          description: Campaign created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Campaign"
        400:
          $ref: "#/components/responses/BadRequest"
        500:
          $ref: "#/components/responses/UnknownError"
      x-amazon-apigateway-request-validator: Validate All
      x-amazon-apigateway-integration:
        uri:
          Fn::Sub: arn:${AWS::Partition}:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${CreateCampaignFunction.Arn}/invocations
        httpMethod: POST
        type: aws_proxy

  /campaigns/{campaignId}:
    parameters:
      - name: campaignId
        in: path
        required: true
        schema:
          type: string
          minLength: 1
          maxLength: 64
    get:
      summary: Get a campaign, its links, its brief, and its draft
      tags:
        - Campaigns
      security:
        - CognitoUserPoolAuthorizer: []
      responses:
        200:
          description: Campaign with its registered links, attached brief, and draft (each if any)
          content:
            application/json:
              schema:
                type: object
                properties:
                  campaign:
                    $ref: "#/components/schemas/Campaign"
                  links:
                    type: array
                    items:
                      $ref: "#/components/schemas/Link"
                  brief:
                    allOf:
                      - $ref: "#/components/schemas/CampaignBrief"
                    nullable: true
                  draft:
                    allOf:
                      - $ref: "#/components/schemas/Draft"
                    nullable: true
        404:
          description: Campaign not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        500:
          $ref: "#/components/responses/UnknownError"
      x-amazon-apigateway-integration:
        uri:
          Fn::Sub: arn:${AWS::Partition}:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${ApiFunction.Arn}/invocations
        httpMethod: POST
        type: aws_proxy
    patch:
      summary: Apply edited fields to a campaign (used when accepting a brief's suggestions)
      tags:
        - Campaigns
      security:
        - CognitoUserPoolAuthorizer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCampaignRequest"
      responses:
        200:
          description: Updated campaign
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Campaign"
        400:
          $ref: "#/components/responses/BadRequest"
        404:
          description: Campaign not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        500:
          $ref: "#/components/responses/UnknownError"
      x-amazon-apigateway-request-validator: Validate All
      x-amazon-apigateway-integration:
        uri:
          Fn::Sub: arn:${AWS::Partition}:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${ApiFunction.Arn}/invocations
        httpMethod: POST
        type: aws_proxy

  /campaigns/{campaignId}/brief:
    parameters:
      - name: campaignId
        in: path
        required: true
        schema:
          type: string
          pattern: '^[0-9A-HJKMNP-TV-Z]{26}$'
    post:
      summary: Attach a brief to the campaign (paste a chat or submit an uploaded PDF)
      description: |
        Summarizes the brief via Bedrock and stores the summary + suggested
        campaign fields under the campaign, replacing any prior brief. For
        PDFs, call POST /campaigns/{campaignId}/brief/upload-url first and PUT
        the file to the returned URL, then call this with source_type=pdf.
      tags:
        - Campaigns
      security:
        - CognitoUserPoolAuthorizer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitBriefRequest"
      responses:
        201:
          description: Brief summarized and attached
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BriefResponse"
        400:
          $ref: "#/components/responses/BadRequest"
        404:
          description: Campaign not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        502:
          description: The model failed to parse the brief
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        500:
          $ref: "#/components/responses/UnknownError"
      x-amazon-apigateway-integration:
        uri:
          Fn::Sub: arn:${AWS::Partition}:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${ApiFunction.Arn}/invocations
        httpMethod: POST
        type: aws_proxy

  /campaigns/{campaignId}/brief/upload-url:
    parameters:
      - name: campaignId
        in: path
        required: true
        schema:
          type: string
          pattern: '^[0-9A-HJKMNP-TV-Z]{26}$'
    post:
      summary: Mint a presigned URL to upload a PDF brief for the campaign
      tags:
        - Campaigns
      security:
        - CognitoUserPoolAuthorizer: []
      responses:
        201:
          description: Presigned PUT URL (valid 15 minutes)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadUrlResponse"
        400:
          $ref: "#/components/responses/BadRequest"
        500:
          $ref: "#/components/responses/UnknownError"
      x-amazon-apigateway-integration:
        uri:
          Fn::Sub: arn:${AWS::Partition}:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${ApiFunction.Arn}/invocations
        httpMethod: POST
        type: aws_proxy

  /campaigns/{campaignId}/draft:
    parameters:
      - name: campaignId
        in: path
        required: true
        schema:
          type: string
          pattern: '^[0-9A-HJKMNP-TV-Z]{26}$'
    get:
      summary: Get the campaign's draft link and its latest review
      tags:
        - Campaigns
      security:
        - CognitoUserPoolAuthorizer: []
      responses:
        200:
          description: The campaign's draft
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Draft"
        404:
          description: No draft attached to the campaign
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        500:
          $ref: "#/components/responses/UnknownError"
      x-amazon-apigateway-integration:
        uri:
          Fn::Sub: arn:${AWS::Partition}:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${ApiFunction.Arn}/invocations
        httpMethod: POST
        type: aws_proxy
    post:
      summary: Store (or replace) the link to the campaign's draft
      description: |
        Saves the link to the working draft for the campaign — almost
        always a Google Doc. Any http(s) URL is accepted; only Google Docs
        links can be auto-reviewed. Saving a new link replaces the prior
        draft and clears any existing review.
      tags:
        - Campaigns
      security:
        - CognitoUserPoolAuthorizer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitDraftRequest"
      responses:
        201:
          description: Draft link stored
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Draft"
        400:
          $ref: "#/components/responses/BadRequest"
        404:
          description: Campaign not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        500:
          $ref: "#/components/responses/UnknownError"
      x-amazon-apigateway-integration:
        uri:
          Fn::Sub: arn:${AWS::Partition}:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${ApiFunction.Arn}/invocations
        httpMethod: POST
        type: aws_proxy

  /campaigns/{campaignId}/draft/review:
    parameters:
      - name: campaignId
        in: path
        required: true
        schema:
          type: string
          pattern: '^[0-9A-HJKMNP-TV-Z]{26}$'
    post:
      summary: Have the AI review the draft against the campaign brief
      description: |
        Pulls the draft's text from Google Docs (the doc must be shared so
        anyone with the link can view) and has Bedrock review it against
        the campaign's brief. The structured feedback is stored on the
        draft and returned. Requires both a saved draft with a Google Docs
        link and an attached brief.
      tags:
        - Campaigns
      security:
        - CognitoUserPoolAuthorizer: []
      responses:
        201:
          description: Draft reviewed; feedback stored and returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Draft"
        400:
          description: |
            No draft/brief attached, the draft isn't a Google Docs link, or
            the doc isn't publicly viewable.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        404:
          description: No draft attached to the campaign
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        502:
          description: The doc fetch or the model call failed
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        500:
          $ref: "#/components/responses/UnknownError"
      x-amazon-apigateway-integration:
        uri:
          Fn::Sub: arn:${AWS::Partition}:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${ApiFunction.Arn}/invocations
        httpMethod: POST
        type: aws_proxy

  /campaigns/{campaignId}/content-posts/{postId}/recommendations:
    parameters:
      - name: campaignId
        in: path
        required: true
        schema:
          type: string
          pattern: '^[0-9A-HJKMNP-TV-Z]{26}$'
      - name: postId
        in: path
        required: true
        schema:
          type: string
    post:
      summary: Recommend where else to cross-post or promote a content post
      description: |
        On-demand AI suggestions for boosting a content post's engagement.
        When generating, the agent makes a best-effort GET of the post's URL
        and feeds the extracted page text to the model (skipped silently when
        the page can't be fetched). It also reads the work item's distribution
        history — the campaign brief, where it's already cross-posted
        (cross-post links and the campaign's other content posts), and what's
        already been said on social — so it avoids channels already used and
        angles already posted. Generation fetches the page and calls Bedrock;
        the resulting set is stored on the post and returned.
      tags:
        - Campaigns
      security:
        - CognitoUserPoolAuthorizer: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                goal:
                  type: string
                  maxLength: 500
                  description: |
                    Optional free-text guidance to steer the model (e.g. the
                    outcome you care about most).
      responses:
        201:
          description: Recommendations generated, stored, and returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EngagementRecommendation"
        400:
          description: Malformed body or an over-long goal
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        404:
          description: Campaign or content post not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        502:
          description: The model call failed (nothing stored; retry re-runs)
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        500:
          $ref: "#/components/responses/UnknownError"
      x-amazon-apigateway-integration:
        uri:
          Fn::Sub: arn:${AWS::Partition}:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${ApiFunction.Arn}/invocations
        httpMethod: POST
        type: aws_proxy
    get:
      summary: Get the most recent recommendation set for a content post
      tags:
        - Campaigns
      security:
        - CognitoUserPoolAuthorizer: []
      responses:
        200:
          description: The most recently generated recommendation set
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EngagementRecommendation"
        404:
          description: No recommendations have been generated for this post yet
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        500:
          $ref: "#/components/responses/UnknownError"
      x-amazon-apigateway-integration:
        uri:
          Fn::Sub: arn:${AWS::Partition}:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${ApiFunction.Arn}/invocations
        httpMethod: POST
        type: aws_proxy

  /campaigns/{campaignId}/analytics:
    parameters:
      - name: campaignId
        in: path
        required: true
        schema:
          type: string
          minLength: 1
          maxLength: 64
    get:
      summary: Roll up click analytics across all links in a campaign
      description: |
        Fans out to newsletter-service's per-code analytics endpoint for
        each Link in the campaign and aggregates client-side. Returns
        total clicks plus breakdowns by role and platform, with the
        per-link details listed.
      tags:
        - Campaigns
      security:
        - CognitoUserPoolAuthorizer: []
      responses:
        200:
          description: Campaign-level click rollup
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CampaignAnalytics"
        404:
          description: Campaign not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        502:
          description: All upstream analytics calls failed
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        500:
          $ref: "#/components/responses/UnknownError"
      x-amazon-apigateway-integration:
        uri:
          Fn::Sub: arn:${AWS::Partition}:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${GetCampaignAnalyticsFunction.Arn}/invocations
        httpMethod: POST
        type: aws_proxy

  /campaigns/{campaignId}/web-analytics:
    parameters:
      - name: campaignId
        in: path
        required: true
        schema:
          type: string
          minLength: 1
          maxLength: 64
    get:
      summary: GA4 traffic and Core Web Vitals for a campaign's blog post
      description: |
        Pulls Google Analytics 4 traffic and Core Web Vitals for the
        campaign's `blog_url`. GA4 is filtered by the URL's path; Core Web
        Vitals use the full URL (real-user CrUX data, falling back to a
        PageSpeed Insights lab run when CrUX has no data). Each source is
        fetched independently — a failure or missing configuration in one
        is reported inline on that section rather than failing the call.
        Requires the GA4 and CrUX credentials to be configured via
        PUT /profile.
      tags:
        - Campaigns
      security:
        - CognitoUserPoolAuthorizer: []
      parameters:
        - name: startDate
          in: query
          description: ISO 8601 date (inclusive). Defaults to 28 days ago.
          schema:
            type: string
            format: date
        - name: endDate
          in: query
          description: ISO 8601 date (inclusive). Defaults to today.
          schema:
            type: string
            format: date
      responses:
        200:
          description: Web analytics for the campaign's blog post
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebAnalytics"
        400:
          description: Campaign has no blog_url, or invalid date range
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        404:
          description: Campaign not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        500:
          $ref: "#/components/responses/UnknownError"
      x-amazon-apigateway-integration:
        uri:
          Fn::Sub: arn:${AWS::Partition}:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${GetWebAnalyticsFunction.Arn}/invocations
        httpMethod: POST
        type: aws_proxy

  /campaigns/{campaignId}/links:
    parameters:
      - name: campaignId
        in: path
        required: true
        schema:
          type: string
          minLength: 1
          maxLength: 64
        description: The campaign's identifier
    post:
      summary: Register a link in a campaign
      description: |
        Mints a short code via newsletter-service and saves the Link
        metadata under this campaign. The destination URL becomes
        reachable at the returned `short_url` and clicks accrue under
        the campaign for sponsor reporting.
      tags:
        - Links
      security:
        - CognitoUserPoolAuthorizer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateLinkRequest"
      responses:
        201:
          description: Link registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Link"
        400:
          $ref: "#/components/responses/BadRequest"
        404:
          description: Campaign not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        502:
          description: Upstream mint service returned an error
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        500:
          $ref: "#/components/responses/UnknownError"
      x-amazon-apigateway-request-validator: Validate All
      x-amazon-apigateway-integration:
        uri:
          Fn::Sub: arn:${AWS::Partition}:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${CreateCampaignLinkFunction.Arn}/invocations
        httpMethod: POST
        type: aws_proxy

  /campaigns/{campaignId}/links/{linkId}/analytics:
    parameters:
      - name: campaignId
        in: path
        required: true
        schema:
          type: string
      - name: linkId
        in: path
        required: true
        schema:
          type: string
    get:
      summary: Click analytics for a specific link
      description: |
        Looks up the Link locally to find its short code, then proxies
        to newsletter-service's GET /links/{code}/analytics. Returns
        per-day and per-source breakdowns for that specific tracked
        link.
      tags:
        - Links
      security:
        - CognitoUserPoolAuthorizer: []
      responses:
        200:
          description: Analytics for the link
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LinkAnalytics"
        404:
          description: Link not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        502:
          description: Upstream analytics service failure
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        500:
          $ref: "#/components/responses/UnknownError"
      x-amazon-apigateway-integration:
        uri:
          Fn::Sub: arn:${AWS::Partition}:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${GetCampaignLinkAnalyticsFunction.Arn}/invocations
        httpMethod: POST
        type: aws_proxy

  /vendors:
    post:
      summary: Create a vendor
      tags:
        - Vendors
      security:
        - CognitoUserPoolAuthorizer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateVendorRequest"
      responses:
        201:
          description: Vendor created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vendor"
        400:
          $ref: "#/components/responses/BadRequest"
        500:
          $ref: "#/components/responses/UnknownError"
      x-amazon-apigateway-request-validator: Validate All
      x-amazon-apigateway-integration:
        uri:
          Fn::Sub: arn:${AWS::Partition}:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${CreateVendorFunction.Arn}/invocations
        httpMethod: POST
        type: aws_proxy

    get:
      summary: List vendors
      tags:
        - Vendors
      security:
        - CognitoUserPoolAuthorizer: []
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 100
        - name: startKey
          in: query
          description: Base64-encoded pagination token returned as nextStartKey
          schema:
            type: string
      responses:
        200:
          description: Vendor list (paginated)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VendorList"
        400:
          $ref: "#/components/responses/BadRequest"
        500:
          $ref: "#/components/responses/UnknownError"
      x-amazon-apigateway-integration:
        uri:
          Fn::Sub: arn:${AWS::Partition}:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${ListVendorsFunction.Arn}/invocations
        httpMethod: POST
        type: aws_proxy

  /vendors/{vendorId}:
    parameters:
      - name: vendorId
        in: path
        required: true
        schema:
          type: string
          pattern: '^[0-9A-HJKMNP-TV-Z]{26}$'
    get:
      summary: Get a vendor by id
      tags:
        - Vendors
      security:
        - CognitoUserPoolAuthorizer: []
      responses:
        200:
          description: Vendor record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vendor"
        404:
          description: Vendor not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        500:
          $ref: "#/components/responses/UnknownError"
      x-amazon-apigateway-integration:
        uri:
          Fn::Sub: arn:${AWS::Partition}:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${GetVendorFunction.Arn}/invocations
        httpMethod: POST
        type: aws_proxy

    put:
      summary: Update a vendor (partial update; null values clear optional fields)
      tags:
        - Vendors
      security:
        - CognitoUserPoolAuthorizer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateVendorRequest"
      responses:
        200:
          description: Updated vendor record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vendor"
        400:
          $ref: "#/components/responses/BadRequest"
        404:
          description: Vendor not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        500:
          $ref: "#/components/responses/UnknownError"
      x-amazon-apigateway-request-validator: Validate All
      x-amazon-apigateway-integration:
        uri:
          Fn::Sub: arn:${AWS::Partition}:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${UpdateVendorFunction.Arn}/invocations
        httpMethod: POST
        type: aws_proxy

    delete:
      summary: Delete a vendor (fails with 409 if linked campaigns exist)
      tags:
        - Vendors
      security:
        - CognitoUserPoolAuthorizer: []
      responses:
        204:
          description: Vendor deleted
        404:
          description: Vendor not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        409:
          description: Vendor has linked campaigns
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        500:
          $ref: "#/components/responses/UnknownError"
      x-amazon-apigateway-integration:
        uri:
          Fn::Sub: arn:${AWS::Partition}:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${DeleteVendorFunction.Arn}/invocations
        httpMethod: POST
        type: aws_proxy

  /vendors/{vendorId}/campaigns:
    parameters:
      - name: vendorId
        in: path
        required: true
        schema:
          type: string
          pattern: '^[0-9A-HJKMNP-TV-Z]{26}$'
    get:
      summary: List campaigns linked to a vendor
      tags:
        - Vendors
      security:
        - CognitoUserPoolAuthorizer: []
      responses:
        200:
          description: Campaigns associated with this vendor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VendorCampaignList"
        404:
          description: Vendor not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        500:
          $ref: "#/components/responses/UnknownError"
      x-amazon-apigateway-integration:
        uri:
          Fn::Sub: arn:${AWS::Partition}:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${ListVendorCampaignsFunction.Arn}/invocations
        httpMethod: POST
        type: aws_proxy

  /campaigns/{campaignId}/payout:
    parameters:
      - name: campaignId
        in: path
        required: true
        schema:
          type: string
          minLength: 1
          maxLength: 64
    patch:
      summary: Update a campaign's payout (partial update; sets paid_at automatically when paid=true)
      tags:
        - Campaigns
      security:
        - CognitoUserPoolAuthorizer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePayoutRequest"
      responses:
        200:
          description: Updated campaign with the new payout
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Campaign"
        400:
          $ref: "#/components/responses/BadRequest"
        404:
          description: Campaign not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        500:
          $ref: "#/components/responses/UnknownError"
      x-amazon-apigateway-request-validator: Validate All
      x-amazon-apigateway-integration:
        uri:
          Fn::Sub: arn:${AWS::Partition}:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${UpdateCampaignPayoutFunction.Arn}/invocations
        httpMethod: POST
        type: aws_proxy

  /revenue:
    get:
      summary: Aggregate campaign payouts (booked vs received, grouped by month/year/vendor)
      tags:
        - Revenue
      security:
        - CognitoUserPoolAuthorizer: []
      parameters:
        - name: year
          in: query
          description: Calendar year. Defaults to current. Mutually exclusive with startDate/endDate.
          schema:
            type: integer
            minimum: 1900
            maximum: 2999
        - name: startDate
          in: query
          description: ISO 8601 date (inclusive). Mutually exclusive with year.
          schema:
            type: string
            format: date
        - name: endDate
          in: query
          description: ISO 8601 date (inclusive). Mutually exclusive with year.
          schema:
            type: string
            format: date
        - name: vendorId
          in: query
          description: ULID. Scope to one vendor.
          schema:
            type: string
            pattern: '^[0-9A-HJKMNP-TV-Z]{26}$'
        - name: grouping
          in: query
          description: How to roll up `groups`. Default `month`.
          schema:
            type: string
            enum: [year, month, vendor]
            default: month
        - name: paidOnly
          in: query
          description: When true, exclude campaigns that haven't been marked paid.
          schema:
            type: boolean
            default: false
      responses:
        200:
          description: Revenue rollup
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RevenueResponse"
        400:
          $ref: "#/components/responses/BadRequest"
        500:
          $ref: "#/components/responses/UnknownError"
      x-amazon-apigateway-integration:
        uri:
          Fn::Sub: arn:${AWS::Partition}:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${GetRevenueFunction.Arn}/invocations
        httpMethod: POST
        type: aws_proxy

  /profile:
    get:
      summary: Read account-level integration settings
      description: |
        Returns whether the Google Analytics 4 and Core Web Vitals
        integrations are configured. Secrets are never returned — only the
        GA4 property id, the service-account email, and per-integration
        `configured` flags.
      tags:
        - Profile
      security:
        - CognitoUserPoolAuthorizer: []
      responses:
        200:
          description: Current integration settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Profile"
        500:
          $ref: "#/components/responses/UnknownError"
      x-amazon-apigateway-integration:
        uri:
          Fn::Sub: arn:${AWS::Partition}:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${GetProfileFunction.Arn}/invocations
        httpMethod: POST
        type: aws_proxy
    put:
      summary: Update account-level integration settings
      description: |
        Stores the Google credentials used by GET /campaigns/{id}/web-analytics.
        The GA4 service account and CrUX API key are written to SSM
        SecureStrings; the GA4 property id is stored in DynamoDB. All fields
        are optional — only those present are applied. The response is the
        same shape as GET /profile and never echoes the secrets back.
      tags:
        - Profile
      security:
        - CognitoUserPoolAuthorizer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProfileRequest"
      responses:
        200:
          description: Updated integration settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Profile"
        400:
          $ref: "#/components/responses/BadRequest"
        500:
          $ref: "#/components/responses/UnknownError"
      x-amazon-apigateway-integration:
        uri:
          Fn::Sub: arn:${AWS::Partition}:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${UpdateProfileFunction.Arn}/invocations
        httpMethod: POST
        type: aws_proxy

components:
  securitySchemes:
    CognitoUserPoolAuthorizer:
      type: apiKey
      in: header
      name: Authorization
      x-amazon-apigateway-authtype: cognito_user_pools
      x-amazon-apigateway-authorizer:
        type: cognito_user_pools
        providerARNs:
          - Fn::Sub: "${CognitoUserPoolArn}"

  schemas:
    CreateCampaignRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 200
          description: Human-readable campaign name
        sponsor:
          type: string
          maxLength: 200
          description: |
            Free-form sponsor name. Legacy field; prefer vendor_id when
            the sponsor exists as a Vendor record. Both may be omitted.
        vendor_id:
          type: string
          pattern: '^[0-9A-HJKMNP-TV-Z]{26}$'
          description: |
            ULID of an existing Vendor. When provided, also writes a
            campaign-by-vendor index entry so GET /vendors/{id}/campaigns
            includes this campaign.
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
        status:
          type: string
          enum: [draft, active, monitoring, completed]
          default: active
        targetMetrics:
          type: object
          description: Free-form sponsor targets, stored as-is
          additionalProperties: true
        payout:
          $ref: "#/components/schemas/Payout"
        blog_url:
          type: string
          format: uri
          maxLength: 2048
          description: |
            Published blog post URL for this campaign. Used as the GA4
            page-path filter and the Core Web Vitals lookup URL on
            GET /campaigns/{campaignId}/web-analytics. Must be an absolute
            http(s) URL.
        link_tracking_id:
          type: string
          pattern: '^[A-Za-z0-9_-]{1,128}$'
          description: |
            Tag passed to the newsletter service as `campaignId` when minting
            short links for this campaign. When set, GET
            /campaigns/{campaignId}/analytics pulls every link tagged with
            this id from the newsletter service in one call instead of
            fanning out per local link.

    Campaign:
      type: object
      required:
        - campaign_id
        - name
        - status
        - created_at
      properties:
        campaign_id:
          type: string
        name:
          type: string
        sponsor:
          type: string
          nullable: true
        vendor_id:
          type: string
          nullable: true
        startDate:
          type: string
          format: date
          nullable: true
        endDate:
          type: string
          format: date
          nullable: true
        status:
          type: string
          enum: [draft, active, monitoring, completed]
        targetMetrics:
          type: object
          nullable: true
        payout:
          allOf:
            - $ref: "#/components/schemas/Payout"
          nullable: true
        blog_url:
          type: string
          format: uri
          nullable: true
          description: Published blog post URL, or null if not set.
        link_tracking_id:
          type: string
          nullable: true
          description: |
            Newsletter-service `campaignId` for grouping this campaign's short
            links. Null if not set.
        created_at:
          type: string
          format: date-time

    Payout:
      type: object
      required:
        - amount
      properties:
        amount:
          type: number
          minimum: 0
          description: Numeric amount in the payout's currency.
        currency:
          type: string
          pattern: '^[A-Z]{3}$'
          default: USD
          description: ISO 4217 alphabetic code. Only USD aggregates in /revenue today.
        paid:
          type: boolean
          default: false
        paid_at:
          type: string
          format: date
          nullable: true
        invoice_ref:
          type: string
          maxLength: 200
          nullable: true

    UpdatePayoutRequest:
      type: object
      description: |
        Partial update of a campaign's payout. Fields not present are left
        unchanged. Setting `paid: true` without a `paid_at` defaults paid_at
        to today's date. Setting `paid: false` without paid_at clears it.
        Only `paid_at` and `invoice_ref` accept explicit `null` (to clear).
      properties:
        amount:
          type: number
          minimum: 0
        currency:
          type: string
          pattern: '^[A-Z]{3}$'
        paid:
          type: boolean
        paid_at:
          type: string
          format: date
          nullable: true
        invoice_ref:
          type: string
          maxLength: 200

    UpdateCampaignRequest:
      type: object
      description: |
        Partial update of a campaign, used when applying a brief's suggested
        fields or re-linking the campaign's vendor. Every property is
        optional; only those present are changed. Setting `vendor_id` links
        (or re-links) the campaign to a vendor record and keeps the
        campaign-by-vendor index in sync; the vendor's name is snapshotted
        into `sponsor` unless a `sponsor` is also supplied. `payout` replaces
        the campaign's payout wholesale.
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 200
        sponsor:
          type: string
          maxLength: 200
        vendor_id:
          type: string
          pattern: '^[a-zA-Z0-9_-]{1,80}$'
          description: |
            Links the campaign to an existing vendor record. Must reference a
            vendor that exists (404 otherwise).
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
        status:
          type: string
          enum: [draft, active, monitoring, completed]
        targetMetrics:
          type: object
          additionalProperties: true
        payout:
          $ref: "#/components/schemas/Payout"
        blog_url:
          type: string
          format: uri
          maxLength: 2048
          description: Published blog post URL. Absolute http(s) URL.
        link_tracking_id:
          type: string
          pattern: '^[A-Za-z0-9_-]{1,128}$'
          description: |
            Newsletter-service `campaignId` for grouping this campaign's short
            links.

    Deliverable:
      type: object
      required:
        - platform
        - type
      properties:
        platform:
          type: string
          description: Lowercase platform handle (instagram, youtube, tiktok, ...)
        type:
          type: string
          description: Lowercase content type (reel, post, video, article, ...)
        count:
          type: integer
          minimum: 1
        notes:
          type: string

    SuggestedCampaign:
      type: object
      description: Structured fields the model extracted from the brief.
      properties:
        name:
          type: string
        vendor:
          type: object
          properties:
            name_hint:
              type: string
        vendor_id:
          type: string
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
        deliverables:
          type: array
          items:
            $ref: "#/components/schemas/Deliverable"
        payout:
          type: object
          properties:
            amount:
              type: number
            currency:
              type: string
        targetMetrics:
          type: object
          additionalProperties: true

    SubmitBriefRequest:
      type: object
      required:
        - source_type
      description: |
        For source_type=chat, supply `conversation`. For source_type=pdf,
        the PDF must already be uploaded via the upload-url flow (keyed by
        campaignId), so no body fields beyond source_type are needed.
      properties:
        source_type:
          type: string
          enum: [chat, pdf]
        conversation:
          type: array
          maxItems: 200
          items:
            type: object
            required:
              - role
              - content
            properties:
              role:
                type: string
                enum: [vendor, influencer, user, assistant]
              content:
                type: string
                minLength: 1
                maxLength: 10000

    BriefResponse:
      type: object
      required:
        - campaign_id
        - source_type
        - summary
        - suggested_campaign
        - warnings
      properties:
        campaign_id:
          type: string
        source_type:
          type: string
          enum: [chat, pdf]
        summary:
          type: string
        suggested_campaign:
          $ref: "#/components/schemas/SuggestedCampaign"
        warnings:
          type: array
          items:
            type: string

    CampaignBrief:
      type: object
      required:
        - source_type
        - summary
        - suggested_campaign
        - warnings
        - created_at
      properties:
        source_type:
          type: string
          enum: [chat, pdf]
        summary:
          type: string
        suggested_campaign:
          $ref: "#/components/schemas/SuggestedCampaign"
        warnings:
          type: array
          items:
            type: string
        raw:
          type: object
          nullable: true
          properties:
            download_url:
              type: string
        created_at:
          type: string
          format: date-time

    UploadUrlResponse:
      type: object
      required:
        - upload_url
        - s3_key
        - expires_at
      properties:
        upload_url:
          type: string
        s3_key:
          type: string
        expires_at:
          type: string
          format: date-time
          nullable: true

    SubmitDraftRequest:
      type: object
      required:
        - url
      properties:
        url:
          type: string
          format: uri
          description: |
            Link to the working draft. Any http(s) URL is accepted, but
            only Google Docs links (docs.google.com/document/d/...) can be
            auto-reviewed.

    DraftReviewIssue:
      type: object
      required:
        - severity
        - detail
      properties:
        severity:
          type: string
          enum: [high, medium, low]
        area:
          type: string
          description: brief-coverage, structure, tone, accuracy, clarity, cta, seo, ...
        detail:
          type: string
        suggestion:
          type: string

    DraftReview:
      type: object
      description: Structured editorial feedback produced by the AI review.
      required:
        - verdict
        - summary
      properties:
        verdict:
          type: string
          enum: [ready, minor_revisions, major_revisions]
        summary:
          type: string
        brief_alignment:
          type: string
        strengths:
          type: array
          items:
            type: string
        issues:
          type: array
          items:
            $ref: "#/components/schemas/DraftReviewIssue"
        missing_requirements:
          type: array
          items:
            type: string

    Draft:
      type: object
      required:
        - url
        - created_at
      properties:
        url:
          type: string
          format: uri
        doc_id:
          type: string
          nullable: true
          description: Google Docs document id, when the link is a Google Doc.
        review:
          allOf:
            - $ref: "#/components/schemas/DraftReview"
          nullable: true
        reviewed_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    EngagementRecommendationItem:
      type: object
      required:
        - channel
        - action
        - priority
        - rationale
        - suggested_message
      properties:
        channel:
          type: string
          description: The platform or venue (e.g. linkedin, reddit r/webdev, hacker news).
        action:
          type: string
          enum: [cross_post, promote]
          description: cross_post republishes the full piece; promote shares a link or teaser.
        priority:
          type: string
          enum: [high, medium, low]
        rationale:
          type: string
        suggested_message:
          type: string
          description: Ready-to-use, channel-tailored copy with a fresh angle.

    EngagementRecommendation:
      type: object
      description: On-demand AI recommendations for where else to push a content post.
      required:
        - campaign_id
        - post_id
        - recommendations
        - generated_at
      properties:
        campaign_id:
          type: string
        post_id:
          type: string
        summary:
          type: string
          nullable: true
        recommendations:
          type: array
          items:
            $ref: "#/components/schemas/EngagementRecommendationItem"
        already_covered:
          type: array
          description: Channels skipped because the piece is already there or already promoted on them.
          items:
            type: string
        generated_at:
          type: string
          format: date-time

    RevenueAggregate:
      type: object
      required:
        - amount
        - campaignCount
      properties:
        amount:
          type: number
        campaignCount:
          type: integer

    RevenueGroup:
      type: object
      required:
        - key
        - amount
        - campaignCount
      properties:
        key:
          type: string
          description: |
            Bucket key. For grouping=month it's YYYY-MM; grouping=year it's
            YYYY; grouping=vendor it's the vendor_id or "unassigned".
        amount:
          type: number
        campaignCount:
          type: integer
        bookedAmount:
          type: number
        bookedCount:
          type: integer
        receivedAmount:
          type: number
        receivedCount:
          type: integer

    RevenueSkipped:
      type: object
      required:
        - campaign_id
        - currency
        - amount
        - reason
      properties:
        campaign_id:
          type: string
        currency:
          type: string
        amount:
          type: number
        reason:
          type: string

    RevenueResponse:
      type: object
      required:
        - currency
        - range
        - total
        - booked
        - received
        - groups
        - skipped
      properties:
        currency:
          type: string
          description: Currency the aggregation is denominated in (USD today).
        range:
          type: object
          properties:
            startDate:
              type: string
              format: date
              nullable: true
            endDate:
              type: string
              format: date
              nullable: true
        total:
          $ref: "#/components/schemas/RevenueAggregate"
        booked:
          $ref: "#/components/schemas/RevenueAggregate"
        received:
          $ref: "#/components/schemas/RevenueAggregate"
        groups:
          type: array
          items:
            $ref: "#/components/schemas/RevenueGroup"
        skipped:
          type: array
          items:
            $ref: "#/components/schemas/RevenueSkipped"

    CreateVendorRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 200
        website:
          type: string
          maxLength: 500
        contact_name:
          type: string
          maxLength: 200
        contact_email:
          type: string
          format: email
          maxLength: 320
        payment_terms:
          type: string
          maxLength: 500
          description: Free-form notes (net 30, etc.). Not validated semantically.
        tags:
          type: array
          maxItems: 20
          items:
            type: string
            minLength: 1
            maxLength: 50
        notes:
          type: string
          maxLength: 2000

    UpdateVendorRequest:
      type: object
      description: |
        Partial update. Only fields present in the body are touched. Explicit
        null clears an optional field (cannot clear `name`).
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 200
        website:
          type: string
          maxLength: 500
          nullable: true
        contact_name:
          type: string
          maxLength: 200
          nullable: true
        contact_email:
          type: string
          format: email
          maxLength: 320
          nullable: true
        payment_terms:
          type: string
          maxLength: 500
          nullable: true
        tags:
          type: array
          maxItems: 20
          nullable: true
          items:
            type: string
            minLength: 1
            maxLength: 50
        notes:
          type: string
          maxLength: 2000
          nullable: true

    Vendor:
      type: object
      required:
        - vendor_id
        - name
        - created_at
        - updated_at
      properties:
        vendor_id:
          type: string
          pattern: '^[0-9A-HJKMNP-TV-Z]{26}$'
        name:
          type: string
        website:
          type: string
          nullable: true
        contact_name:
          type: string
          nullable: true
        contact_email:
          type: string
          nullable: true
        payment_terms:
          type: string
          nullable: true
        tags:
          type: array
          items:
            type: string
        notes:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    VendorList:
      type: object
      required:
        - vendors
      properties:
        vendors:
          type: array
          items:
            $ref: "#/components/schemas/Vendor"
        nextStartKey:
          type: string
          nullable: true
          description: Base64-encoded pagination token. Null when there are no more pages.

    VendorCampaignSummary:
      type: object
      required:
        - campaign_id
        - name
        - status
        - created_at
      properties:
        campaign_id:
          type: string
        name:
          type: string
        status:
          type: string
          enum: [draft, active, monitoring, completed]
        startDate:
          type: string
          format: date
          nullable: true
        endDate:
          type: string
          format: date
          nullable: true
        created_at:
          type: string
          format: date-time

    VendorCampaignList:
      type: object
      required:
        - vendor_id
        - campaigns
      properties:
        vendor_id:
          type: string
        campaigns:
          type: array
          items:
            $ref: "#/components/schemas/VendorCampaignSummary"

    CreateLinkRequest:
      type: object
      required:
        - role
        - platform
        - url
      properties:
        role:
          type: string
          enum: [main, cross_post, social_promo]
        platform:
          type: string
          minLength: 1
          maxLength: 64
          description: |
            Free-form platform label (readysetcloud, medium, devto,
            linkedin, x, bluesky, hashnode, etc.). Not enforced to a
            fixed set so new surfaces can be added without schema
            changes.
        url:
          type: string
          minLength: 1
          maxLength: 2048
          pattern: '^https?://'
          description: Destination URL the short link redirects to
        src:
          type: string
          maxLength: 64
          description: Default traffic-source label baked into the short link
        notes:
          type: string
          maxLength: 1000
        expiresInDays:
          type: integer
          minimum: 1
          maximum: 1825
          description: |
            Override how long the short code stays active. Defaults to
            newsletter-service's default (730 = 2 years).

    LinkAnalytics:
      type: object
      required:
        - campaign_id
        - link_id
        - code
        - analytics
      properties:
        campaign_id:
          type: string
        link_id:
          type: string
        code:
          type: string
        role:
          type: string
        platform:
          type: string
        url:
          type: string
        analytics:
          type: object
          properties:
            code:
              type: string
            total_clicks:
              type: integer
            by_day:
              type: object
              additionalProperties:
                type: integer
            by_src:
              type: object
              additionalProperties:
                type: integer
            first_click_at:
              type: string
              format: date-time
              nullable: true
            last_click_at:
              type: string
              format: date-time
              nullable: true

    CampaignAnalytics:
      type: object
      required:
        - campaign_id
        - link_count
        - total_clicks
        - by_role
        - by_platform
        - links
      properties:
        campaign_id:
          type: string
        link_count:
          type: integer
          minimum: 0
        total_clicks:
          type: integer
          minimum: 0
        by_role:
          type: object
          additionalProperties:
            type: integer
        by_platform:
          type: object
          additionalProperties:
            type: integer
        upstream_failures:
          type: integer
          description: How many per-link analytics calls failed (clicks for those links are NOT included in total_clicks)
        links:
          type: array
          items:
            type: object
            properties:
              link_id:
                type: string
              code:
                type: string
              role:
                type: string
              platform:
                type: string
              url:
                type: string
              total_clicks:
                type: integer
              first_click_at:
                type: string
                format: date-time
                nullable: true
              last_click_at:
                type: string
                format: date-time
                nullable: true
              error:
                type: string
                nullable: true
                description: Non-null when the per-link analytics fetch failed

    Link:
      type: object
      required:
        - campaign_id
        - link_id
        - code
        - short_url
        - role
        - platform
        - url
        - created_at
      properties:
        campaign_id:
          type: string
        link_id:
          type: string
        code:
          type: string
          minLength: 6
          maxLength: 6
        short_url:
          type: string
        role:
          type: string
          enum: [main, cross_post, social_promo]
        platform:
          type: string
        url:
          type: string
        src:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        expires_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time

    UpdateProfileRequest:
      type: object
      description: |
        Account-level integration settings. All properties optional; only
        those present are applied. Secrets (service account, API key) are
        write-only.
      properties:
        ga4_property_id:
          type: string
          pattern: '^\d{1,20}$'
          description: Numeric GA4 property id (e.g. 123456789).
        ga4_service_account:
          type: string
          description: |
            The Google service-account JSON key, as a string (the contents
            of the downloaded key file). Written to an SSM SecureString.
        crux_api_key:
          type: string
          maxLength: 200
          description: |
            A Google API key with the CrUX API and PageSpeed Insights API
            enabled. Written to an SSM SecureString.

    Profile:
      type: object
      required:
        - ga4
        - core_web_vitals
      properties:
        ga4:
          type: object
          properties:
            property_id:
              type: string
              nullable: true
            service_account_email:
              type: string
              nullable: true
              description: client_email from the stored service account, or null.
            configured:
              type: boolean
              description: True when both a property id and service account are stored.
        core_web_vitals:
          type: object
          properties:
            configured:
              type: boolean
              description: True when a CrUX/PageSpeed API key is stored.
        updated_at:
          type: string
          format: date-time
          nullable: true

    WebAnalytics:
      type: object
      required:
        - campaign_id
        - blog_url
        - page_path
        - ga4
        - core_web_vitals
      properties:
        campaign_id:
          type: string
        blog_url:
          type: string
        page_path:
          type: string
          description: The path portion of blog_url, used as the GA4 filter.
        range:
          type: object
          properties:
            startDate:
              type: string
              format: date
            endDate:
              type: string
              format: date
        ga4:
          $ref: "#/components/schemas/Ga4Section"
        core_web_vitals:
          $ref: "#/components/schemas/CoreWebVitalsSection"

    Ga4Section:
      type: object
      description: |
        GA4 traffic for the page. `configured` is false when GA4 isn't set
        up; `error` is non-null when configured but the fetch failed.
      properties:
        configured:
          type: boolean
        error:
          type: string
          nullable: true
        property_id:
          type: string
        page_path:
          type: string
        totals:
          type: object
          properties:
            pageviews:
              type: integer
            users:
              type: integer
            sessions:
              type: integer
            avg_session_duration:
              type: number
              description: Average session duration in seconds.
            engagement_rate:
              type: number
            bounce_rate:
              type: number
        by_day:
          type: object
          additionalProperties:
            type: integer
          description: Date (YYYY-MM-DD) → pageviews.

    CoreWebVitalsSection:
      type: object
      description: |
        Core Web Vitals for the page. `source` is `crux` for real-user
        field data or `psi` for a PageSpeed Insights lab run. `inp_ms` is
        null for `psi` (INP is a field-only metric).
      properties:
        configured:
          type: boolean
        error:
          type: string
          nullable: true
        source:
          type: string
          enum: [crux, psi]
        url:
          type: string
        strategy:
          type: string
          description: Present for the psi source (e.g. mobile).
        performance_score:
          type: number
          nullable: true
          description: Present for the psi source (0-1).
        metrics:
          type: object
          properties:
            lcp_ms:
              type: number
              nullable: true
            cls:
              type: number
              nullable: true
            inp_ms:
              type: number
              nullable: true
            fcp_ms:
              type: number
              nullable: true
            ttfb_ms:
              type: number
              nullable: true
              description: Present for the crux source.
            tbt_ms:
              type: number
              nullable: true
              description: Present for the psi source.

  responses:
    BadRequest:
      description: Unable to process request. Likely due to improperly formatted request.
      content:
        application/json:
          schema:
            type: object
            required:
              - message
            properties:
              message:
                type: string
    UnknownError:
      description: An unexpected error occurred on the server.
      content:
        application/json:
          schema:
            type: object
            required:
              - message
            properties:
              message:
                type: string
