openapi: 3.0.0
info:
  title: Content Tracking API
  description: |
    Campaign and Link management for the influencer analytics aggregator.
    Short-code minting is delegated to newsletter-service; this API owns
    the Campaign/Link metadata and orchestrates the mint call.
  version: 1.0.0

x-amazon-apigateway-request-validators:
  Validate All:
    validateRequestParameters: true
    validateRequestBody: true
x-amazon-apigateway-gateway-responses:
  BAD_REQUEST_BODY:
    statusCode: 400
    responseTemplates:
      application/json: '{ "message": "$context.error.validationErrorString" }'

tags:
  - name: Campaigns
  - name: Links

paths:
  /campaigns:
    post:
      summary: Create a campaign
      tags:
        - Campaigns
      security:
        - CognitoUserPoolAuthorizer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCampaignRequest"
      responses:
        201:
          description: Campaign created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Campaign"
        400:
          $ref: "#/components/responses/BadRequest"
        500:
          $ref: "#/components/responses/UnknownError"
      x-amazon-apigateway-request-validator: Validate All
      x-amazon-apigateway-integration:
        uri:
          Fn::Sub: arn:${AWS::Partition}:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${CreateCampaignFunction.Arn}/invocations
        httpMethod: POST
        type: aws_proxy

  /campaigns/{campaignId}:
    parameters:
      - name: campaignId
        in: path
        required: true
        schema:
          type: string
          minLength: 1
          maxLength: 64
    get:
      summary: Get a campaign and its links
      tags:
        - Campaigns
      security:
        - CognitoUserPoolAuthorizer: []
      responses:
        200:
          description: Campaign with its registered links
          content:
            application/json:
              schema:
                type: object
                properties:
                  campaign:
                    $ref: "#/components/schemas/Campaign"
                  links:
                    type: array
                    items:
                      $ref: "#/components/schemas/Link"
        404:
          description: Campaign not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        500:
          $ref: "#/components/responses/UnknownError"
      x-amazon-apigateway-integration:
        uri:
          Fn::Sub: arn:${AWS::Partition}:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${GetCampaignFunction.Arn}/invocations
        httpMethod: POST
        type: aws_proxy

  /campaigns/{campaignId}/analytics:
    parameters:
      - name: campaignId
        in: path
        required: true
        schema:
          type: string
          minLength: 1
          maxLength: 64
    get:
      summary: Roll up click analytics across all links in a campaign
      description: |
        Fans out to newsletter-service's per-code analytics endpoint for
        each Link in the campaign and aggregates client-side. Returns
        total clicks plus breakdowns by role and platform, with the
        per-link details listed.
      tags:
        - Campaigns
      security:
        - CognitoUserPoolAuthorizer: []
      responses:
        200:
          description: Campaign-level click rollup
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CampaignAnalytics"
        404:
          description: Campaign not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        502:
          description: All upstream analytics calls failed
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        500:
          $ref: "#/components/responses/UnknownError"
      x-amazon-apigateway-integration:
        uri:
          Fn::Sub: arn:${AWS::Partition}:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${GetCampaignAnalyticsFunction.Arn}/invocations
        httpMethod: POST
        type: aws_proxy

  /campaigns/{campaignId}/links:
    parameters:
      - name: campaignId
        in: path
        required: true
        schema:
          type: string
          minLength: 1
          maxLength: 64
        description: The campaign's identifier
    post:
      summary: Register a link in a campaign
      description: |
        Mints a short code via newsletter-service and saves the Link
        metadata under this campaign. The destination URL becomes
        reachable at the returned `short_url` and clicks accrue under
        the campaign for sponsor reporting.
      tags:
        - Links
      security:
        - CognitoUserPoolAuthorizer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateLinkRequest"
      responses:
        201:
          description: Link registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Link"
        400:
          $ref: "#/components/responses/BadRequest"
        404:
          description: Campaign not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        502:
          description: Upstream mint service returned an error
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        500:
          $ref: "#/components/responses/UnknownError"
      x-amazon-apigateway-request-validator: Validate All
      x-amazon-apigateway-integration:
        uri:
          Fn::Sub: arn:${AWS::Partition}:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${CreateCampaignLinkFunction.Arn}/invocations
        httpMethod: POST
        type: aws_proxy

  /campaigns/{campaignId}/links/{linkId}:
    parameters:
      - name: campaignId
        in: path
        required: true
        schema:
          type: string
          minLength: 1
          maxLength: 64
      - name: linkId
        in: path
        required: true
        schema:
          type: string
          minLength: 1
          maxLength: 64
    put:
      summary: Update an existing Link (partial update; null clears nullable fields)
      description: |
        Updates the editable subset of a Link. Immutable identity fields
        (`code`, `short_url`, `url`, `role`, `platform`, `link_id`,
        `campaign_id`) cannot be changed and will be rejected with 400.
        Explicit `null` on `notes` or `src` clears the field; `expires_at`
        is replaced with the value provided.
      tags:
        - Links
      security:
        - CognitoUserPoolAuthorizer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateLinkRequest"
      responses:
        200:
          description: Updated Link record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Link"
        400:
          $ref: "#/components/responses/BadRequest"
        404:
          description: Link not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        500:
          $ref: "#/components/responses/UnknownError"
      x-amazon-apigateway-request-validator: Validate All
      x-amazon-apigateway-integration:
        uri:
          Fn::Sub: arn:${AWS::Partition}:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${UpdateCampaignLinkFunction.Arn}/invocations
        httpMethod: POST
        type: aws_proxy

    delete:
      summary: Delete a Link
      description: |
        Removes the Link's short code from newsletter-service and then
        deletes the local Link record. If newsletter-service responds 404
        (the code is already gone) the local delete still proceeds so the
        two stores converge.
      tags:
        - Links
      security:
        - CognitoUserPoolAuthorizer: []
      responses:
        204:
          description: Link deleted
        404:
          description: Link not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        502:
          description: Newsletter-service rejected or failed the unmint call; local record was NOT deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        500:
          $ref: "#/components/responses/UnknownError"
      x-amazon-apigateway-integration:
        uri:
          Fn::Sub: arn:${AWS::Partition}:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${DeleteCampaignLinkFunction.Arn}/invocations
        httpMethod: POST
        type: aws_proxy

  /campaigns/{campaignId}/links/{linkId}/analytics:
    parameters:
      - name: campaignId
        in: path
        required: true
        schema:
          type: string
      - name: linkId
        in: path
        required: true
        schema:
          type: string
    get:
      summary: Click analytics for a specific link
      description: |
        Looks up the Link locally to find its short code, then proxies
        to newsletter-service's GET /links/{code}/analytics. Returns
        per-day and per-source breakdowns for that specific tracked
        link.
      tags:
        - Links
      security:
        - CognitoUserPoolAuthorizer: []
      responses:
        200:
          description: Analytics for the link
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LinkAnalytics"
        404:
          description: Link not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        502:
          description: Upstream analytics service failure
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        500:
          $ref: "#/components/responses/UnknownError"
      x-amazon-apigateway-integration:
        uri:
          Fn::Sub: arn:${AWS::Partition}:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${GetCampaignLinkAnalyticsFunction.Arn}/invocations
        httpMethod: POST
        type: aws_proxy

  /vendors:
    post:
      summary: Create a vendor
      tags:
        - Vendors
      security:
        - CognitoUserPoolAuthorizer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateVendorRequest"
      responses:
        201:
          description: Vendor created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vendor"
        400:
          $ref: "#/components/responses/BadRequest"
        500:
          $ref: "#/components/responses/UnknownError"
      x-amazon-apigateway-request-validator: Validate All
      x-amazon-apigateway-integration:
        uri:
          Fn::Sub: arn:${AWS::Partition}:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${CreateVendorFunction.Arn}/invocations
        httpMethod: POST
        type: aws_proxy

    get:
      summary: List vendors
      tags:
        - Vendors
      security:
        - CognitoUserPoolAuthorizer: []
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 100
        - name: startKey
          in: query
          description: Base64-encoded pagination token returned as nextStartKey
          schema:
            type: string
      responses:
        200:
          description: Vendor list (paginated)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VendorList"
        400:
          $ref: "#/components/responses/BadRequest"
        500:
          $ref: "#/components/responses/UnknownError"
      x-amazon-apigateway-integration:
        uri:
          Fn::Sub: arn:${AWS::Partition}:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${ListVendorsFunction.Arn}/invocations
        httpMethod: POST
        type: aws_proxy

  /vendors/{vendorId}:
    parameters:
      - name: vendorId
        in: path
        required: true
        schema:
          type: string
          pattern: '^[0-9A-HJKMNP-TV-Z]{26}$'
    get:
      summary: Get a vendor by id
      tags:
        - Vendors
      security:
        - CognitoUserPoolAuthorizer: []
      responses:
        200:
          description: Vendor record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vendor"
        404:
          description: Vendor not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        500:
          $ref: "#/components/responses/UnknownError"
      x-amazon-apigateway-integration:
        uri:
          Fn::Sub: arn:${AWS::Partition}:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${GetVendorFunction.Arn}/invocations
        httpMethod: POST
        type: aws_proxy

    put:
      summary: Update a vendor (partial update; null values clear optional fields)
      tags:
        - Vendors
      security:
        - CognitoUserPoolAuthorizer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateVendorRequest"
      responses:
        200:
          description: Updated vendor record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vendor"
        400:
          $ref: "#/components/responses/BadRequest"
        404:
          description: Vendor not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        500:
          $ref: "#/components/responses/UnknownError"
      x-amazon-apigateway-request-validator: Validate All
      x-amazon-apigateway-integration:
        uri:
          Fn::Sub: arn:${AWS::Partition}:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${UpdateVendorFunction.Arn}/invocations
        httpMethod: POST
        type: aws_proxy

    delete:
      summary: Delete a vendor (fails with 409 if linked campaigns exist)
      tags:
        - Vendors
      security:
        - CognitoUserPoolAuthorizer: []
      responses:
        204:
          description: Vendor deleted
        404:
          description: Vendor not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        409:
          description: Vendor has linked campaigns
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        500:
          $ref: "#/components/responses/UnknownError"
      x-amazon-apigateway-integration:
        uri:
          Fn::Sub: arn:${AWS::Partition}:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${DeleteVendorFunction.Arn}/invocations
        httpMethod: POST
        type: aws_proxy

  /vendors/{vendorId}/campaigns:
    parameters:
      - name: vendorId
        in: path
        required: true
        schema:
          type: string
          pattern: '^[0-9A-HJKMNP-TV-Z]{26}$'
    get:
      summary: List campaigns linked to a vendor
      tags:
        - Vendors
      security:
        - CognitoUserPoolAuthorizer: []
      responses:
        200:
          description: Campaigns associated with this vendor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VendorCampaignList"
        404:
          description: Vendor not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        500:
          $ref: "#/components/responses/UnknownError"
      x-amazon-apigateway-integration:
        uri:
          Fn::Sub: arn:${AWS::Partition}:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${ListVendorCampaignsFunction.Arn}/invocations
        httpMethod: POST
        type: aws_proxy

  /campaigns/{campaignId}/payout:
    parameters:
      - name: campaignId
        in: path
        required: true
        schema:
          type: string
          minLength: 1
          maxLength: 64
    patch:
      summary: Update a campaign's payout (partial update; sets paid_at automatically when paid=true)
      tags:
        - Campaigns
      security:
        - CognitoUserPoolAuthorizer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePayoutRequest"
      responses:
        200:
          description: Updated campaign with the new payout
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Campaign"
        400:
          $ref: "#/components/responses/BadRequest"
        404:
          description: Campaign not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        500:
          $ref: "#/components/responses/UnknownError"
      x-amazon-apigateway-request-validator: Validate All
      x-amazon-apigateway-integration:
        uri:
          Fn::Sub: arn:${AWS::Partition}:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${UpdateCampaignPayoutFunction.Arn}/invocations
        httpMethod: POST
        type: aws_proxy

  /revenue:
    get:
      summary: Aggregate campaign payouts (booked vs received, grouped by month/year/vendor)
      tags:
        - Revenue
      security:
        - CognitoUserPoolAuthorizer: []
      parameters:
        - name: year
          in: query
          description: Calendar year. Defaults to current. Mutually exclusive with startDate/endDate.
          schema:
            type: integer
            minimum: 1900
            maximum: 2999
        - name: startDate
          in: query
          description: ISO 8601 date (inclusive). Mutually exclusive with year.
          schema:
            type: string
            format: date
        - name: endDate
          in: query
          description: ISO 8601 date (inclusive). Mutually exclusive with year.
          schema:
            type: string
            format: date
        - name: vendorId
          in: query
          description: ULID. Scope to one vendor.
          schema:
            type: string
            pattern: '^[0-9A-HJKMNP-TV-Z]{26}$'
        - name: grouping
          in: query
          description: How to roll up `groups`. Default `month`.
          schema:
            type: string
            enum: [year, month, vendor]
            default: month
        - name: paidOnly
          in: query
          description: When true, exclude campaigns that haven't been marked paid.
          schema:
            type: boolean
            default: false
      responses:
        200:
          description: Revenue rollup
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RevenueResponse"
        400:
          $ref: "#/components/responses/BadRequest"
        500:
          $ref: "#/components/responses/UnknownError"
      x-amazon-apigateway-integration:
        uri:
          Fn::Sub: arn:${AWS::Partition}:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${GetRevenueFunction.Arn}/invocations
        httpMethod: POST
        type: aws_proxy

components:
  securitySchemes:
    CognitoUserPoolAuthorizer:
      type: apiKey
      in: header
      name: Authorization
      x-amazon-apigateway-authtype: cognito_user_pools
      x-amazon-apigateway-authorizer:
        type: cognito_user_pools
        providerARNs:
          - Fn::Sub: "${CognitoUserPoolArn}"

  schemas:
    CreateCampaignRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 200
          description: Human-readable campaign name
        sponsor:
          type: string
          maxLength: 200
          description: |
            Free-form sponsor name. Legacy field; prefer vendor_id when
            the sponsor exists as a Vendor record. Both may be omitted.
        vendor_id:
          type: string
          pattern: '^[0-9A-HJKMNP-TV-Z]{26}$'
          description: |
            ULID of an existing Vendor. When provided, also writes a
            campaign-by-vendor index entry so GET /vendors/{id}/campaigns
            includes this campaign.
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
        status:
          type: string
          enum: [draft, active, completed]
          default: active
        targetMetrics:
          type: object
          description: Free-form sponsor targets, stored as-is
          additionalProperties: true
        payout:
          $ref: "#/components/schemas/Payout"

    Campaign:
      type: object
      required:
        - campaign_id
        - name
        - status
        - created_at
      properties:
        campaign_id:
          type: string
        name:
          type: string
        sponsor:
          type: string
          nullable: true
        vendor_id:
          type: string
          nullable: true
        startDate:
          type: string
          format: date
          nullable: true
        endDate:
          type: string
          format: date
          nullable: true
        status:
          type: string
          enum: [draft, active, completed]
        targetMetrics:
          type: object
          nullable: true
        payout:
          allOf:
            - $ref: "#/components/schemas/Payout"
          nullable: true
        created_at:
          type: string
          format: date-time

    Payout:
      type: object
      required:
        - amount
      properties:
        amount:
          type: number
          minimum: 0
          description: Numeric amount in the payout's currency.
        currency:
          type: string
          pattern: '^[A-Z]{3}$'
          default: USD
          description: ISO 4217 alphabetic code. Only USD aggregates in /revenue today.
        paid:
          type: boolean
          default: false
        paid_at:
          type: string
          format: date
          nullable: true
        invoice_ref:
          type: string
          maxLength: 200
          nullable: true

    UpdatePayoutRequest:
      type: object
      description: |
        Partial update of a campaign's payout. Fields not present are left
        unchanged. Setting `paid: true` without a `paid_at` defaults paid_at
        to today's date. Setting `paid: false` without paid_at clears it.
        Only `paid_at` and `invoice_ref` accept explicit `null` (to clear).
      properties:
        amount:
          type: number
          minimum: 0
        currency:
          type: string
          pattern: '^[A-Z]{3}$'
        paid:
          type: boolean
        paid_at:
          type: string
          format: date
          nullable: true
        invoice_ref:
          type: string
          maxLength: 200
          nullable: true

    RevenueAggregate:
      type: object
      required:
        - amount
        - campaignCount
      properties:
        amount:
          type: number
        campaignCount:
          type: integer

    RevenueGroup:
      type: object
      required:
        - key
        - amount
        - campaignCount
      properties:
        key:
          type: string
          description: |
            Bucket key. For grouping=month it's YYYY-MM; grouping=year it's
            YYYY; grouping=vendor it's the vendor_id or "unassigned".
        amount:
          type: number
        campaignCount:
          type: integer
        bookedAmount:
          type: number
        bookedCount:
          type: integer
        receivedAmount:
          type: number
        receivedCount:
          type: integer

    RevenueSkipped:
      type: object
      required:
        - campaign_id
        - currency
        - amount
        - reason
      properties:
        campaign_id:
          type: string
        currency:
          type: string
        amount:
          type: number
        reason:
          type: string

    RevenueResponse:
      type: object
      required:
        - currency
        - range
        - total
        - booked
        - received
        - groups
        - skipped
      properties:
        currency:
          type: string
          description: Currency the aggregation is denominated in (USD today).
        range:
          type: object
          properties:
            startDate:
              type: string
              format: date
              nullable: true
            endDate:
              type: string
              format: date
              nullable: true
        total:
          $ref: "#/components/schemas/RevenueAggregate"
        booked:
          $ref: "#/components/schemas/RevenueAggregate"
        received:
          $ref: "#/components/schemas/RevenueAggregate"
        groups:
          type: array
          items:
            $ref: "#/components/schemas/RevenueGroup"
        skipped:
          type: array
          items:
            $ref: "#/components/schemas/RevenueSkipped"

    CreateVendorRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 200
        website:
          type: string
          maxLength: 500
        contact_name:
          type: string
          maxLength: 200
        contact_email:
          type: string
          format: email
          maxLength: 320
        payment_terms:
          type: string
          maxLength: 500
          description: Free-form notes (net 30, etc.). Not validated semantically.
        tags:
          type: array
          maxItems: 20
          items:
            type: string
            minLength: 1
            maxLength: 50
        notes:
          type: string
          maxLength: 2000

    UpdateVendorRequest:
      type: object
      description: |
        Partial update. Only fields present in the body are touched. Explicit
        null clears an optional field (cannot clear `name`).
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 200
        website:
          type: string
          maxLength: 500
          nullable: true
        contact_name:
          type: string
          maxLength: 200
          nullable: true
        contact_email:
          type: string
          format: email
          maxLength: 320
          nullable: true
        payment_terms:
          type: string
          maxLength: 500
          nullable: true
        tags:
          type: array
          maxItems: 20
          nullable: true
          items:
            type: string
            minLength: 1
            maxLength: 50
        notes:
          type: string
          maxLength: 2000
          nullable: true

    Vendor:
      type: object
      required:
        - vendor_id
        - name
        - created_at
        - updated_at
      properties:
        vendor_id:
          type: string
          pattern: '^[0-9A-HJKMNP-TV-Z]{26}$'
        name:
          type: string
        website:
          type: string
          nullable: true
        contact_name:
          type: string
          nullable: true
        contact_email:
          type: string
          nullable: true
        payment_terms:
          type: string
          nullable: true
        tags:
          type: array
          items:
            type: string
        notes:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    VendorList:
      type: object
      required:
        - vendors
      properties:
        vendors:
          type: array
          items:
            $ref: "#/components/schemas/Vendor"
        nextStartKey:
          type: string
          nullable: true
          description: Base64-encoded pagination token. Null when there are no more pages.

    VendorCampaignSummary:
      type: object
      required:
        - campaign_id
        - name
        - status
        - created_at
      properties:
        campaign_id:
          type: string
        name:
          type: string
        status:
          type: string
          enum: [draft, active, completed]
        startDate:
          type: string
          format: date
          nullable: true
        endDate:
          type: string
          format: date
          nullable: true
        created_at:
          type: string
          format: date-time

    VendorCampaignList:
      type: object
      required:
        - vendor_id
        - campaigns
      properties:
        vendor_id:
          type: string
        campaigns:
          type: array
          items:
            $ref: "#/components/schemas/VendorCampaignSummary"

    CreateLinkRequest:
      type: object
      required:
        - role
        - platform
        - url
      properties:
        role:
          type: string
          enum: [main, cross_post, social_promo]
        platform:
          type: string
          minLength: 1
          maxLength: 64
          description: |
            Free-form platform label (readysetcloud, medium, devto,
            linkedin, x, bluesky, hashnode, etc.). Not enforced to a
            fixed set so new surfaces can be added without schema
            changes.
        url:
          type: string
          minLength: 1
          maxLength: 2048
          pattern: '^https?://'
          description: Destination URL the short link redirects to
        src:
          type: string
          maxLength: 64
          description: Default traffic-source label baked into the short link
        notes:
          type: string
          maxLength: 1000
        expiresInDays:
          type: integer
          minimum: 1
          maximum: 1825
          description: |
            Override how long the short code stays active. Defaults to
            newsletter-service's default (730 = 2 years).

    UpdateLinkRequest:
      type: object
      description: |
        Partial update of a Link's editable fields. Only `notes`, `src`,
        and `expires_at` may be changed. Identity fields (`code`,
        `short_url`, `url`, `role`, `platform`, `link_id`, `campaign_id`)
        are immutable. Explicit `null` clears a nullable field.
      minProperties: 1
      additionalProperties: false
      properties:
        notes:
          type: string
          maxLength: 1000
          nullable: true
        src:
          type: string
          minLength: 1
          maxLength: 64
          nullable: true
        expires_at:
          type: string
          format: date-time
          nullable: true
          description: ISO 8601 timestamp the short link expires.

    LinkAnalytics:
      type: object
      required:
        - campaign_id
        - link_id
        - code
        - analytics
      properties:
        campaign_id:
          type: string
        link_id:
          type: string
        code:
          type: string
        role:
          type: string
        platform:
          type: string
        url:
          type: string
        analytics:
          type: object
          properties:
            code:
              type: string
            total_clicks:
              type: integer
            by_day:
              type: object
              additionalProperties:
                type: integer
            by_src:
              type: object
              additionalProperties:
                type: integer
            first_click_at:
              type: string
              format: date-time
              nullable: true
            last_click_at:
              type: string
              format: date-time
              nullable: true

    CampaignAnalytics:
      type: object
      required:
        - campaign_id
        - link_count
        - total_clicks
        - by_role
        - by_platform
        - links
      properties:
        campaign_id:
          type: string
        link_count:
          type: integer
          minimum: 0
        total_clicks:
          type: integer
          minimum: 0
        by_role:
          type: object
          additionalProperties:
            type: integer
        by_platform:
          type: object
          additionalProperties:
            type: integer
        upstream_failures:
          type: integer
          description: How many per-link analytics calls failed (clicks for those links are NOT included in total_clicks)
        links:
          type: array
          items:
            type: object
            properties:
              link_id:
                type: string
              code:
                type: string
              role:
                type: string
              platform:
                type: string
              url:
                type: string
              total_clicks:
                type: integer
              first_click_at:
                type: string
                format: date-time
                nullable: true
              last_click_at:
                type: string
                format: date-time
                nullable: true
              error:
                type: string
                nullable: true
                description: Non-null when the per-link analytics fetch failed

    Link:
      type: object
      required:
        - campaign_id
        - link_id
        - code
        - short_url
        - role
        - platform
        - url
        - created_at
      properties:
        campaign_id:
          type: string
        link_id:
          type: string
        code:
          type: string
          minLength: 6
          maxLength: 6
        short_url:
          type: string
        role:
          type: string
          enum: [main, cross_post, social_promo]
        platform:
          type: string
        url:
          type: string
        src:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        expires_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time

  responses:
    BadRequest:
      description: Unable to process request. Likely due to improperly formatted request.
      content:
        application/json:
          schema:
            type: object
            required:
              - message
            properties:
              message:
                type: string
    UnknownError:
      description: An unexpected error occurred on the server.
      content:
        application/json:
          schema:
            type: object
            required:
              - message
            properties:
              message:
                type: string
