name: Deploy (staging)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  # Single shared group across `push: main` and `pull_request` so PR
  # deploys and main deploys serialize against each other instead of
  # racing on the same Staging stack. cancel-in-progress is false so
  # mid-deploy CFN updates never get torn out from under themselves.
  group: deploy-staging
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  STACK_NAME: content-tracking
  ENVIRONMENT: staging

jobs:
  deploy:
    name: sam deploy staging
    runs-on: ubuntu-latest
    environment:
      name: Staging
      # Dashboard URL is the user-facing surface. Surfaces on the PR
      # as "Deployed to Staging" with this URL once the workflow
      # finishes, so reviewers can click straight through.
      url: ${{ steps.outputs.outputs.dashboard-url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: |
          npm ci --ignore-scripts
          # `--ignore-scripts` blocks every postinstall (security
          # posture), but esbuild's postinstall is what fetches its
          # platform-specific binary. SAM's NodejsNpmEsbuildBuilder
          # then can't find esbuild and the build fails. `npm rebuild`
          # runs install lifecycle scripts on already-installed
          # packages so the native binaries land without re-opening
          # the floodgates on every dep.
          npm rebuild

      - name: Set up Python (for SAM CLI)
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Set up AWS SAM CLI
        uses: aws-actions/setup-sam@v3
        with:
          use-installer: true

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6.1.1
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          role-session-name: GitHubActions-ContentTracking-StagingDeploy
          aws-region: ${{ env.AWS_REGION }}

      - name: SAM build
        run: sam build

      - name: SAM deploy
        # `NewsletterApiBaseUrl` and `CampaignShortLinkBase` were
        # parameters before PR #35's monolambda refactor moved them
        # to runtime SSM reads. They were never cleaned out of these
        # workflows, which is why every deploy since #35 has failed
        # the second the SAM build was fixed.
        run: |
          sam deploy \
            --config-env ci \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --parameter-overrides \
              "Environment=${{ env.ENVIRONMENT }}" \
              "NewsletterMintApiKey=${{ secrets.NEWSLETTER_MINT_API_KEY }}"

      - name: Diagnose failed deploy
        if: ${{ failure() }}
        run: |
          echo "Deploy failed. Dumping CloudFormation diagnostics for ${{ env.STACK_NAME }}."

          echo "==== describe-stacks ===="
          aws cloudformation describe-stacks \
            --stack-name "${{ env.STACK_NAME }}" \
            --region "${{ env.AWS_REGION }}" || true

          echo "==== describe-stack-events (latest 50) ===="
          aws cloudformation describe-stack-events \
            --stack-name "${{ env.STACK_NAME }}" \
            --region "${{ env.AWS_REGION }}" \
            --query "StackEvents[:50].[Timestamp,LogicalResourceId,ResourceType,ResourceStatus,ResourceStatusReason]" \
            --output table || true

          echo "==== list-stack-resources ===="
          aws cloudformation list-stack-resources \
            --stack-name "${{ env.STACK_NAME }}" \
            --region "${{ env.AWS_REGION }}" \
            --query "StackResourceSummaries[*].[LogicalResourceId,ResourceType,ResourceStatus,PhysicalResourceId]" \
            --output table || true

          echo "==== list-change-sets (latest 5) ===="
          aws cloudformation list-change-sets \
            --stack-name "${{ env.STACK_NAME }}" \
            --region "${{ env.AWS_REGION }}" \
            --query "sort_by(Summaries,&CreationTime)[-5:].[ChangeSetName,Status,ExecutionStatus,StatusReason,CreationTime]" \
            --output table || true

          LATEST_CHANGE_SET=$(aws cloudformation list-change-sets \
            --stack-name "${{ env.STACK_NAME }}" \
            --region "${{ env.AWS_REGION }}" \
            --query "sort_by(Summaries,&CreationTime)[-1].ChangeSetName" \
            --output text 2>/dev/null || true)

          if [ -n "$LATEST_CHANGE_SET" ] && [ "$LATEST_CHANGE_SET" != "None" ]; then
            echo "==== describe-change-set ($LATEST_CHANGE_SET) ===="
            aws cloudformation describe-change-set \
              --stack-name "${{ env.STACK_NAME }}" \
              --change-set-name "$LATEST_CHANGE_SET" \
              --region "${{ env.AWS_REGION }}" || true
          fi

      - name: Read stack outputs
        id: outputs
        run: |
          OUTPUTS=$(aws cloudformation describe-stacks \
            --stack-name "${{ env.STACK_NAME }}" \
            --region "${{ env.AWS_REGION }}" \
            --query "Stacks[0].Outputs" \
            --output json)
          read_out() {
            echo "$OUTPUTS" | jq -r --arg k "$1" '.[] | select(.OutputKey==$k) | .OutputValue'
          }
          {
            echo "api-url=$(read_out ContentTrackingApiBaseUrl)"
            echo "table-name=$(read_out ContentTrackingTableName)"
            echo "dashboard-bucket=$(read_out DashboardBucketName)"
            echo "dashboard-distribution-id=$(read_out DashboardDistributionId)"
            echo "dashboard-url=$(read_out DashboardUrl)"
          } >> "$GITHUB_OUTPUT"

      - name: Install dashboard dependencies
        working-directory: dashboard-ui
        run: |
          npm ci --ignore-scripts
          npm rebuild

      - name: Build dashboard
        working-directory: dashboard-ui
        env:
          # API URL comes from the stack output so the dashboard always
          # points at the API that was just deployed in the same run.
          VITE_API_BASE_URL: ${{ steps.outputs.outputs.api-url }}
          # Cognito config lives on the GitHub environment as variables
          # (App Client ids and Hosted UI domains aren't secrets but
          # they're env-specific). The redirect URIs are derived from
          # the dashboard URL the stack just exposed.
          VITE_COGNITO_AUTHORITY: ${{ vars.COGNITO_AUTHORITY }}
          VITE_COGNITO_HOSTED_UI_DOMAIN: ${{ vars.COGNITO_HOSTED_UI_DOMAIN }}
          VITE_COGNITO_CLIENT_ID: ${{ vars.COGNITO_CLIENT_ID }}
          VITE_COGNITO_REDIRECT_URI: ${{ steps.outputs.outputs.dashboard-url }}/auth/callback
          VITE_COGNITO_POST_LOGOUT_URI: ${{ steps.outputs.outputs.dashboard-url }}/
        run: npm run build

      - name: Sync dashboard to S3
        run: |
          BUCKET="${{ steps.outputs.outputs.dashboard-bucket }}"
          # Two-pass sync. Hashed assets get immutable long-term caching;
          # the HTML manifest stays no-cache so users always see the
          # latest bundle.
          aws s3 sync dashboard-ui/dist/ "s3://${BUCKET}/" \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "*.html"
          aws s3 sync dashboard-ui/dist/ "s3://${BUCKET}/" \
            --cache-control "public, max-age=0, must-revalidate" \
            --content-type "text/html; charset=utf-8" \
            --exclude "*" \
            --include "*.html"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ steps.outputs.outputs.dashboard-distribution-id }}" \
            --paths "/*"

      - name: Write deployment summary
        run: |
          {
            echo "## content-tracking staging deploy"
            echo
            echo "- **Stack:** \`${{ env.STACK_NAME }}\`"
            echo "- **Region:** \`${{ env.AWS_REGION }}\`"
            echo "- **API URL:** ${{ steps.outputs.outputs.api-url }}"
            echo "- **Dashboard URL:** ${{ steps.outputs.outputs.dashboard-url }}"
            echo "- **Table:** \`${{ steps.outputs.outputs.table-name }}\`"
            echo "- **Commit:** \`${{ github.sha }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
