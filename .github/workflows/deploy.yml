name: Deploy (staging)

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  # Single global group: every PR deploys to the same shared Staging
  # stack, so concurrent PR runs must serialize, not race. False on
  # cancel-in-progress so mid-deploy CFN updates aren't torn out from
  # under themselves.
  group: deploy-staging
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  STACK_NAME: content-tracking
  ENVIRONMENT: staging

jobs:
  deploy:
    name: sam deploy staging
    # Dependabot PRs run with `Secret source: Dependabot`, which can't see
    # AWS_DEPLOY_ROLE_ARN, so OIDC fails before sam deploy ever runs. Skip
    # the deploy for bot PRs -- CI (lint+test) still gates the merge, and
    # the post-merge `push: main` deploy will exercise the bump for real.
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    environment:
      name: Staging
      # Dashboard URL is the user-facing surface. Surfaces on the PR
      # as "Deployed to Staging" with this URL once the workflow
      # finishes, so reviewers can click straight through.
      url: ${{ steps.outputs.outputs.dashboard-url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Install esbuild on PATH
        # SAM's NodejsNpmEsbuildBuilder shells out to `esbuild`. With
        # --ignore-scripts in place above, esbuild's postinstall never
        # fetches its native binary, so the project-local copy isn't
        # runnable. A global install puts a working esbuild on PATH
        # where the SAM builder looks first.
        run: npm install -g esbuild

      - name: Set up Python (for SAM CLI)
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Set up AWS SAM CLI
        uses: aws-actions/setup-sam@v3
        with:
          use-installer: true

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6.2.0
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          role-session-name: GitHubActions-Booked-StagingDeploy
          aws-region: ${{ env.AWS_REGION }}

      - name: SAM build
        run: sam build

      - name: SAM deploy
        # `NewsletterApiBaseUrl` and `CampaignShortLinkBase` were
        # parameters before PR #35's monolambda refactor moved them
        # to runtime SSM reads. They were never cleaned out of these
        # workflows, which is why every deploy since #35 has failed
        # the second the SAM build was fixed.
        env:
          # The vendor-report signing keys are PEM blocks: they contain
          # spaces ("BEGIN PUBLIC KEY") and newlines. `sam deploy
          # --parameter-overrides` re-splits each value on whitespace, so a
          # raw PEM gets truncated at the first space and CloudFront rejects
          # it ("empty/invalid RSA Encoded Key"). Pass them through env (so
          # the multiline value is never spliced into the script text) and
          # wrap each in single quotes inside the override below so SAM keeps
          # the whole PEM together as a single parameter value.
          VR_PUBKEY: ${{ secrets.VENDOR_REPORTS_SIGNING_PUBLIC_KEY }}
          VR_PRIVKEY: ${{ secrets.VENDOR_REPORTS_SIGNING_PRIVATE_KEY }}
        run: |
          sam deploy \
            --config-env ci \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --parameter-overrides \
              "Environment=${{ env.ENVIRONMENT }}" \
              "NewsletterMintApiKey=${{ secrets.NEWSLETTER_MINT_API_KEY }}" \
              "UserPoolId=${{ vars.USER_POOL_ID }}" \
              "UserPoolClientId=${{ vars.USER_POOL_CLIENT_ID }}" \
              "ExtensionTokenSigningKey=${{ secrets.EXTENSION_TOKEN_SIGNING_KEY }}" \
              "VendorReportsSigningPublicKey='${VR_PUBKEY}'" \
              "VendorReportsSigningPrivateKey='${VR_PRIVKEY}'"

      - name: Diagnose failed deploy
        if: ${{ failure() }}
        run: |
          echo "Deploy failed. Dumping CloudFormation diagnostics for ${{ env.STACK_NAME }}."

          echo "==== describe-stacks ===="
          aws cloudformation describe-stacks \
            --stack-name "${{ env.STACK_NAME }}" \
            --region "${{ env.AWS_REGION }}" || true

          echo "==== describe-stack-events (latest 50) ===="
          aws cloudformation describe-stack-events \
            --stack-name "${{ env.STACK_NAME }}" \
            --region "${{ env.AWS_REGION }}" \
            --query "StackEvents[:50].[Timestamp,LogicalResourceId,ResourceType,ResourceStatus,ResourceStatusReason]" \
            --output table || true

          echo "==== list-stack-resources ===="
          aws cloudformation list-stack-resources \
            --stack-name "${{ env.STACK_NAME }}" \
            --region "${{ env.AWS_REGION }}" \
            --query "StackResourceSummaries[*].[LogicalResourceId,ResourceType,ResourceStatus,PhysicalResourceId]" \
            --output table || true

          echo "==== list-change-sets (latest 5) ===="
          aws cloudformation list-change-sets \
            --stack-name "${{ env.STACK_NAME }}" \
            --region "${{ env.AWS_REGION }}" \
            --query "sort_by(Summaries,&CreationTime)[-5:].[ChangeSetName,Status,ExecutionStatus,StatusReason,CreationTime]" \
            --output table || true

          LATEST_CHANGE_SET=$(aws cloudformation list-change-sets \
            --stack-name "${{ env.STACK_NAME }}" \
            --region "${{ env.AWS_REGION }}" \
            --query "sort_by(Summaries,&CreationTime)[-1].ChangeSetName" \
            --output text 2>/dev/null || true)

          if [ -n "$LATEST_CHANGE_SET" ] && [ "$LATEST_CHANGE_SET" != "None" ]; then
            echo "==== describe-change-set ($LATEST_CHANGE_SET) ===="
            aws cloudformation describe-change-set \
              --stack-name "${{ env.STACK_NAME }}" \
              --change-set-name "$LATEST_CHANGE_SET" \
              --region "${{ env.AWS_REGION }}" || true
          fi

      - name: Read stack outputs
        id: outputs
        run: |
          OUTPUTS=$(aws cloudformation describe-stacks \
            --stack-name "${{ env.STACK_NAME }}" \
            --region "${{ env.AWS_REGION }}" \
            --query "Stacks[0].Outputs" \
            --output json)
          read_out() {
            echo "$OUTPUTS" | jq -r --arg k "$1" '.[] | select(.OutputKey==$k) | .OutputValue'
          }
          {
            echo "api-url=$(read_out ContentTrackingApiBaseUrl)"
            echo "table-name=$(read_out ContentTrackingTableName)"
            echo "dashboard-bucket=$(read_out DashboardBucketName)"
            echo "dashboard-distribution-id=$(read_out DashboardDistributionId)"
            echo "dashboard-url=$(read_out DashboardUrl)"
            echo "stream-url=$(read_out StreamGenerateUrl)"
          } >> "$GITHUB_OUTPUT"

      - name: Install dashboard dependencies
        # Dashboard build uses vite + rollup + esbuild, all of which
        # depend on their postinstall scripts to fetch native
        # platform binaries. We don't gate this with --ignore-scripts
        # because there's no easy substitute for those binaries the
        # way there is for SAM's esbuild lookup.
        working-directory: ui
        run: npm ci

      - name: Build dashboard
        working-directory: ui
        env:
          # API URL comes from the stack output so the dashboard always
          # points at the API that was just deployed in the same run.
          VITE_API_BASE_URL: ${{ steps.outputs.outputs.api-url }}
          # Cognito config lives on the GitHub environment as variables
          # (App Client ids and User Pool ids aren't secrets but they
          # are env-specific). Same shape newsletter-service uses --
          # Amplify reads these directly to call Cognito InitiateAuth.
          VITE_AWS_REGION: ${{ env.AWS_REGION }}
          VITE_USER_POOL_ID: ${{ vars.USER_POOL_ID }}
          VITE_USER_POOL_CLIENT_ID: ${{ vars.USER_POOL_CLIENT_ID }}
          # Streaming Function URL (StreamGenerateUrl output). Optional in the
          # UI — empty falls back to the buffered REST endpoints.
          VITE_STREAM_BASE_URL: ${{ steps.outputs.outputs.stream-url }}
        run: npm run build

      - name: Package Chrome extension into dashboard build
        # Writes ui/dist/booked-extension.zip alongside the dashboard
        # bundle so the InstallExtensionModal's /booked-extension.zip
        # download link resolves on the same origin. Runs after the
        # vite build because vite cleans dist/ on each run.
        env:
          # Substituted into the extension's src/config.js at zip time
          # so the packaged extension already knows which Booked API to
          # call. Same value the dashboard build above uses.
          VITE_API_BASE_URL: ${{ steps.outputs.outputs.api-url }}
          # Two uses: lets the popup deep-link unpaired users back to
          # Settings → Extension, and rewrites the dashboard
          # content_script's match in the zipped manifest so the
          # Refresh-stale button injects on whichever origin the
          # dashboard was deployed to (CloudFront URL on staging,
          # custom domain on prod).
          BOOKED_DASHBOARD_URL: ${{ steps.outputs.outputs.dashboard-url }}
        run: npm run build-extension-zip

      - name: Sync dashboard to S3
        run: |
          BUCKET="${{ steps.outputs.outputs.dashboard-bucket }}"
          # Three-pass sync. Hashed assets get immutable long-term
          # caching; the HTML manifest and the extension zip both have
          # unhashed filenames whose content changes per deploy, so
          # they need short-TTL revalidation instead.
          aws s3 sync ui/dist/ "s3://${BUCKET}/" \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "*.html" \
            --exclude "booked-extension.zip"
          aws s3 sync ui/dist/ "s3://${BUCKET}/" \
            --cache-control "public, max-age=0, must-revalidate" \
            --content-type "text/html; charset=utf-8" \
            --exclude "*" \
            --include "*.html"
          aws s3 cp ui/dist/booked-extension.zip "s3://${BUCKET}/booked-extension.zip" \
            --cache-control "public, max-age=0, must-revalidate" \
            --content-type "application/zip"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ steps.outputs.outputs.dashboard-distribution-id }}" \
            --paths "/*"

      - name: Write deployment summary
        run: |
          {
            echo "## Booked staging deploy"
            echo
            echo "- **Stack:** \`${{ env.STACK_NAME }}\`"
            echo "- **Region:** \`${{ env.AWS_REGION }}\`"
            echo "- **API URL:** ${{ steps.outputs.outputs.api-url }}"
            echo "- **Dashboard URL:** ${{ steps.outputs.outputs.dashboard-url }}"
            echo "- **Table:** \`${{ steps.outputs.outputs.table-name }}\`"
            echo "- **Commit:** \`${{ github.sha }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
