name: Deploy (production)

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  STACK_NAME: content-tracking
  ENVIRONMENT: production

jobs:
  deploy:
    name: sam deploy production
    runs-on: ubuntu-latest
    environment:
      name: Production
      url: ${{ steps.outputs.outputs.api-url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Install esbuild on PATH
        # See deploy.yml for rationale.
        run: npm install -g esbuild

      - name: Set up Python (for SAM CLI)
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Set up AWS SAM CLI
        uses: aws-actions/setup-sam@v3
        with:
          use-installer: true

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6.1.1
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          role-session-name: GitHubActions-Booked-ProductionDeploy
          aws-region: ${{ env.AWS_REGION }}

      - name: SAM build
        run: sam build

      - name: SAM deploy
        # NewsletterApiBaseUrl and CampaignShortLinkBase were removed
        # from the template in PR #35; see deploy.yml for context.
        run: |
          sam deploy \
            --config-env prod \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --parameter-overrides \
              "Environment=${{ env.ENVIRONMENT }}" \
              "NewsletterMintApiKey=${{ secrets.NEWSLETTER_MINT_API_KEY }}"

      - name: Diagnose failed deploy
        if: ${{ failure() }}
        run: |
          echo "Deploy failed. Dumping CloudFormation diagnostics for ${{ env.STACK_NAME }}."

          echo "==== describe-stacks ===="
          aws cloudformation describe-stacks \
            --stack-name "${{ env.STACK_NAME }}" \
            --region "${{ env.AWS_REGION }}" || true

          echo "==== describe-stack-events (latest 50) ===="
          aws cloudformation describe-stack-events \
            --stack-name "${{ env.STACK_NAME }}" \
            --region "${{ env.AWS_REGION }}" \
            --query "StackEvents[:50].[Timestamp,LogicalResourceId,ResourceType,ResourceStatus,ResourceStatusReason]" \
            --output table || true

          echo "==== list-stack-resources ===="
          aws cloudformation list-stack-resources \
            --stack-name "${{ env.STACK_NAME }}" \
            --region "${{ env.AWS_REGION }}" \
            --query "StackResourceSummaries[*].[LogicalResourceId,ResourceType,ResourceStatus,PhysicalResourceId]" \
            --output table || true

          echo "==== list-change-sets (latest 5) ===="
          aws cloudformation list-change-sets \
            --stack-name "${{ env.STACK_NAME }}" \
            --region "${{ env.AWS_REGION }}" \
            --query "sort_by(Summaries,&CreationTime)[-5:].[ChangeSetName,Status,ExecutionStatus,StatusReason,CreationTime]" \
            --output table || true

          LATEST_CHANGE_SET=$(aws cloudformation list-change-sets \
            --stack-name "${{ env.STACK_NAME }}" \
            --region "${{ env.AWS_REGION }}" \
            --query "sort_by(Summaries,&CreationTime)[-1].ChangeSetName" \
            --output text 2>/dev/null || true)

          if [ -n "$LATEST_CHANGE_SET" ] && [ "$LATEST_CHANGE_SET" != "None" ]; then
            echo "==== describe-change-set ($LATEST_CHANGE_SET) ===="
            aws cloudformation describe-change-set \
              --stack-name "${{ env.STACK_NAME }}" \
              --change-set-name "$LATEST_CHANGE_SET" \
              --region "${{ env.AWS_REGION }}" || true
          fi

      - name: Read stack outputs
        id: outputs
        run: |
          OUTPUTS=$(aws cloudformation describe-stacks \
            --stack-name "${{ env.STACK_NAME }}" \
            --region "${{ env.AWS_REGION }}" \
            --query "Stacks[0].Outputs" \
            --output json)
          read_out() {
            echo "$OUTPUTS" | jq -r --arg k "$1" '.[] | select(.OutputKey==$k) | .OutputValue'
          }
          {
            echo "api-url=$(read_out ContentTrackingApiBaseUrl)"
            echo "table-name=$(read_out ContentTrackingTableName)"
            echo "dashboard-bucket=$(read_out DashboardBucketName)"
            echo "dashboard-distribution-id=$(read_out DashboardDistributionId)"
            echo "dashboard-url=$(read_out DashboardUrl)"
          } >> "$GITHUB_OUTPUT"

      - name: Install dashboard dependencies
        # See deploy.yml for rationale.
        working-directory: ui
        run: npm ci

      - name: Build dashboard
        working-directory: ui
        env:
          VITE_API_BASE_URL: ${{ steps.outputs.outputs.api-url }}
          VITE_AWS_REGION: ${{ env.AWS_REGION }}
          VITE_USER_POOL_ID: ${{ vars.USER_POOL_ID }}
          VITE_USER_POOL_CLIENT_ID: ${{ vars.USER_POOL_CLIENT_ID }}
        run: npm run build

      - name: Sync dashboard to S3
        run: |
          BUCKET="${{ steps.outputs.outputs.dashboard-bucket }}"
          aws s3 sync ui/dist/ "s3://${BUCKET}/" \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "*.html"
          aws s3 sync ui/dist/ "s3://${BUCKET}/" \
            --cache-control "public, max-age=0, must-revalidate" \
            --content-type "text/html; charset=utf-8" \
            --exclude "*" \
            --include "*.html"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ steps.outputs.outputs.dashboard-distribution-id }}" \
            --paths "/*"

      - name: Write deployment summary
        run: |
          {
            echo "## Booked production deploy"
            echo
            echo "- **Stack:** \`${{ env.STACK_NAME }}\`"
            echo "- **Region:** \`${{ env.AWS_REGION }}\`"
            echo "- **API URL:** ${{ steps.outputs.outputs.api-url }}"
            echo "- **Dashboard URL:** ${{ steps.outputs.outputs.dashboard-url }}"
            echo "- **Table:** \`${{ steps.outputs.outputs.table-name }}\`"
            echo "- **Tag:** \`${{ github.ref_name }}\`"
            echo "- **Commit:** \`${{ github.sha }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
