name: Deploy (production)

on:
  push:
    tags:
      - 'v*.*.*'

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: sam deploy production
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Set up Python (for SAM CLI)
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up AWS SAM CLI
        uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN_PRODUCTION }}
          aws-region: us-east-1

      - name: SAM build
        run: sam build

      - name: SAM deploy
        run: |
          sam deploy \
            --config-env prod \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --parameter-overrides \
              "Environment=production" \
              "NewsletterApiBaseUrl=/newsletter-service/production/newsletter-api-base-url" \
              "CampaignShortLinkBase=/newsletter-service/production/campaign-short-link-base" \
              "ApiKeyValue=${{ secrets.API_KEY_VALUE_PRODUCTION }}" \
              "NewsletterMintApiKey=${{ secrets.NEWSLETTER_MINT_API_KEY_PRODUCTION }}"
