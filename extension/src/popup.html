<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Booked</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header class="header">
      <h1>Booked</h1>
      <span class="subtitle">Creator companion</span>
    </header>

    <main id="content">
      <p class="muted" id="loading">Loading…</p>
    </main>

    <footer class="footer">
      <span id="synced" class="muted"></span>
    </footer>

    <template id="pair-tpl">
      <p class="muted">
        Generate a pairing code in Booked under
        <span id="pair-settings-slot"><strong>Settings → Extension</strong></span>, then paste
        it below.
      </p>
      <label for="pair-token" class="muted small">Pairing code</label>
      <textarea
        id="pair-token"
        rows="3"
        placeholder="Paste the code from Booked"
        spellcheck="false"
        autocomplete="off"
      ></textarea>
      <button id="pair" class="primary">Pair extension</button>
      <p class="error" id="pair-error" hidden></p>
    </template>

    <template id="setup-tpl">
      <p class="error">
        This build is missing its Booked API URL. Download a fresh extension zip from the
        dashboard.
      </p>
    </template>

    <script type="module" src="popup.js"></script>
  </body>
</html>
