AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: >
  Influencer analytics aggregator. Owns Campaign + Vendor + Link metadata
  and the orchestration API. Single monolithic Lambda routed via Lambda
  Powertools event-handler. Newsletter-service owns the link service
  (mint, redirect, click capture, analytics) so this stack is a pure
  consumer.

Parameters:
  Environment:
    Type: String
    AllowedValues: [staging, production]
  CognitoUserPoolArn:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /readysetcloud/auth/user-pool-arn
    Description: |
      SSM path resolving to the rsc-core Cognito user pool ARN used as
      the API authorizer. Resolved at deploy time because the API
      Gateway authorizer can't read SSM at runtime.
  NewsletterMintApiKey:
    Type: String
    NoEcho: true
    MinLength: 20
    Description: |
      Newsletter-service's campaign-link API key. Used to call POST /links
      when registering a Campaign Link and DELETE /links/{code} when removing
      one. Provide at deploy time via --parameter-overrides or
      samconfig.local.toml. Other cross-service URLs (newsletter API base,
      campaign short-link base) are resolved at runtime via SSM through
      Powertools parameters.
  BedrockModelId:
    Type: String
    Default: us.amazon.nova-pro-v1:0
    Description: |
      Bedrock model identifier used by POST /briefs. Cross-region inference
      profile prefix (us./eu.) is included to balance load across regions.
      Override per env via samconfig if you want to test a different model.
  BedrockRegion:
    Type: String
    Default: us-east-1
    Description: |
      Region the BedrockRuntime client is configured for. Stays separate
      from the stack region so you can route to a region where the model
      is available without moving the rest of the stack.
  DashboardCustomDomain:
    Type: String
    Default: ""
    Description: |
      Optional custom domain for the dashboard (e.g. tracking.example.com).
      Leave empty to serve from the CloudFront-issued domain only.
      DashboardHostedZoneId must be set alongside this for the custom
      domain to deploy; setting just one is a no-op.
  DashboardHostedZoneId:
    Type: String
    Default: ""
    Description: |
      Route53 hosted zone id containing DashboardCustomDomain. The
      stack creates the ACM certificate and validates it via DNS
      records in this zone.
  ApiCustomDomain:
    Type: String
    Default: ""
    Description: |
      Optional custom domain for the REST API (e.g. api.tracking.example.com).
      Leave empty to serve from the autogenerated execute-api hostname.
      ApiHostedZoneId must be set alongside this for the custom domain
      to deploy; setting just one is a no-op.
  ApiHostedZoneId:
    Type: String
    Default: ""
    Description: |
      Route53 hosted zone id containing ApiCustomDomain. The stack
      creates the ACM certificate and validates it via DNS records
      in this zone.

# Combined conditions so partial-set (one param without the other) is a
# no-op rather than a deploy error. Mirrors newsletter-service's
# DeployCustomDomain pattern.
Conditions:
  HasDashboardCustomDomain: !Not [!Equals [!Ref DashboardCustomDomain, ""]]
  HasDashboardHostedZoneId: !Not [!Equals [!Ref DashboardHostedZoneId, ""]]
  DeployDashboardCustomDomain: !And
    - !Condition HasDashboardCustomDomain
    - !Condition HasDashboardHostedZoneId
  HasApiCustomDomain: !Not [!Equals [!Ref ApiCustomDomain, ""]]
  HasApiHostedZoneId: !Not [!Equals [!Ref ApiHostedZoneId, ""]]
  DeployApiCustomDomain: !And
    - !Condition HasApiCustomDomain
    - !Condition HasApiHostedZoneId

Metadata:
  esbuild-properties: &esbuild-properties
    Format: esm
    Minify: true
    OutExtension:
      - .js=.mjs
    Target: es2022
    Sourcemap: false
    EntryPoints:
      - index.mjs
    Banner:
      - js=import { createRequire } from 'module'; const require = createRequire(import.meta.url);
    External: []

Globals:
  Function:
    Architectures: [arm64]
    Tracing: Active
    Timeout: 15
    MemorySize: 512
    Runtime: nodejs24.x
    Environment:
      Variables:
        TABLE_NAME: !Ref ContentTrackingTable
        LOG_LEVEL: info
        ENVIRONMENT: !Ref Environment
        POWERTOOLS_SERVICE_NAME: booked
        # NewsletterApiBaseUrl and CampaignShortLinkBase are fetched from
        # SSM at runtime via Powertools parameters (5-min cache). The SSM
        # paths embed ENVIRONMENT so the same Lambda code resolves the
        # right value per stack.
        NEWSLETTER_MINT_API_KEY: !Ref NewsletterMintApiKey
        BRIEFS_BUCKET: !Ref BriefsBucket
        BEDROCK_MODEL_ID: !Ref BedrockModelId
        BEDROCK_REGION: !Ref BedrockRegion
        # Origin the Lambda echoes back as Access-Control-Allow-Origin.
        # Mirrors the DashboardUrl output: custom domain when set, else
        # the autogenerated CloudFront hostname. Kept in sync with the
        # API Gateway-level Cors block on ContentTrackingApi so preflight
        # and the actual response agree on a single origin.
        CORS_ALLOWED_ORIGIN: !If
          - DeployDashboardCustomDomain
          - !Sub "https://${DashboardCustomDomain}"
          - !Sub "https://${DashboardDistribution.DomainName}"

Resources:
  ContentTrackingTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: sk
          AttributeType: S
        - AttributeName: gsi1pk
          AttributeType: S
        - AttributeName: gsi1sk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE
      GlobalSecondaryIndexes:
        # GSI1 backs the "list all of entity X sorted by created_at" and
        # "campaigns in date range" patterns so every read path is a Query
        # (no Scans anywhere).
        #
        # gsi1pk = ENTITY name (CAMPAIGNS, VENDORS)
        # gsi1sk = "{ISO createdAt}#{ulid}" so date-range KeyConditionExpressions
        #          on gsi1sk work and ties within the same millisecond
        #          stay ordered.
        - IndexName: GSI1
          KeySchema:
            - AttributeName: gsi1pk
              KeyType: HASH
            - AttributeName: gsi1sk
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      # `expiresAt` powers TTL-based cleanup of idempotency records the
      # Lambda writes under pk=IDEMPOTENCY#{hash} (Powertools' DynamoDB
      # persistence layer manages those entries).
      TimeToLiveSpecification:
        AttributeName: expiresAt
        Enabled: true

  # Holds raw brief uploads (PDFs uploaded via presigned URL from the client,
  # plus chat transcripts the brief pipeline writes inline). Separate
  # bucket per environment so staging tests can't accidentally read prod
  # briefs. Lifecycle policy ages out raw uploads after a year; brief
  # summaries (which live in DynamoDB) stay indefinitely.
  BriefsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "content-tracking-briefs-${Environment}-${AWS::AccountId}"
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: ArchiveRawAfter90Days
            Status: Enabled
            Prefix: uploads/
            Transitions:
              - StorageClass: STANDARD_IA
                TransitionInDays: 90
            ExpirationInDays: 365
          - Id: ExpireFailedUploadsAfter7Days
            Status: Enabled
            AbortIncompleteMultipartUpload:
              DaysAfterInitiation: 7
      CorsConfiguration:
        # Browsers PUT directly to presigned URLs (upload flow) and GET
        # them back for the audit-view download URLs returned by
        # GET /briefs/{briefId}. Both need to be allowed cross-origin
        # so the dashboard at a different origin can use them.
        CorsRules:
          - AllowedMethods: [GET, PUT]
            AllowedOrigins: ["*"]
            AllowedHeaders: ["*"]
            ExposedHeaders: [ETag]
            MaxAge: 300

  ContentTrackingApi:
    Type: AWS::Serverless::Api
    Properties:
      TracingEnabled: true
      StageName: v1
      MethodSettings:
        - MetricsEnabled: True
          ResourcePath: "/*"
          HttpMethod: "*"
          LoggingLevel: INFO
      # Authorizer is configured at the SAM Api level rather than via an
      # OpenAPI DefinitionBody so it applies to every route (including the
      # proxy catch-all). publicapi.yaml stays in the repo as documentation
      # but is no longer fed into API Gateway.
      Auth:
        DefaultAuthorizer: CognitoUserPoolAuthorizer
        # AddDefaultAuthorizerToCorsPreflight=false leaves the SAM-generated
        # OPTIONS methods unauthenticated. Browsers send preflight without
        # credentials, so the Cognito authorizer would reject them and the
        # real request would never go out.
        AddDefaultAuthorizerToCorsPreflight: false
        Authorizers:
          CognitoUserPoolAuthorizer:
            UserPoolArn: !Ref CognitoUserPoolArn
      # Pinned to the dashboard origin (custom domain when set, else the
      # CloudFront hostname). The single-quote wrapping is required: SAM
      # passes these straight into the API Gateway integration response
      # mapping, which expects a quoted string literal.
      Cors:
        AllowOrigin: !If
          - DeployDashboardCustomDomain
          - !Sub "'https://${DashboardCustomDomain}'"
          - !Sub "'https://${DashboardDistribution.DomainName}'"
        AllowHeaders: "'authorization,content-type,idempotency-key'"
        AllowMethods: "'GET,POST,PUT,PATCH,DELETE,OPTIONS'"

  # Optional custom domain for the REST API. Mirrors the pattern
  # newsletter-service uses: REGIONAL endpoint type, TLS 1.2,
  # BasePathMapping with no BasePath so the custom-domain root maps
  # directly to the v1 stage, ACM cert auto-provisioned via DNS
  # validation against the hosted zone the caller supplied.
  ApiCertificate:
    Type: AWS::CertificateManager::Certificate
    Condition: DeployApiCustomDomain
    Properties:
      DomainName: !Ref ApiCustomDomain
      ValidationMethod: DNS
      DomainValidationOptions:
        - DomainName: !Ref ApiCustomDomain
          HostedZoneId: !Ref ApiHostedZoneId

  ApiCustomDomainName:
    Type: AWS::ApiGateway::DomainName
    Condition: DeployApiCustomDomain
    Properties:
      DomainName: !Ref ApiCustomDomain
      RegionalCertificateArn: !Ref ApiCertificate
      EndpointConfiguration:
        Types: [REGIONAL]
      SecurityPolicy: TLS_1_2

  ApiBasePathMapping:
    Type: AWS::ApiGateway::BasePathMapping
    Condition: DeployApiCustomDomain
    # SAM expands AWS::Serverless::Api with StageName: v1 into a stage
    # resource whose logical id is ${ApiName}${StageName}Stage. The
    # mapping must wait for that stage to exist.
    DependsOn: ContentTrackingApiv1Stage
    Properties:
      DomainName: !Ref ApiCustomDomainName
      RestApiId: !Ref ContentTrackingApi
      Stage: v1

  ApiDnsRecord:
    Type: AWS::Route53::RecordSet
    Condition: DeployApiCustomDomain
    Properties:
      HostedZoneId: !Ref ApiHostedZoneId
      Name: !Ref ApiCustomDomain
      Type: A
      AliasTarget:
        DNSName: !GetAtt ApiCustomDomainName.RegionalDomainName
        HostedZoneId: !GetAtt ApiCustomDomainName.RegionalHostedZoneId
        EvaluateTargetHealth: false

  ApiFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        <<: *esbuild-properties
        EntryPoints:
          - index.mjs
    Properties:
      CodeUri: api
      Handler: index.handler
      # Bigger memory and longer timeout than the per-route functions because
      # this single Lambda serves every route. Revenue rollups and Bedrock
      # calls are the heaviest paths.
      MemorySize: 1024
      Timeout: 30
      Policies:
        - AWSLambdaBasicExecutionRole
        - Version: 2012-10-17
          Statement:
            # DynamoDB: union of every per-route operation across the API.
            # Limited to the main table + its indexes. No Scan anywhere.
            - Effect: Allow
              Action:
                - dynamodb:GetItem
                - dynamodb:PutItem
                - dynamodb:UpdateItem
                - dynamodb:DeleteItem
                - dynamodb:Query
                - dynamodb:BatchGetItem
                - dynamodb:BatchWriteItem
                - dynamodb:TransactWriteItems
                - dynamodb:ConditionCheckItem
              Resource:
                - !GetAtt ContentTrackingTable.Arn
                - !Sub "${ContentTrackingTable.Arn}/index/*"
            # SSM: runtime reads for newsletter-service URLs. Scope to the
            # exact paths the Lambda fetches so a misconfig can't pull
            # unrelated parameters.
            - Effect: Allow
              Action:
                - ssm:GetParameter
                - ssm:GetParameters
              Resource:
                - !Sub "arn:${AWS::Partition}:ssm:${AWS::Region}:${AWS::AccountId}:parameter/newsletter-service/${Environment}/*"
            # S3: read + write objects in the briefs bucket. PutObject is
            # used by the chat-source flow (writing transcripts inline) and
            # by presigned-URL signing for PDF uploads. GetObject is used
            # both by the brief pipeline (reading uploads back) and by the
            # presigned download URL for the audit view.
            - Effect: Allow
              Action:
                - s3:PutObject
                - s3:GetObject
                - s3:DeleteObject
              Resource:
                - !Sub "${BriefsBucket.Arn}/*"
            # Bedrock: invoke the configured model. Cross-region inference
            # profiles (us./eu. prefixes) are foundation-model ARNs in the
            # bedrock region with a wildcard for the variant.
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
                - bedrock:Converse
              Resource:
                - !Sub "arn:${AWS::Partition}:bedrock:*::foundation-model/*"
                - !Sub "arn:${AWS::Partition}:bedrock:*:${AWS::AccountId}:inference-profile/*"
      Events:
        ProxyAny:
          Type: Api
          Properties:
            RestApiId: !Ref ContentTrackingApi
            Path: /{proxy+}
            Method: ANY
        Root:
          Type: Api
          Properties:
            RestApiId: !Ref ContentTrackingApi
            Path: /
            Method: ANY

  # Static hosting for the dashboard UI. Bucket is private; only the
  # CloudFront distribution (via OAC) can read it. SPA routing is
  # handled by rewriting 403/404 to /index.html so deep links survive a
  # refresh. The CI deploy step builds ui/, syncs the output here, and
  # invalidates the distribution.
  DashboardBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "content-tracking-dashboard-${Environment}-${AWS::AccountId}"
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced

  DashboardOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub "${AWS::StackName}-${Environment}-dashboard-oac"
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  # HSTS, X-Content-Type-Options, X-Frame-Options, Referrer-Policy.
  # Applied to every response served by the distribution. We pin
  # frame-ancestors to deny because nothing in the dashboard needs to
  # be embedded.
  DashboardResponseHeadersPolicy:
    Type: AWS::CloudFront::ResponseHeadersPolicy
    Properties:
      ResponseHeadersPolicyConfig:
        Name: !Sub "${AWS::StackName}-${Environment}-dashboard-headers"
        SecurityHeadersConfig:
          ContentTypeOptions:
            Override: true
          FrameOptions:
            FrameOption: DENY
            Override: true
          ReferrerPolicy:
            ReferrerPolicy: strict-origin-when-cross-origin
            Override: true
          StrictTransportSecurity:
            AccessControlMaxAgeSec: 63072000
            IncludeSubdomains: true
            Preload: true
            Override: true

  DashboardDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: !Sub "${AWS::StackName} dashboard (${Environment})"
        DefaultRootObject: index.html
        HttpVersion: http2
        IPV6Enabled: true
        # PriceClass_100 keeps cost down (US/EU edges only). Personal-scale
        # usage; revisit if a non-US/EU audience matters later.
        PriceClass: PriceClass_100
        Aliases: !If
          - DeployDashboardCustomDomain
          - [!Ref DashboardCustomDomain]
          - !Ref AWS::NoValue
        ViewerCertificate: !If
          - DeployDashboardCustomDomain
          - AcmCertificateArn: !Ref DashboardCertificate
            SslSupportMethod: sni-only
            MinimumProtocolVersion: TLSv1.2_2021
          - CloudFrontDefaultCertificate: true
        Origins:
          - Id: dashboard-origin
            DomainName: !GetAtt DashboardBucket.RegionalDomainName
            S3OriginConfig:
              OriginAccessIdentity: ""
            OriginAccessControlId: !GetAtt DashboardOAC.Id
        DefaultCacheBehavior:
          TargetOriginId: dashboard-origin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods: [GET, HEAD]
          CachedMethods: [GET, HEAD]
          Compress: true
          # CachingOptimized — AWS managed cache policy id. Honors
          # origin Cache-Control headers, which is exactly what the CI
          # sync uses to split index.html (no-cache) from /assets/*
          # (immutable, 1y).
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
          ResponseHeadersPolicyId: !Ref DashboardResponseHeadersPolicy
        CustomErrorResponses:
          # SPA routing — react-router needs /index.html for any path
          # the bucket doesn't have an object for. OAC + private bucket
          # returns 403 for missing keys (not 404), so we rewrite both.
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 0
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 0

  DashboardBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref DashboardBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowCloudFrontOACRead
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "${DashboardBucket.Arn}/*"
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub "arn:${AWS::Partition}:cloudfront::${AWS::AccountId}:distribution/${DashboardDistribution}"

  # Z2FDTNDATAQYW2 is the CloudFront alias hosted zone — constant for
  # every distribution per AWS docs.
  DashboardDnsRecord:
    Type: AWS::Route53::RecordSet
    Condition: DeployDashboardCustomDomain
    Properties:
      HostedZoneId: !Ref DashboardHostedZoneId
      Name: !Ref DashboardCustomDomain
      Type: A
      AliasTarget:
        DNSName: !GetAtt DashboardDistribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2
        EvaluateTargetHealth: false

  # ACM cert for the dashboard's custom domain. CloudFront requires the
  # cert in us-east-1; the rest of the stack lives there too so this
  # works without a separate cert stack. DNS validation auto-creates
  # the validation CNAMEs through the hosted zone the caller passed.
  DashboardCertificate:
    Type: AWS::CertificateManager::Certificate
    Condition: DeployDashboardCustomDomain
    Properties:
      DomainName: !Ref DashboardCustomDomain
      ValidationMethod: DNS
      DomainValidationOptions:
        - DomainName: !Ref DashboardCustomDomain
          HostedZoneId: !Ref DashboardHostedZoneId

Outputs:
  ContentTrackingTableName:
    Description: DynamoDB single-table for Booked
    Value: !Ref ContentTrackingTable

  ContentTrackingApiBaseUrl:
    Description: |
      Base URL for the Booked REST API. Surfaces the custom
      domain (root path, no /v1 prefix) when ApiCustomDomain is set,
      otherwise the autogenerated execute-api hostname with the /v1
      stage path. Dashboard build picks this up via the deploy
      workflow's stack-output read.
    Value: !If
      - DeployApiCustomDomain
      - !Sub "https://${ApiCustomDomain}"
      - !Sub "https://${ContentTrackingApi}.execute-api.${AWS::Region}.amazonaws.com/v1"

  DashboardBucketName:
    Description: S3 bucket holding the dashboard static bundle
    Value: !Ref DashboardBucket

  DashboardDistributionId:
    Description: CloudFront distribution id (used by the deploy workflow for invalidations)
    Value: !Ref DashboardDistribution

  DashboardUrl:
    Description: URL the dashboard is served at
    Value: !If
      - DeployDashboardCustomDomain
      - !Sub "https://${DashboardCustomDomain}"
      - !Sub "https://${DashboardDistribution.DomainName}"
