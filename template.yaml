AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: >
  Influencer analytics aggregator. Owns Campaign + Link metadata and the
  orchestration API. Newsletter-service owns the link service (mint,
  redirect, click capture, analytics) so this stack is a pure consumer.

Parameters:
  Environment:
    Type: String
    AllowedValues: [staging, production]
  NewsletterApiBaseUrl:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /newsletter-service/staging/newsletter-api-base-url
    Description: SSM path resolving to newsletter-service's NewsletterApi base URL
  CampaignShortLinkBase:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /newsletter-service/staging/campaign-short-link-base
    Description: SSM path resolving to the campaign short link base URL (e.g. https://rdyset.click/c)
  CognitoUserPoolArn:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /readysetcloud/auth/user-pool-arn
    Description: SSM path resolving to the rsc-core Cognito user pool ARN used as the API authorizer
  NewsletterMintApiKey:
    Type: String
    NoEcho: true
    MinLength: 20
    Description: |
      Newsletter-service's campaign-link API key value. Must match the value
      that stack was deployed with. Used to call POST /links when registering
      a Campaign Link.

Metadata:
  esbuild-properties: &esbuild-properties
    Format: esm
    Minify: true
    OutExtension:
      - .js=.mjs
    Target: es2020
    Sourcemap: false
    EntryPoints:
      - index.mjs
    Banner:
      - js=import { createRequire } from 'module'; const require = createRequire(import.meta.url);
    External: []

Globals:
  Function:
    Architectures:
      - arm64
    Tracing: Active
    Timeout: 15
    MemorySize: 512
    Runtime: nodejs24.x
    Environment:
      Variables:
        TABLE_NAME: !Ref ContentTrackingTable
        LOG_LEVEL: info

Resources:
  ContentTrackingTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: sk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true

  ContentTrackingApi:
    Type: AWS::Serverless::Api
    Properties:
      TracingEnabled: true
      StageName: v1
      MethodSettings:
        - MetricsEnabled: True
          ResourcePath: "/*"
          HttpMethod: "*"
          LoggingLevel: INFO
      DefinitionBody:
        Fn::Transform:
          Name: AWS::Include
          Parameters:
            Location: ./publicapi.yaml

  CreateCampaignFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        <<: *esbuild-properties
        EntryPoints:
          - create-campaign.mjs
    Properties:
      CodeUri: functions
      Handler: create-campaign.handler
      Policies:
        - AWSLambdaBasicExecutionRole
        - Version: 2012-10-17
          Statement:
            # GetItem: vendor existence check before transactional write
            # PutItem: campaign metadata + optional campaign-by-vendor index entry (via TransactWriteItems)
            - Effect: Allow
              Action:
                - dynamodb:GetItem
                - dynamodb:PutItem
              Resource: !GetAtt ContentTrackingTable.Arn
      Events:
        Create:
          Type: Api
          Properties:
            RestApiId: !Ref ContentTrackingApi
            Path: /campaigns
            Method: POST

  GetCampaignFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        <<: *esbuild-properties
        EntryPoints:
          - get-campaign.mjs
    Properties:
      CodeUri: functions
      Handler: get-campaign.handler
      Policies:
        - AWSLambdaBasicExecutionRole
        - Version: 2012-10-17
          Statement:
            - Effect: Allow
              Action:
                - dynamodb:Query
              Resource: !GetAtt ContentTrackingTable.Arn
      Events:
        Get:
          Type: Api
          Properties:
            RestApiId: !Ref ContentTrackingApi
            Path: /campaigns/{campaignId}
            Method: GET

  GetCampaignLinkAnalyticsFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        <<: *esbuild-properties
        EntryPoints:
          - get-campaign-link-analytics.mjs
    Properties:
      CodeUri: functions
      Handler: get-campaign-link-analytics.handler
      Environment:
        Variables:
          NEWSLETTER_API_BASE_URL: !Ref NewsletterApiBaseUrl
          NEWSLETTER_MINT_API_KEY: !Ref NewsletterMintApiKey
      Policies:
        - AWSLambdaBasicExecutionRole
        - Version: 2012-10-17
          Statement:
            - Effect: Allow
              Action:
                - dynamodb:GetItem
              Resource: !GetAtt ContentTrackingTable.Arn
      Events:
        Get:
          Type: Api
          Properties:
            RestApiId: !Ref ContentTrackingApi
            Path: /campaigns/{campaignId}/links/{linkId}/analytics
            Method: GET

  GetCampaignAnalyticsFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        <<: *esbuild-properties
        EntryPoints:
          - get-campaign-analytics.mjs
    Properties:
      CodeUri: functions
      Handler: get-campaign-analytics.handler
      Timeout: 30
      Environment:
        Variables:
          NEWSLETTER_API_BASE_URL: !Ref NewsletterApiBaseUrl
          NEWSLETTER_MINT_API_KEY: !Ref NewsletterMintApiKey
      Policies:
        - AWSLambdaBasicExecutionRole
        - Version: 2012-10-17
          Statement:
            - Effect: Allow
              Action:
                - dynamodb:Query
              Resource: !GetAtt ContentTrackingTable.Arn
      Events:
        Get:
          Type: Api
          Properties:
            RestApiId: !Ref ContentTrackingApi
            Path: /campaigns/{campaignId}/analytics
            Method: GET

  CreateCampaignLinkFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        <<: *esbuild-properties
        EntryPoints:
          - create-campaign-link.mjs
    Properties:
      CodeUri: functions
      Handler: create-campaign-link.handler
      Environment:
        Variables:
          NEWSLETTER_API_BASE_URL: !Ref NewsletterApiBaseUrl
          NEWSLETTER_MINT_API_KEY: !Ref NewsletterMintApiKey
          SHORT_LINK_BASE: !Ref CampaignShortLinkBase
      Policies:
        - AWSLambdaBasicExecutionRole
        - Version: 2012-10-17
          Statement:
            - Effect: Allow
              Action:
                - dynamodb:GetItem
                - dynamodb:PutItem
              Resource: !GetAtt ContentTrackingTable.Arn
      Events:
        Create:
          Type: Api
          Properties:
            RestApiId: !Ref ContentTrackingApi
            Path: /campaigns/{campaignId}/links
            Method: POST

  CreateVendorFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        <<: *esbuild-properties
        EntryPoints:
          - create-vendor.mjs
    Properties:
      CodeUri: functions
      Handler: create-vendor.handler
      Policies:
        - AWSLambdaBasicExecutionRole
        - Version: 2012-10-17
          Statement:
            - Effect: Allow
              Action:
                - dynamodb:PutItem
              Resource: !GetAtt ContentTrackingTable.Arn
      Events:
        Create:
          Type: Api
          Properties:
            RestApiId: !Ref ContentTrackingApi
            Path: /vendors
            Method: POST

  ListVendorsFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        <<: *esbuild-properties
        EntryPoints:
          - list-vendors.mjs
    Properties:
      CodeUri: functions
      Handler: list-vendors.handler
      Policies:
        - AWSLambdaBasicExecutionRole
        - Version: 2012-10-17
          Statement:
            - Effect: Allow
              Action:
                - dynamodb:Scan
              Resource: !GetAtt ContentTrackingTable.Arn
      Events:
        List:
          Type: Api
          Properties:
            RestApiId: !Ref ContentTrackingApi
            Path: /vendors
            Method: GET

  GetVendorFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        <<: *esbuild-properties
        EntryPoints:
          - get-vendor.mjs
    Properties:
      CodeUri: functions
      Handler: get-vendor.handler
      Policies:
        - AWSLambdaBasicExecutionRole
        - Version: 2012-10-17
          Statement:
            - Effect: Allow
              Action:
                - dynamodb:GetItem
              Resource: !GetAtt ContentTrackingTable.Arn
      Events:
        Get:
          Type: Api
          Properties:
            RestApiId: !Ref ContentTrackingApi
            Path: /vendors/{vendorId}
            Method: GET

  UpdateVendorFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        <<: *esbuild-properties
        EntryPoints:
          - update-vendor.mjs
    Properties:
      CodeUri: functions
      Handler: update-vendor.handler
      Policies:
        - AWSLambdaBasicExecutionRole
        - Version: 2012-10-17
          Statement:
            - Effect: Allow
              Action:
                - dynamodb:UpdateItem
              Resource: !GetAtt ContentTrackingTable.Arn
      Events:
        Update:
          Type: Api
          Properties:
            RestApiId: !Ref ContentTrackingApi
            Path: /vendors/{vendorId}
            Method: PUT

  DeleteVendorFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        <<: *esbuild-properties
        EntryPoints:
          - delete-vendor.mjs
    Properties:
      CodeUri: functions
      Handler: delete-vendor.handler
      Policies:
        - AWSLambdaBasicExecutionRole
        - Version: 2012-10-17
          Statement:
            # Query: check for linked campaigns before allowing the delete
            # DeleteItem: remove the vendor metadata record
            - Effect: Allow
              Action:
                - dynamodb:Query
                - dynamodb:DeleteItem
              Resource: !GetAtt ContentTrackingTable.Arn
      Events:
        Delete:
          Type: Api
          Properties:
            RestApiId: !Ref ContentTrackingApi
            Path: /vendors/{vendorId}
            Method: DELETE

  ListVendorCampaignsFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        <<: *esbuild-properties
        EntryPoints:
          - list-vendor-campaigns.mjs
    Properties:
      CodeUri: functions
      Handler: list-vendor-campaigns.handler
      Policies:
        - AWSLambdaBasicExecutionRole
        - Version: 2012-10-17
          Statement:
            # GetItem: confirm the vendor exists before querying
            # Query: read the campaign-by-vendor index entries
            - Effect: Allow
              Action:
                - dynamodb:GetItem
                - dynamodb:Query
              Resource: !GetAtt ContentTrackingTable.Arn
      Events:
        List:
          Type: Api
          Properties:
            RestApiId: !Ref ContentTrackingApi
            Path: /vendors/{vendorId}/campaigns
            Method: GET

Outputs:
  ContentTrackingTableName:
    Description: DynamoDB single-table for content-tracking
    Value: !Ref ContentTrackingTable

  ContentTrackingApiBaseUrl:
    Description: Base URL for the content-tracking REST API
    Value: !Sub "https://${ContentTrackingApi}.execute-api.${AWS::Region}.amazonaws.com/v1"
