AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: >
  Influencer analytics aggregator. Step 1+2: campaign click capture
  and the Campaign/Link orchestration API. Short links are minted by
  newsletter-service; this stack stores campaign + link metadata and
  consumes clicks that flow through rdyset.click/c/{code}.

Parameters:
  Environment:
    Type: String
    AllowedValues: [sandbox, stage, production]
  CampaignRedirectLogGroupName:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /newsletter-service/sandbox/campaign-redirect-log-group-name
    Description: SSM path resolving to the campaign short-redirect CloudFront Function log group
  NewsletterApiBaseUrl:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /newsletter-service/sandbox/newsletter-api-base-url
    Description: SSM path resolving to newsletter-service's NewsletterApi base URL
  NewsletterMintApiKeySecretArn:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /newsletter-service/sandbox/campaign-link-api-key-secret-arn
    Description: SSM path resolving to the Secrets Manager ARN holding newsletter-service's mint API key
  CampaignShortLinkBase:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /newsletter-service/sandbox/campaign-short-link-base
    Description: SSM path resolving to the campaign short link base URL (e.g. https://rdyset.click/c)

Metadata:
  esbuild-properties: &esbuild-properties
    Format: esm
    Minify: true
    OutExtension:
      - .js=.mjs
    Target: es2020
    Sourcemap: false
    EntryPoints:
      - index.mjs
    Banner:
      - js=import { createRequire } from 'module'; const require = createRequire(import.meta.url);
    External: []

Globals:
  Function:
    Architectures:
      - arm64
    Tracing: Active
    Timeout: 15
    MemorySize: 512
    Runtime: nodejs24.x
    Environment:
      Variables:
        TABLE_NAME: !Ref ContentTrackingTable
        LOG_LEVEL: info

Resources:
  ContentTrackingTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: sk
          AttributeType: S
        - AttributeName: gsi1pk
          AttributeType: S
        - AttributeName: gsi1sk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: gsi1
          KeySchema:
            - AttributeName: gsi1pk
              KeyType: HASH
            - AttributeName: gsi1sk
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true

  ContentTrackingApi:
    Type: AWS::Serverless::Api
    Properties:
      TracingEnabled: true
      StageName: v1
      MethodSettings:
        - MetricsEnabled: True
          ResourcePath: "/*"
          HttpMethod: "*"
          LoggingLevel: INFO
      DefinitionBody:
        Fn::Transform:
          Name: AWS::Include
          Parameters:
            Location: ./publicapi.yaml

  ContentTrackingApiKeySecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub "/content-tracking/${Environment}/api-key"
      Description: API key value for the content-tracking REST API
      GenerateSecretString:
        PasswordLength: 40
        ExcludePunctuation: true

  ContentTrackingApiKey:
    Type: AWS::ApiGateway::ApiKey
    DependsOn:
      - ContentTrackingApiv1Stage
      - ContentTrackingApiKeySecret
    Properties:
      Name: !Sub "${AWS::StackName}-api"
      Description: API key for the content-tracking REST API
      Enabled: true
      Value: !Sub "{{resolve:secretsmanager:/content-tracking/${Environment}/api-key:SecretString}}"
      StageKeys:
        - RestApiId: !Ref ContentTrackingApi
          StageName: v1

  ContentTrackingUsagePlan:
    Type: AWS::ApiGateway::UsagePlan
    DependsOn: ContentTrackingApiv1Stage
    Properties:
      UsagePlanName: !Sub "${AWS::StackName}-api"
      Description: Usage plan for the content-tracking REST API
      ApiStages:
        - ApiId: !Ref ContentTrackingApi
          Stage: v1
      Throttle:
        BurstLimit: 10
        RateLimit: 5

  ContentTrackingUsagePlanKey:
    Type: AWS::ApiGateway::UsagePlanKey
    Properties:
      KeyId: !Ref ContentTrackingApiKey
      KeyType: API_KEY
      UsagePlanId: !Ref ContentTrackingUsagePlan

  CreateCampaignFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        <<: *esbuild-properties
        EntryPoints:
          - create-campaign.mjs
    Properties:
      CodeUri: functions
      Handler: create-campaign.handler
      Policies:
        - AWSLambdaBasicExecutionRole
        - Version: 2012-10-17
          Statement:
            - Effect: Allow
              Action:
                - dynamodb:PutItem
              Resource: !GetAtt ContentTrackingTable.Arn
      Events:
        Create:
          Type: Api
          Properties:
            RestApiId: !Ref ContentTrackingApi
            Path: /campaigns
            Method: POST
            Auth:
              ApiKeyRequired: true

  CreateCampaignLinkFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        <<: *esbuild-properties
        EntryPoints:
          - create-campaign-link.mjs
    Properties:
      CodeUri: functions
      Handler: create-campaign-link.handler
      Environment:
        Variables:
          NEWSLETTER_API_BASE_URL: !Ref NewsletterApiBaseUrl
          NEWSLETTER_API_KEY_SECRET_ARN: !Ref NewsletterMintApiKeySecretArn
          SHORT_LINK_BASE: !Ref CampaignShortLinkBase
      Policies:
        - AWSLambdaBasicExecutionRole
        - Version: 2012-10-17
          Statement:
            - Effect: Allow
              Action:
                - dynamodb:GetItem
                - dynamodb:PutItem
              Resource: !GetAtt ContentTrackingTable.Arn
            - Effect: Allow
              Action:
                - secretsmanager:GetSecretValue
              Resource: !Ref NewsletterMintApiKeySecretArn
      Events:
        Create:
          Type: Api
          Properties:
            RestApiId: !Ref ContentTrackingApi
            Path: /campaigns/{campaignId}/links
            Method: POST
            Auth:
              ApiKeyRequired: true

  ProcessCampaignClickFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        <<: *esbuild-properties
        EntryPoints:
          - process-campaign-click.mjs
    Properties:
      CodeUri: functions
      Handler: process-campaign-click.handler
      Policies:
        - AWSLambdaBasicExecutionRole
        - Version: 2012-10-17
          Statement:
            - Effect: Allow
              Action:
                - dynamodb:PutItem
                - dynamodb:UpdateItem
              Resource: !GetAtt ContentTrackingTable.Arn

  ProcessCampaignClickLogPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref ProcessCampaignClickFunction
      Principal: !Sub "logs.${AWS::Region}.amazonaws.com"
      SourceArn: !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:${CampaignRedirectLogGroupName}:*"

  CampaignClickSubscriptionFilter:
    Type: AWS::Logs::SubscriptionFilter
    DependsOn: ProcessCampaignClickLogPermission
    Properties:
      LogGroupName: !Ref CampaignRedirectLogGroupName
      FilterPattern: '"campaign#"'
      DestinationArn: !GetAtt ProcessCampaignClickFunction.Arn

Outputs:
  ContentTrackingTableName:
    Description: DynamoDB single-table for content-tracking
    Value: !Ref ContentTrackingTable

  ContentTrackingApiBaseUrl:
    Description: Base URL for the content-tracking REST API
    Value: !Sub "https://${ContentTrackingApi}.execute-api.${AWS::Region}.amazonaws.com/v1"

  ContentTrackingApiKeySecretArn:
    Description: Secrets Manager ARN holding the content-tracking API key value
    Value: !Ref ContentTrackingApiKeySecret
