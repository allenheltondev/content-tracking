AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: >
  Influencer analytics aggregator. Step 1: campaign click capture.
  Short links are minted by newsletter-service; this stack only consumes
  clicks that flow through rdyset.click/c/{code}.

Parameters:
  Environment:
    Type: String
    AllowedValues: [sandbox, stage, production]
  CampaignRedirectLogGroupName:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /newsletter-service/sandbox/campaign-redirect-log-group-name
    Description: SSM path resolving to the CloudWatch Logs group name for newsletter-service's campaign short-redirect CloudFront Function

Metadata:
  esbuild-properties: &esbuild-properties
    Format: esm
    Minify: true
    OutExtension:
      - .js=.mjs
    Target: es2020
    Sourcemap: false
    EntryPoints:
      - index.mjs
    Banner:
      - js=import { createRequire } from 'module'; const require = createRequire(import.meta.url);
    External: []

Globals:
  Function:
    Architectures:
      - arm64
    Tracing: Active
    Timeout: 15
    MemorySize: 512
    Runtime: nodejs24.x
    Environment:
      Variables:
        TABLE_NAME: !Ref ContentTrackingTable
        LOG_LEVEL: info

Resources:
  ContentTrackingTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: sk
          AttributeType: S
        - AttributeName: gsi1pk
          AttributeType: S
        - AttributeName: gsi1sk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: gsi1
          KeySchema:
            - AttributeName: gsi1pk
              KeyType: HASH
            - AttributeName: gsi1sk
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true

  ProcessCampaignClickFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        <<: *esbuild-properties
        EntryPoints:
          - process-campaign-click.mjs
    Properties:
      CodeUri: functions
      Handler: process-campaign-click.handler
      Policies:
        - AWSLambdaBasicExecutionRole
        - Version: 2012-10-17
          Statement:
            - Effect: Allow
              Action:
                - dynamodb:PutItem
                - dynamodb:UpdateItem
              Resource: !GetAtt ContentTrackingTable.Arn

  ProcessCampaignClickLogPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref ProcessCampaignClickFunction
      Principal: !Sub "logs.${AWS::Region}.amazonaws.com"
      SourceArn: !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:${CampaignRedirectLogGroupName}:*"

  CampaignClickSubscriptionFilter:
    Type: AWS::Logs::SubscriptionFilter
    DependsOn: ProcessCampaignClickLogPermission
    Properties:
      LogGroupName: !Ref CampaignRedirectLogGroupName
      FilterPattern: '"campaign#"'
      DestinationArn: !GetAtt ProcessCampaignClickFunction.Arn

Outputs:
  ContentTrackingTableName:
    Description: DynamoDB single-table for content-tracking
    Value: !Ref ContentTrackingTable
