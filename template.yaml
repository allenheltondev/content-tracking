AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: >
  Influencer analytics aggregator. Owns Campaign + Vendor + Link metadata
  and the orchestration API. Single monolithic Lambda routed via Lambda
  Powertools event-handler. Newsletter-service owns the link service
  (mint, redirect, click capture, analytics) so this stack is a pure
  consumer.

Parameters:
  Environment:
    Type: String
    AllowedValues: [staging, production]
  CognitoUserPoolArn:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /readysetcloud/auth/user-pool-arn
    Description: |
      SSM path resolving to the rsc-core Cognito user pool ARN used as
      the API authorizer. Resolved at deploy time because the API
      Gateway authorizer can't read SSM at runtime.
  UserPoolId:
    Type: String
    Description: |
      Cognito user pool id (e.g. us-east-1_AbCdEfGhI). Used by the
      Lambda authorizer to verify dashboard id tokens via JWKS. The
      pool id is derivable from CognitoUserPoolArn but CFN can't split
      an SSM-resolved value at deploy time, so it's passed in directly
      by the deploy workflows.
  ExtensionTokenSigningKey:
    Type: String
    NoEcho: true
    MinLength: 32
    Description: |
      HMAC-SHA256 signing key for Chrome-extension pairing tokens.
      Generated once per environment with
      `node scripts/generate-extension-signing-key.mjs`, then stored as
      a GitHub secret (EXTENSION_TOKEN_SIGNING_KEY) on the Staging and
      Production environments. Rotation: change the secret and redeploy;
      every minted token becomes invalid simultaneously (no kid-based
      acceptance window yet).
  CoreApiUrl:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /readysetcloud/api-url
    Description: |
      Shared rsc-core Core API base URL (prod: https://api.readysetcloud.io/core),
      resolved at deploy from the rsc-core-owned SSM parameter. Not used by the
      backend; surfaced as the CoreApiUrl output so the deploy workflow can build
      it into the dashboard as VITE_CORE_API_URL. The "Ask your blog" widget uses
      it to presign the wss:// connection (POST /agent/connect) and hides itself
      when it's unset.
  NewsletterMintApiKey:
    Type: String
    NoEcho: true
    MinLength: 20
    Description: |
      Newsletter-service's campaign-link API key. Used to call POST /links
      when registering a Campaign Link and DELETE /links/{code} when removing
      one. Provide at deploy time via --parameter-overrides or
      samconfig.local.toml. Other cross-service URLs (newsletter API base,
      campaign short-link base) are resolved at runtime via SSM through
      Powertools parameters.
  VendorReportsSigningPublicKey:
    Type: String
    NoEcho: true
    Description: |
      RSA public key (PEM) registered with CloudFront as the trusted
      public key for verifying vendor-report signed URLs. Generated once
      per environment alongside its private counterpart (see the openssl
      steps in the deploy docs), then stored as the GitHub secret
      VENDOR_REPORTS_SIGNING_PUBLIC_KEY on the Staging and Production
      environments. Rotation: generate a new pair, update both secrets,
      and redeploy; outstanding signed URLs minted with the old key stop
      verifying once the public key is replaced.
  VendorReportsSigningPrivateKey:
    Type: String
    NoEcho: true
    Description: |
      RSA private key (PEM) the API Lambda uses to sign vendor-report
      CloudFront URLs. Matches VendorReportsSigningPublicKey. Provided at
      deploy time from the GitHub secret VENDOR_REPORTS_SIGNING_PRIVATE_KEY
      and threaded into the API Lambda as VENDOR_REPORTS_SIGNING_PRIVATE_KEY.
  VendorReportsRetentionDays:
    Type: Number
    Default: 90
    MinValue: 1
    Description: |
      Days a generated vendor report is retained. Drives BOTH the
      VendorReportsBucket lifecycle (the rendered HTML object) and the
      DynamoDB TTL on each report pointer record, so the record never
      outlives its object and GET /vendors/{id}/reports can't re-sign a
      link to a deleted object.
  BedrockModelId:
    Type: String
    Default: us.amazon.nova-pro-v1:0
    Description: |
      Bedrock model identifier used by POST /briefs. Cross-region inference
      profile prefix (us./eu.) is included to balance load across regions.
      Override per env via samconfig if you want to test a different model.
  BedrockRegion:
    Type: String
    Default: us-east-1
    Description: |
      Region the BedrockRuntime client is configured for. Stays separate
      from the stack region so you can route to a region where the model
      is available without moving the rest of the stack.
  EmbeddingModelId:
    Type: String
    Default: amazon.titan-embed-text-v2:0
    Description: |
      Bedrock embedding model used by VectorizeContentFunction to turn content
      text into vectors. Titan Text Embeddings V2 at 1024 dimensions. If you
      change the model or its dimension, the ContentVectorIndex Dimension below
      must match and existing vectors must be re-embedded (run
      scripts/backfill-content-vectors.mjs).
  FactSearchUrl:
    Type: String
    Default: ""
    Description: |
      Optional web-search API endpoint the fact-checker review lens calls via
      the agent's http_request tool (e.g. a Tavily/Brave/Exa search URL). When
      empty, the fact lens is skipped and reviews run the other lenses only.
  FactSearchApiKey:
    Type: String
    Default: ""
    NoEcho: true
    Description: |
      Optional API key for FactSearchUrl. Sent as a bearer token in the
      FactSearchAuthHeader header. Leave empty if the endpoint needs no auth.
  FactSearchAuthHeader:
    Type: String
    Default: Authorization
    Description: Header name the fact lens sends FactSearchApiKey in (as "Bearer <key>").
  ReflectionThreshold:
    Type: Number
    Default: 5
    MinValue: 1
    Description: |
      How many new voice samples (per platform) accumulate before
      VoiceMemoryFunction automatically re-derives that platform's writing-style
      profile. Lower = the profile adapts faster but spends more on Bedrock.
  VoiceHalfLifeDays:
    Type: Number
    Default: 90
    MinValue: 1
    Description: |
      Half-life (in days) of the exponential publish-date decay that weights
      voice samples: a sample this many days old carries half the influence of
      one published today, both in profile reflection and in compose's few-shot
      example ranking. Lower = the learned voice tracks recent posts more
      aggressively. See api/services/voice-recency.mjs.
  BaseCustomDomain:
    Type: String
    Default: ""
    Description: |
      Optional apex/parent domain that the dashboard and API live under
      (e.g. readysetcloud.io). When set, the dashboard is served at
      booked.<BaseCustomDomain> and the API at api.booked.<BaseCustomDomain>.
      Leave empty to serve both from the autogenerated CloudFront /
      execute-api hostnames. HostedZoneId must be set alongside this for
      the custom domain to deploy; setting just one is a no-op.
  HostedZoneId:
    Type: String
    Default: ""
    Description: |
      Route53 hosted zone id for BaseCustomDomain. The stack creates the
      ACM certificates and validates them via DNS records in this zone,
      and creates the A records for booked.* and api.booked.* here.

# Combined condition so partial-set (one param without the other) is a
# no-op rather than a deploy error. Mirrors newsletter-service's
# DeployCustomDomain pattern.
Conditions:
  HasBaseCustomDomain: !Not [!Equals [!Ref BaseCustomDomain, ""]]
  HasHostedZoneId: !Not [!Equals [!Ref HostedZoneId, ""]]
  DeployCustomDomain: !And
    - !Condition HasBaseCustomDomain
    - !Condition HasHostedZoneId

Metadata:
  esbuild-properties: &esbuild-properties
    Format: esm
    Minify: true
    OutExtension:
      - .js=.mjs
    Target: es2022
    Sourcemap: false
    EntryPoints:
      - index.mjs
    Banner:
      - js=import { createRequire } from 'module'; const require = createRequire(import.meta.url);
    External: []
    # Inline HTML templates as strings so `import x from "./foo.html"` works
    # in the bundled Lambda — no separate asset files to ship or path-resolve
    # at runtime. The vendor-report renderer relies on this.
    Loader:
      - .html=text

Globals:
  Function:
    Architectures: [arm64]
    Tracing: Active
    Timeout: 15
    MemorySize: 512
    Runtime: nodejs24.x
    Environment:
      Variables:
        TABLE_NAME: !Ref ContentTrackingTable
        LOG_LEVEL: info
        ENVIRONMENT: !Ref Environment
        POWERTOOLS_SERVICE_NAME: booked
        # NewsletterApiBaseUrl and CampaignShortLinkBase are fetched from
        # SSM at runtime via Powertools parameters (5-min cache). The SSM
        # paths embed ENVIRONMENT so the same Lambda code resolves the
        # right value per stack.
        NEWSLETTER_MINT_API_KEY: !Ref NewsletterMintApiKey
        BRIEFS_BUCKET: !Ref BriefsBucket
        BEDROCK_MODEL_ID: !Ref BedrockModelId
        BEDROCK_REGION: !Ref BedrockRegion
        # Vectorization config, shared by the stream-driven embedders (write
        # vectors) and the API Lambda (POST /blogs/ask and /content/ask read
        # them). The bucket name is the same !Sub the BlogVectorBucket resource
        # uses; referencing the literal name (not !Ref, which returns the ARN)
        # keeps the S3 Vectors SDK calls, which take a bucket name, simple.
        EMBEDDING_MODEL_ID: !Ref EmbeddingModelId
        VECTOR_BUCKET_NAME: !Sub "content-tracking-blog-vectors-${Environment}-${AWS::AccountId}"
        # Content vectorization: the index in the SAME bucket holding the
        # generalized Content entity's chunk embeddings, written by the
        # stream-driven VectorizeContentFunction and read by the API Lambda
        # (POST /content/ask and the content-native /blogs/ask).
        CONTENT_VECTOR_INDEX_NAME: content-vectors
        # Voice feature: a second index in the SAME bucket holds per-sample
        # voice embeddings; REFLECTION_THRESHOLD drives the auto-reflection
        # cadence in VoiceMemoryFunction (and the manual-reflect route), and
        # VOICE_HALF_LIFE_DAYS drives the publish-date recency decay used by
        # reflection and compose example ranking.
        VOICE_VECTOR_INDEX_NAME: voice-samples
        REFLECTION_THRESHOLD: !Ref ReflectionThreshold
        VOICE_HALF_LIFE_DAYS: !Ref VoiceHalfLifeDays
        # Gamification: emit "Track Activity" events to the shared rsc-core
        # Badge Chest engine (readysetcloud/rsc-core) on the default bus. The
        # engine, this stack, and the Cognito pool share one AWS account, so the
        # events reach ProcessActivityFunction and the Cognito `sub` doubles as
        # the cross-app badge identity. See api/services/activity.mjs.
        BADGE_ACTIVITY_ENABLED: "true"
        # Read by api/services/extension-secret.mjs on both the API
        # Lambda (mint) and the authorizer Lambda (verify). Passed in
        # via the deploy workflow from the EXTENSION_TOKEN_SIGNING_KEY
        # GitHub secret; same shape NewsletterMintApiKey uses.
        EXTENSION_TOKEN_SIGNING_KEY: !Ref ExtensionTokenSigningKey
        # "Ask your blog" agent (POST /agent/sessions): creates the session by
        # emitting a "Create Agent Session" event on the default bus (rsc-core
        # consumes it). The blog-search gateway URL + grounding flag live on
        # ApiFunction (not here) so only it depends on the in-stack BlogGateway
        # resource. See api/routes/agent.mjs.
        # Vendor-report static HTML lives in a private bucket fronted by a
        # CloudFront distribution that requires signed URLs. The API Lambda
        # writes the HTML to VENDOR_REPORTS_BUCKET, then signs a URL against
        # VENDOR_REPORTS_DOMAIN using VENDOR_REPORTS_KEY_PAIR_ID (the
        # CloudFront public-key id) and VENDOR_REPORTS_SIGNING_PRIVATE_KEY
        # (the matching RSA private key PEM, ~1.7KB — well under the env
        # var limit).
        VENDOR_REPORTS_BUCKET: !Ref VendorReportsBucket
        # Custom domain (reports.<BaseCustomDomain>) when one is configured,
        # else the autogenerated CloudFront hostname. The Lambda signs report
        # URLs against this host, and CloudFront validates the signature for
        # whichever host it serves — so the shared distribution serves both
        # campaign and vendor reports from the same custom domain when set.
        VENDOR_REPORTS_DOMAIN: !If
          - DeployCustomDomain
          - !Sub "reports.${BaseCustomDomain}"
          - !GetAtt VendorReportsDistribution.DomainName
        VENDOR_REPORTS_KEY_PAIR_ID: !Ref VendorReportsPublicKey
        VENDOR_REPORTS_SIGNING_PRIVATE_KEY: !Ref VendorReportsSigningPrivateKey
        # Read by domain/vendor-report-record.mjs to set the record TTL in
        # lockstep with the bucket lifecycle below.
        VENDOR_REPORTS_RETENTION_DAYS: !Ref VendorReportsRetentionDays
        # Public media-kit teaser: the Lambda writes the rendered page (and
        # copies of the avatar/logo) here, and the PublicMediaKitDistribution
        # serves them anonymously. PUBLIC_MEDIA_KIT_DOMAIN is the host the
        # Lambda bakes into the returned public URL — custom domain
        # (kit.<BaseCustomDomain>) when set, else the CloudFront hostname.
        PUBLIC_MEDIA_KIT_BUCKET: !Ref PublicMediaKitBucket
        PUBLIC_MEDIA_KIT_DOMAIN: !If
          - DeployCustomDomain
          - !Sub "kit.${BaseCustomDomain}"
          - !GetAtt PublicMediaKitDistribution.DomainName
        # Origin the Lambda echoes back as Access-Control-Allow-Origin.
        # Mirrors the DashboardUrl output: custom domain when set, else
        # the autogenerated CloudFront hostname. Kept in sync with the
        # API Gateway-level Cors block on ContentTrackingApi so preflight
        # and the actual response agree on a single origin.
        CORS_ALLOWED_ORIGIN: !If
          - DeployCustomDomain
          - !Sub "https://booked.${BaseCustomDomain}"
          - !Sub "https://${DashboardDistribution.DomainName}"

Resources:
  # Booked's own app client on the shared rsc-core Cognito user pool. Every
  # Ready, Set, Cloud surface signs into the same pool (RSCUserPool) but
  # brings its own public web client, so tokens carry a Booked-specific
  # `aud` and the app owns its own token lifetimes. Mirrors the pattern in
  # concurrency-bootcamp. Public client (no secret) for browser SRP /
  # USER_PASSWORD auth via @readysetcloud/ui/auth.
  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      UserPoolId: !Ref UserPoolId
      ClientName: !Sub "${AWS::StackName}-web"
      GenerateSecret: false
      PreventUserExistenceErrors: ENABLED
      ExplicitAuthFlows:
        - ALLOW_USER_PASSWORD_AUTH
        - ALLOW_USER_SRP_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
      AccessTokenValidity: 1
      IdTokenValidity: 1
      RefreshTokenValidity: 30
      TokenValidityUnits:
        AccessToken: hours
        IdToken: hours
        RefreshToken: days

  ContentTrackingTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: sk
          AttributeType: S
        - AttributeName: gsi1pk
          AttributeType: S
        - AttributeName: gsi1sk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE
      GlobalSecondaryIndexes:
        # GSI1 backs the "list all of entity X sorted by created_at" and
        # "campaigns in date range" patterns so every read path is a Query
        # (no Scans anywhere).
        #
        # gsi1pk = ENTITY name (CAMPAIGNS, VENDORS)
        # gsi1sk = "{ISO createdAt}#{ulid}" so date-range KeyConditionExpressions
        #          on gsi1sk work and ties within the same millisecond
        #          stay ordered.
        - IndexName: GSI1
          KeySchema:
            - AttributeName: gsi1pk
              KeyType: HASH
            - AttributeName: gsi1sk
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      # `expiresAt` powers TTL-based cleanup of idempotency records the
      # Lambda writes under pk=IDEMPOTENCY#{hash} (Powertools' DynamoDB
      # persistence layer manages those entries).
      TimeToLiveSpecification:
        AttributeName: expiresAt
        Enabled: true
      # Streams Content root changes to VectorizeContentFunction, which (re)embeds
      # the piece into the S3 vector index. NEW_AND_OLD_IMAGES so the handler sees
      # the full item on create/edit and the old item on delete (for vector cleanup).
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES

  # Holds raw brief uploads (PDFs uploaded via presigned URL from the client,
  # plus chat transcripts the brief pipeline writes inline). Separate
  # bucket per environment so staging tests can't accidentally read prod
  # briefs. Lifecycle policy ages out raw uploads after a year; brief
  # summaries (which live in DynamoDB) stay indefinitely.
  BriefsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "content-tracking-briefs-${Environment}-${AWS::AccountId}"
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: ArchiveRawAfter90Days
            Status: Enabled
            Prefix: uploads/
            Transitions:
              - StorageClass: STANDARD_IA
                TransitionInDays: 90
            ExpirationInDays: 365
          - Id: ExpireFailedUploadsAfter7Days
            Status: Enabled
            AbortIncompleteMultipartUpload:
              DaysAfterInitiation: 7
      CorsConfiguration:
        # Browsers PUT directly to presigned URLs (upload flow) and GET
        # them back for the audit-view download URLs returned by
        # GET /briefs/{briefId}. Both need to be allowed cross-origin
        # so the dashboard at a different origin can use them.
        CorsRules:
          - AllowedMethods: [GET, PUT]
            AllowedOrigins: ["*"]
            AllowedHeaders: ["*"]
            ExposedHeaders: [ETag]
            MaxAge: 300

  ContentTrackingApi:
    Type: AWS::Serverless::Api
    Properties:
      TracingEnabled: true
      StageName: v1
      MethodSettings:
        - MetricsEnabled: True
          ResourcePath: "/*"
          HttpMethod: "*"
          LoggingLevel: INFO
      # Authorizer is a Lambda TOKEN authorizer that accepts either a
      # Cognito id token (dashboard) or an HMAC-signed extension pairing
      # token. Both paths set requestContext.authorizer.{sub, authSource}
      # so routes can gate on the auth source when needed (e.g. the
      # pairing-mint endpoint requires authSource=cognito).
      Auth:
        DefaultAuthorizer: BookedAuthorizer
        AddDefaultAuthorizerToCorsPreflight: false
        Authorizers:
          BookedAuthorizer:
            FunctionArn: !GetAtt ApiAuthorizerFunction.Arn
            Identity:
              Header: Authorization
              # No caching while we shake the design out — revocation
              # should take effect on the next request. Revisit once
              # call volume justifies trading cache TTL for revocation
              # latency.
              ReauthorizeEvery: 0
      # Pinned to the dashboard origin (custom domain when set, else the
      # CloudFront hostname). The single-quote wrapping is required: SAM
      # passes these straight into the API Gateway integration response
      # mapping, which expects a quoted string literal.
      Cors:
        AllowOrigin: !If
          - DeployCustomDomain
          - !Sub "'https://booked.${BaseCustomDomain}'"
          - !Sub "'https://${DashboardDistribution.DomainName}'"
        AllowHeaders: "'authorization,content-type,idempotency-key'"
        AllowMethods: "'GET,POST,PUT,PATCH,DELETE,OPTIONS'"

  # Optional custom domain for the REST API. Mirrors the pattern
  # newsletter-service uses: REGIONAL endpoint type, TLS 1.2,
  # BasePathMapping with no BasePath so the custom-domain root maps
  # directly to the v1 stage, ACM cert auto-provisioned via DNS
  # validation against the hosted zone the caller supplied.
  ApiCertificate:
    Type: AWS::CertificateManager::Certificate
    Condition: DeployCustomDomain
    Properties:
      DomainName: !Sub "api.booked.${BaseCustomDomain}"
      ValidationMethod: DNS
      DomainValidationOptions:
        - DomainName: !Sub "api.booked.${BaseCustomDomain}"
          HostedZoneId: !Ref HostedZoneId

  ApiCustomDomainName:
    Type: AWS::ApiGateway::DomainName
    Condition: DeployCustomDomain
    Properties:
      DomainName: !Sub "api.booked.${BaseCustomDomain}"
      RegionalCertificateArn: !Ref ApiCertificate
      EndpointConfiguration:
        Types: [REGIONAL]
      SecurityPolicy: TLS_1_2

  ApiBasePathMapping:
    Type: AWS::ApiGateway::BasePathMapping
    Condition: DeployCustomDomain
    # SAM expands AWS::Serverless::Api with StageName: v1 into a stage
    # resource whose logical id is ${ApiName}${StageName}Stage. The
    # mapping must wait for that stage to exist.
    DependsOn: ContentTrackingApiv1Stage
    Properties:
      DomainName: !Ref ApiCustomDomainName
      RestApiId: !Ref ContentTrackingApi
      Stage: v1

  ApiDnsRecord:
    Type: AWS::Route53::RecordSet
    Condition: DeployCustomDomain
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Sub "api.booked.${BaseCustomDomain}"
      Type: A
      AliasTarget:
        DNSName: !GetAtt ApiCustomDomainName.RegionalDomainName
        HostedZoneId: !GetAtt ApiCustomDomainName.RegionalHostedZoneId
        EvaluateTargetHealth: false

  ApiFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        <<: *esbuild-properties
        EntryPoints:
          - index.mjs
    Properties:
      CodeUri: api
      Handler: index.handler
      # Bigger memory and longer timeout than the per-route functions because
      # this single Lambda serves every route. Revenue rollups and Bedrock
      # calls are the heaviest paths.
      MemorySize: 1024
      Timeout: 30
      Environment:
        Variables:
          # Blog grounding (POST /agent/sessions): every session references the
          # blog-search AgentCore Gateway, whose URL is wired straight from the
          # in-stack resource. Scoped here (not Globals) so only this function
          # depends on the gateway resource.
          BLOG_GATEWAY_URL: !GetAtt BlogGateway.GatewayUrl
      Policies:
        - AWSLambdaBasicExecutionRole
        - Version: 2012-10-17
          Statement:
            # DynamoDB: union of every per-route operation across the API.
            # Limited to the main table + its indexes. No Scan anywhere.
            - Effect: Allow
              Action:
                - dynamodb:GetItem
                - dynamodb:PutItem
                - dynamodb:UpdateItem
                - dynamodb:DeleteItem
                - dynamodb:Query
                - dynamodb:BatchGetItem
                - dynamodb:BatchWriteItem
                - dynamodb:TransactWriteItems
                - dynamodb:ConditionCheckItem
              Resource:
                - !GetAtt ContentTrackingTable.Arn
                - !Sub "${ContentTrackingTable.Arn}/index/*"
            # SSM: runtime reads for newsletter-service URLs. Scope to the
            # exact paths the Lambda fetches so a misconfig can't pull
            # unrelated parameters.
            - Effect: Allow
              Action:
                - ssm:GetParameter
                - ssm:GetParameters
              Resource:
                - !Sub "arn:${AWS::Partition}:ssm:${AWS::Region}:${AWS::AccountId}:parameter/newsletter-service/${Environment}/*"
            # SSM: read + write the booked-owned Google credentials
            # (GA4 service account, CrUX API key) stored as SecureStrings.
            # PutParameter is used by PUT /profile when the user saves them.
            - Effect: Allow
              Action:
                - ssm:GetParameter
                - ssm:GetParameters
                - ssm:PutParameter
              Resource:
                - !Sub "arn:${AWS::Partition}:ssm:${AWS::Region}:${AWS::AccountId}:parameter/booked/${Environment}/*"
            # KMS: SecureString encrypt/decrypt, but only when the call comes
            # through SSM (ViaService condition). Covers the AWS-managed
            # aws/ssm key without naming a specific key ARN.
            - Effect: Allow
              Action:
                - kms:Decrypt
                - kms:Encrypt
                - kms:GenerateDataKey
              Resource: "*"
              Condition:
                StringEquals:
                  kms:ViaService: !Sub "ssm.${AWS::Region}.amazonaws.com"
            # S3: read + write objects in the briefs bucket. PutObject is
            # used by the chat-source flow (writing transcripts inline) and
            # by presigned-URL signing for PDF uploads. GetObject is used
            # both by the brief pipeline (reading uploads back) and by the
            # presigned download URL for the audit view.
            - Effect: Allow
              Action:
                - s3:PutObject
                - s3:GetObject
                - s3:DeleteObject
              Resource:
                - !Sub "${BriefsBucket.Arn}/*"
            # S3: write the generated vendor-report HTML into the private
            # vendor-reports bucket (PutObject), and read it back when
            # regenerating/serving (GetObject). The bucket is otherwise
            # only readable by the CloudFront distribution via OAC.
            - Effect: Allow
              Action:
                - s3:PutObject
                - s3:GetObject
              Resource:
                - !Sub "${VendorReportsBucket.Arn}/*"
            # S3: publish the public media-kit teaser page and the copied
            # avatar/logo images into the public bucket (PutObject), and
            # take them down on unpublish (DeleteObject). The CopyObject
            # source (the avatar/logo originals) is the vendor-reports
            # bucket, already covered by the GetObject grant above.
            - Effect: Allow
              Action:
                - s3:PutObject
                - s3:DeleteObject
              Resource:
                - !Sub "${PublicMediaKitBucket.Arn}/*"
            # Bedrock: invoke the configured model. Cross-region inference
            # profiles (us./eu. prefixes) are foundation-model ARNs in the
            # bedrock region with a wildcard for the variant.
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
                - bedrock:Converse
              Resource:
                - !Sub "arn:${AWS::Partition}:bedrock:*::foundation-model/*"
                - !Sub "arn:${AWS::Partition}:bedrock:*:${AWS::AccountId}:inference-profile/*"
            # S3 Vectors: semantic search for POST /blogs/ask, /content/ask and
            # POST /voice/compose. GetVectors is required alongside QueryVectors
            # because the query returns metadata and uses a tenant filter. The
            # API reads the content + voice indexes; writes happen only on the
            # stream consumers.
            - Effect: Allow
              Action:
                - s3vectors:QueryVectors
                - s3vectors:GetVectors
              Resource:
                - !GetAtt BlogVectorBucket.VectorBucketArn
                - !GetAtt ContentVectorIndex.IndexArn
                - !GetAtt BlogVoiceIndex.IndexArn
            # Voice-sample curation writes vectors directly: DELETE and PATCH
            # muted:true remove a sample's vector, and PATCH muted:false
            # re-embeds it (PutVectors). Content vectors are only ever written
            # by the stream consumer, so this is scoped to the voice index.
            - Effect: Allow
              Action:
                - s3vectors:DeleteVectors
                - s3vectors:PutVectors
              Resource:
                - !GetAtt BlogVectorBucket.VectorBucketArn
                - !GetAtt BlogVoiceIndex.IndexArn
            # EventBridge: emit "Track Activity" gamification events to the
            # default bus, where rsc-core's ProcessActivityFunction consumes
            # them. Scoped to the default bus only. See services/activity.mjs.
            - Effect: Allow
              Action: events:PutEvents
              Resource: !Sub "arn:${AWS::Partition}:events:${AWS::Region}:${AWS::AccountId}:event-bus/default"
      Events:
        ProxyAny:
          Type: Api
          Properties:
            RestApiId: !Ref ContentTrackingApi
            Path: /{proxy+}
            Method: ANY
        Root:
          Type: Api
          Properties:
            RestApiId: !Ref ContentTrackingApi
            Path: /
            Method: ANY

  # Custom Lambda authorizer that accepts either Cognito id tokens
  # (dashboard) or HMAC-signed extension pairing tokens. Lives in the
  # same api/ CodeUri as the main router but has its own esbuild entry
  # point so it doesn't pull in the route/domain bundle.
  ApiAuthorizerFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        <<: *esbuild-properties
        EntryPoints:
          - authorizer.mjs
    Properties:
      CodeUri: api
      Handler: authorizer.handler
      MemorySize: 512
      Timeout: 10
      Environment:
        Variables:
          # JWKS lookup target + audience check. CFN doesn't expose
          # !Split on SSM-resolved values, so the deploy workflow
          # passes the id directly rather than deriving it from
          # CognitoUserPoolArn.
          USER_POOL_ID: !Ref UserPoolId
          USER_POOL_CLIENT_ID: !Ref UserPoolClient
      Policies:
        - AWSLambdaBasicExecutionRole
        - Version: 2012-10-17
          Statement:
            # Pairing-token revocation check + last-used bump. The
            # signing key itself comes in via the env var inherited
            # from Globals.
            - Effect: Allow
              Action:
                - dynamodb:UpdateItem
              Resource:
                - !GetAtt ContentTrackingTable.Arn

  # ---------------------------------------------------------------------
  # Durable functions
  #
  # Blog cross-post and weekly analytics are multi-step, stateful, and
  # long-running (the cross-post stagger spans days), so they run as
  # Lambda durable functions rather than Step Functions — orchestration
  # stays co-located with the business logic in Node.
  #
  # This is the foundation spike: a hello-world durable function that
  # proves the build/deploy/replay path. The real crosspost and
  # weekly-analytics functions follow the same wiring:
  #   - DurableConfig enables durable execution (set at create only).
  #   - AWSLambdaBasicDurableExecutionRolePolicy grants the checkpoint
  #     permissions (lambda:CheckpointDurableExecution,
  #     lambda:GetDurableExecutionState).
  #   - AutoPublishAlias publishes a version + alias so callers invoke a
  #     qualified ARN (durable functions reject $LATEST for determinism).
  # ---------------------------------------------------------------------
  HelloDurableFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        <<: *esbuild-properties
        EntryPoints:
          - index.mjs
    Properties:
      CodeUri: functions/hello-durable
      Handler: index.handler
      MemorySize: 512
      Timeout: 30
      DurableConfig:
        # 1 hour is plenty for the spike. The real cross-post function
        # raises this to cover multi-day staggered publishes.
        ExecutionTimeout: 3600
        RetentionPeriodInDays: 7
      AutoPublishAlias: live
      Policies:
        - AWSLambdaBasicExecutionRole
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicDurableExecutionRolePolicy

  # ---------------------------------------------------------------------
  # Blog vectorization: S3 Vectors store + the stream-driven embedder.
  #
  # Blog posts are chunked, embedded with Titan Text Embeddings V2, and stored
  # in an S3 vector index so a later feature can do semantic retrieval (writing
  # suggestions / Q&A) over the catalog. Ingestion is event-driven off the
  # DynamoDB stream so the write path (POST/PATCH /blogs) stays fast and the
  # cross-post flow's root updates don't pay any embedding cost.
  # ---------------------------------------------------------------------

  # Vector bucket, one per environment (name charset: lowercase/digits/hyphen).
  # Encryption defaults to SSE-S3 (AES256). DeletionPolicy Retain because a
  # vector bucket must be empty to delete; retaining avoids a stack-delete
  # failure and preserves embeddings.
  BlogVectorBucket:
    Type: AWS::S3Vectors::VectorBucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      VectorBucketName: !Sub "content-tracking-blog-vectors-${Environment}-${AWS::AccountId}"

  # Generalized content index in the vector bucket: one set of chunk vectors
  # per Content entity item. Dimension MUST match the embedding model's output
  # (Titan v2 @ 1024). `text` is declared non-filterable so each chunk's source
  # text rides along in results without counting against the 2 KB filterable
  # metadata budget. Cosine distance suits normalized text embeddings.
  ContentVectorIndex:
    Type: AWS::S3Vectors::Index
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      VectorBucketArn: !GetAtt BlogVectorBucket.VectorBucketArn
      IndexName: content-vectors
      DataType: float32
      Dimension: 1024
      DistanceMetric: cosine
      MetadataConfiguration:
        NonFilterableMetadataKeys:
          - text

  # Second index in the same bucket for the Voice feature: one vector per voice
  # sample (whole short post, no chunking), retrieved as few-shot style examples.
  # Filter metadata is {tenantId, platform, format}; the sample text rides along
  # as non-filterable. Same dim/metric as ContentVectorIndex (shared Titan model).
  BlogVoiceIndex:
    Type: AWS::S3Vectors::Index
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      VectorBucketArn: !GetAtt BlogVectorBucket.VectorBucketArn
      IndexName: voice-samples
      DataType: float32
      Dimension: 1024
      DistanceMetric: cosine
      MetadataConfiguration:
        NonFilterableMetadataKeys:
          - text

  # Poison-record sink for the content stream consumer. A record that still
  # fails after the configured retries is sent here instead of blocking the
  # shard.
  VectorizeContentDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub "content-tracking-vectorize-content-dlq-${Environment}"
      MessageRetentionPeriod: 1209600 # 14 days

  # Consumes the DynamoDB stream (filtered to Content roots) and (re)embeds each
  # piece into ContentVectorIndex. Idempotent via a content-hash guard, so
  # MODIFY events that don't change the text (e.g. publish link mirroring) are
  # no-ops. Timeout is generous because a long piece embeds many chunks. It is
  # the sole stream vectorizer for content now (the Blog one was retired).
  VectorizeContentFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        <<: *esbuild-properties
        EntryPoints:
          - index.mjs
    Properties:
      CodeUri: functions/vectorize-content
      Handler: index.handler
      MemorySize: 512
      Timeout: 300
      # EMBEDDING_MODEL_ID / VECTOR_BUCKET_NAME / CONTENT_VECTOR_INDEX_NAME are
      # inherited from Globals (shared with the API Lambda).
      Events:
        ContentStream:
          Type: DynamoDB
          Properties:
            Stream: !GetAtt ContentTrackingTable.StreamArn
            StartingPosition: LATEST
            BatchSize: 5
            MaximumRetryAttempts: 3
            BisectBatchOnFunctionError: true
            # Only content ROOT changes reach the function. Two patterns: the
            # create/edit path keys off NewImage.entity, the delete path off
            # OldImage.entity (REMOVE has no NewImage).
            FilterCriteria:
              Filters:
                - Pattern: '{"eventName":["INSERT","MODIFY"],"dynamodb":{"NewImage":{"entity":{"S":["Content"]}}}}'
                - Pattern: '{"eventName":["REMOVE"],"dynamodb":{"OldImage":{"entity":{"S":["Content"]}}}}'
            DestinationConfig:
              OnFailure:
                Destination: !GetAtt VectorizeContentDLQ.Arn
      Policies:
        - AWSLambdaBasicExecutionRole
        - Version: 2012-10-17
          Statement:
            # Read the stream.
            - Effect: Allow
              Action:
                - dynamodb:DescribeStream
                - dynamodb:GetRecords
                - dynamodb:GetShardIterator
                - dynamodb:ListStreams
              Resource:
                - !GetAtt ContentTrackingTable.StreamArn
                - !Sub "${ContentTrackingTable.StreamArn}/*"
            # Read/write the per-content vector-state row.
            - Effect: Allow
              Action:
                - dynamodb:GetItem
                - dynamodb:PutItem
              Resource:
                - !GetAtt ContentTrackingTable.Arn
            # Embed via Titan. Wildcard region/model mirrors ApiFunction so a
            # cross-region inference profile or a model swap doesn't need an
            # IAM change.
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
              Resource:
                - !Sub "arn:${AWS::Partition}:bedrock:*::foundation-model/*"
            # Read/write vectors in the index (Query/Get included for the
            # follow-up retrieval feature so it won't need a policy change).
            - Effect: Allow
              Action:
                - s3vectors:PutVectors
                - s3vectors:DeleteVectors
                - s3vectors:GetVectors
                - s3vectors:ListVectors
                - s3vectors:QueryVectors
              Resource:
                - !GetAtt BlogVectorBucket.VectorBucketArn
                - !GetAtt ContentVectorIndex.IndexArn
            # Deliver poison records to the DLQ.
            - Effect: Allow
              Action:
                - sqs:SendMessage
              Resource:
                - !GetAtt VectorizeContentDLQ.Arn

  # Poison-record sink for the suggestion-revalidation stream consumer.
  RevalidateSuggestionsDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub "content-tracking-revalidate-suggestions-dlq-${Environment}"
      MessageRetentionPeriod: 1209600 # 14 days

  # Consumes the DynamoDB stream (filtered to Content root edits) and keeps a
  # draft's open review suggestions in sync with the text: still-valid ones are
  # re-anchored to the new body, ones the edit removed are marked `skipped`. The
  # handler compares the old and new body first, so a MODIFY that didn't change
  # the text (publish link mirroring, a title edit) is a no-op.
  RevalidateSuggestionsFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        <<: *esbuild-properties
        EntryPoints:
          - index.mjs
    Properties:
      CodeUri: functions/revalidate-suggestions
      Handler: index.handler
      MemorySize: 256
      Timeout: 60
      # TABLE_NAME is inherited from Globals (shared with the API Lambda).
      Events:
        ContentEditStream:
          Type: DynamoDB
          Properties:
            Stream: !GetAtt ContentTrackingTable.StreamArn
            StartingPosition: LATEST
            BatchSize: 5
            MaximumRetryAttempts: 3
            BisectBatchOnFunctionError: true
            # Only content ROOT edits reach the function. INSERT can't have
            # suggestions yet and REMOVE is handled by deleteContent's cascade,
            # so we filter to MODIFY on the Content entity.
            FilterCriteria:
              Filters:
                - Pattern: '{"eventName":["MODIFY"],"dynamodb":{"NewImage":{"entity":{"S":["Content"]}}}}'
            DestinationConfig:
              OnFailure:
                Destination: !GetAtt RevalidateSuggestionsDLQ.Arn
      Policies:
        - AWSLambdaBasicExecutionRole
        - Version: 2012-10-17
          Statement:
            # Read the stream.
            - Effect: Allow
              Action:
                - dynamodb:DescribeStream
                - dynamodb:GetRecords
                - dynamodb:GetShardIterator
                - dynamodb:ListStreams
              Resource:
                - !GetAtt ContentTrackingTable.StreamArn
                - !Sub "${ContentTrackingTable.StreamArn}/*"
            # Query pending suggestions and re-stamp / skip them.
            - Effect: Allow
              Action:
                - dynamodb:Query
                - dynamodb:UpdateItem
              Resource:
                - !GetAtt ContentTrackingTable.Arn
            # Deliver poison records to the DLQ.
            - Effect: Allow
              Action:
                - sqs:SendMessage
              Resource:
                - !GetAtt RevalidateSuggestionsDLQ.Arn

  # Poison-record sink for the voice-memory stream consumer.
  VoiceMemoryDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub "content-tracking-voice-memory-dlq-${Environment}"
      MessageRetentionPeriod: 1209600 # 14 days

  # Trailing-reflection timer. Under bursty ingress (e.g. a backfill) the voice
  # pipeline coalesces reflections to at most one per cooldown window; each
  # reflection enqueues one delayed catch-up here so the burst's tail still
  # converges after ingress goes quiet — no manual reflect, no threshold change.
  # VisibilityTimeout covers the function timeout; short retention because a
  # catch-up is only relevant for a few minutes; poison messages fall through to
  # the shared VoiceMemoryDLQ.
  VoiceReflectionQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub "content-tracking-voice-reflection-${Environment}"
      VisibilityTimeout: 360
      MessageRetentionPeriod: 3600 # 1 hour
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt VoiceMemoryDLQ.Arn
        maxReceiveCount: 3

  # Second consumer on the SAME table stream (its own event-source mapping +
  # iterator), filtered to VoiceSample rows and blog Content roots. Published
  # blog content is auto-captured as a recency-anchored voice sample; each
  # sample is embedded into the voice-samples index, bumps the platform's
  # reflection counter (idempotently), and re-derives the style profile via
  # Bedrock once the counter crosses ReflectionThreshold — with samples
  # weighted by publish-date recency (VoiceHalfLifeDays). Timeout is generous
  # because reflection adds a Converse call on top of the embedding.
  VoiceMemoryFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        <<: *esbuild-properties
        EntryPoints:
          - index.mjs
    Properties:
      CodeUri: functions/voice-memory
      Handler: index.handler
      MemorySize: 512
      Timeout: 300
      # EMBEDDING_MODEL_ID / BEDROCK_MODEL_ID / VECTOR_BUCKET_NAME /
      # VOICE_VECTOR_INDEX_NAME / REFLECTION_THRESHOLD inherited from Globals.
      Environment:
        Variables:
          # Where reflection catch-ups are enqueued (the trailing-edge timer).
          VOICE_REFLECTION_QUEUE_URL: !Ref VoiceReflectionQueue
      Events:
        VoiceStream:
          Type: DynamoDB
          Properties:
            Stream: !GetAtt ContentTrackingTable.StreamArn
            StartingPosition: LATEST
            BatchSize: 5
            MaximumRetryAttempts: 3
            BisectBatchOnFunctionError: true
            # Two entity families reach the function: voice samples (embed +
            # count + reflect; MODIFYs included so an edited sample re-embeds —
            # the handler skips text-unchanged MODIFYs like the vectorizedAt
            # stamp) and blog Content roots (auto-capture of published posts as
            # voice samples; REMOVE cleans the derived sample up). Content
            # MODIFYs match on the type in EITHER image: new (capture, incl.
            # retype INTO blog) or old (cleanup when a blog is retyped away —
            # the handler sees the old image was eligible and removes its
            # sample). The profile/reflection rows it writes carry other entity
            # values and never match.
            FilterCriteria:
              Filters:
                - Pattern: '{"eventName":["INSERT","MODIFY"],"dynamodb":{"NewImage":{"entity":{"S":["VoiceSample"]}}}}'
                - Pattern: '{"eventName":["INSERT","MODIFY"],"dynamodb":{"NewImage":{"entity":{"S":["Content"]},"type":{"S":["blog"]}}}}'
                - Pattern: '{"eventName":["MODIFY"],"dynamodb":{"OldImage":{"entity":{"S":["Content"]},"type":{"S":["blog"]}}}}'
                - Pattern: '{"eventName":["REMOVE"],"dynamodb":{"OldImage":{"entity":{"S":["Content"]},"type":{"S":["blog"]}}}}'
            DestinationConfig:
              OnFailure:
                Destination: !GetAtt VoiceMemoryDLQ.Arn
        # Trailing-reflection catch-ups. Delivered from the delay queue after a
        # burst's cooldown so the tail converges without a manual reflect.
        # BatchSize 1 keeps each catch-up independent; SAM grants the poller the
        # Receive/Delete/GetQueueAttributes permissions automatically.
        ReflectionCatchup:
          Type: SQS
          Properties:
            Queue: !GetAtt VoiceReflectionQueue.Arn
            BatchSize: 1
      Policies:
        - AWSLambdaBasicExecutionRole
        - Version: 2012-10-17
          Statement:
            # Read the stream.
            - Effect: Allow
              Action:
                - dynamodb:DescribeStream
                - dynamodb:GetRecords
                - dynamodb:GetShardIterator
                - dynamodb:ListStreams
              Resource:
                - !GetAtt ContentTrackingTable.StreamArn
                - !Sub "${ContentTrackingTable.StreamArn}/*"
            # Enqueue trailing-reflection catch-ups onto the delay queue.
            - Effect: Allow
              Action:
                - sqs:SendMessage
              Resource:
                - !GetAtt VoiceReflectionQueue.Arn
            # Sentinel mark on the sample, counter bump + profile + reflection
            # rows, the recent-samples Query that feeds the reflection, the
            # auto-captured VoiceSample rows derived from blog Content, and
            # their cleanup when the content is deleted/unpublished.
            - Effect: Allow
              Action:
                - dynamodb:GetItem
                - dynamodb:PutItem
                - dynamodb:UpdateItem
                - dynamodb:DeleteItem
                - dynamodb:Query
              Resource:
                - !GetAtt ContentTrackingTable.Arn
            # Embed samples (Titan) and reflect the profile (Converse).
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
                - bedrock:Converse
              Resource:
                - !Sub "arn:${AWS::Partition}:bedrock:*::foundation-model/*"
                - !Sub "arn:${AWS::Partition}:bedrock:*:${AWS::AccountId}:inference-profile/*"
            # Read/write vectors in the voice index.
            - Effect: Allow
              Action:
                - s3vectors:PutVectors
                - s3vectors:DeleteVectors
                - s3vectors:GetVectors
                - s3vectors:QueryVectors
              Resource:
                - !GetAtt BlogVectorBucket.VectorBucketArn
                - !GetAtt BlogVoiceIndex.IndexArn
            # Deliver poison records to the DLQ.
            - Effect: Allow
              Action:
                - sqs:SendMessage
              Resource:
                - !GetAtt VoiceMemoryDLQ.Arn

  # Poison-record sink for the content review orchestrator.
  ReviewOrchestratorDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub "content-tracking-review-orchestrator-dlq-${Environment}"
      MessageRetentionPeriod: 1209600 # 14 days

  # The content review engine. Triggered by the "Start Content Review" event
  # from POST /content/{id}/reviews, it fans out the review lenses over the
  # draft on the rsc-core @readysetcloud/agent runtime (runAgent — stateless
  # server-side runs with schema-forced structured output), records the anchored
  # suggestions, and closes the review with a summary. Retries are disabled so a
  # failed run can't double-write suggestions; failures land in the DLQ. Model /
  # embedding / vector env is inherited from Globals.
  ReviewOrchestratorFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        <<: *esbuild-properties
        EntryPoints:
          - index.mjs
    Properties:
      CodeUri: functions/review-orchestrator
      Handler: index.handler
      MemorySize: 1024
      Timeout: 300
      Environment:
        Variables:
          # Fact-checker lens search provider (optional; lens skipped when unset).
          FACT_SEARCH_URL: !Ref FactSearchUrl
          FACT_SEARCH_API_KEY: !Ref FactSearchApiKey
          FACT_SEARCH_AUTH_HEADER: !Ref FactSearchAuthHeader
      Events:
        StartReview:
          Type: EventBridgeRule
          Properties:
            Pattern:
              source:
                - booked
              detail-type:
                - Start Content Review
      EventInvokeConfig:
        # No automatic retries: a re-run would re-record the suggestion set. A
        # failed review is marked failed and DLQ'd; the user re-triggers.
        MaximumRetryAttempts: 0
        DestinationConfig:
          OnFailure:
            Type: SQS
            Destination: !GetAtt ReviewOrchestratorDLQ.Arn
      Policies:
        - AWSLambdaBasicExecutionRole
        - Version: 2012-10-17
          Statement:
            # Read the content + voice profile, write reviews + suggestions.
            - Effect: Allow
              Action:
                - dynamodb:GetItem
                - dynamodb:PutItem
                - dynamodb:UpdateItem
                - dynamodb:BatchWriteItem
                - dynamodb:Query
              Resource:
                - !GetAtt ContentTrackingTable.Arn
            # Run the lenses (Converse/InvokeModel via the agent runtime) and
            # embed the draft for voice retrieval (Titan). Wildcard region/model
            # mirrors the other AI functions.
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
                - bedrock:InvokeModelWithResponseStream
                - bedrock:Converse
                - bedrock:ConverseStream
              Resource:
                - !Sub "arn:${AWS::Partition}:bedrock:*::foundation-model/*"
                - !Sub "arn:${AWS::Partition}:bedrock:*:${AWS::AccountId}:inference-profile/*"
            # Query the voice index for the brand lens's grounding examples.
            - Effect: Allow
              Action:
                - s3vectors:GetVectors
                - s3vectors:QueryVectors
              Resource:
                - !GetAtt BlogVectorBucket.VectorBucketArn
                - !GetAtt BlogVoiceIndex.IndexArn
            # Deliver failed runs to the DLQ.
            - Effect: Allow
              Action:
                - sqs:SendMessage
              Resource:
                - !GetAtt ReviewOrchestratorDLQ.Arn

  # Response-streaming endpoint for live "typing" of composed posts and blog
  # answers. API Gateway (REST) can't stream, so this is a Lambda Function URL
  # with InvokeMode RESPONSE_STREAM. AuthType is NONE because Function URLs
  # can't use a Cognito authorizer — the function verifies the same id token
  # in-process (same user pool/client as ApiAuthorizerFunction).
  StreamGenerateFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        <<: *esbuild-properties
        EntryPoints:
          - index.mjs
    Properties:
      CodeUri: functions/stream-generate
      Handler: index.handler
      MemorySize: 512
      Timeout: 120
      Environment:
        Variables:
          USER_POOL_ID: !Ref UserPoolId
          USER_POOL_CLIENT_ID: !Ref UserPoolClient
      FunctionUrlConfig:
        AuthType: NONE
        InvokeMode: RESPONSE_STREAM
        Cors:
          AllowOrigins:
            - !If
              - DeployCustomDomain
              - !Sub "https://booked.${BaseCustomDomain}"
              - !Sub "https://${DashboardDistribution.DomainName}"
          AllowMethods:
            - POST
          AllowHeaders:
            - authorization
            - content-type
          MaxAge: 300
      Policies:
        - AWSLambdaBasicExecutionRole
        - Version: 2012-10-17
          Statement:
            # Embed the topic/question and stream the model output.
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
                - bedrock:InvokeModelWithResponseStream
                - bedrock:Converse
                - bedrock:ConverseStream
              Resource:
                - !Sub "arn:${AWS::Partition}:bedrock:*::foundation-model/*"
                - !Sub "arn:${AWS::Partition}:bedrock:*:${AWS::AccountId}:inference-profile/*"
            # Retrieve few-shot examples (voice) / passages (content-native
            # /blogs/ask streams from the content index via queryContentChunks).
            - Effect: Allow
              Action:
                - s3vectors:QueryVectors
                - s3vectors:GetVectors
              Resource:
                - !GetAtt BlogVectorBucket.VectorBucketArn
                - !GetAtt ContentVectorIndex.IndexArn
                - !GetAtt BlogVoiceIndex.IndexArn
            # Read the voice profile injected into the compose prompt.
            - Effect: Allow
              Action:
                - dynamodb:GetItem
                - dynamodb:Query
              Resource:
                - !GetAtt ContentTrackingTable.Arn

  # Response-streaming endpoint for the LIVE content review (the streaming twin
  # of POST /content/{id}/reviews). Creates the review, runs the shared review
  # engine, and streams each lens's progress + the recorded suggestions to the
  # client as NDJSON — no Momento. Function URL with InvokeMode RESPONSE_STREAM;
  # AuthType NONE, so it verifies the id token in-process like StreamGenerate.
  # Bundles the agent runtime, so it's sized like the orchestrator.
  StreamReviewFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        <<: *esbuild-properties
        EntryPoints:
          - index.mjs
    Properties:
      CodeUri: functions/stream-review
      Handler: index.handler
      MemorySize: 1024
      Timeout: 300
      Environment:
        Variables:
          USER_POOL_ID: !Ref UserPoolId
          USER_POOL_CLIENT_ID: !Ref UserPoolClient
          # Fact-checker lens search provider (optional; lens skipped when unset).
          FACT_SEARCH_URL: !Ref FactSearchUrl
          FACT_SEARCH_API_KEY: !Ref FactSearchApiKey
          FACT_SEARCH_AUTH_HEADER: !Ref FactSearchAuthHeader
      FunctionUrlConfig:
        AuthType: NONE
        InvokeMode: RESPONSE_STREAM
        Cors:
          AllowOrigins:
            - !If
              - DeployCustomDomain
              - !Sub "https://booked.${BaseCustomDomain}"
              - !Sub "https://${DashboardDistribution.DomainName}"
          AllowMethods:
            - POST
          AllowHeaders:
            - authorization
            - content-type
          MaxAge: 300
      Policies:
        - AWSLambdaBasicExecutionRole
        - Version: 2012-10-17
          Statement:
            # Read the content + voice profile, create the review, write
            # reviews + suggestions.
            - Effect: Allow
              Action:
                - dynamodb:GetItem
                - dynamodb:PutItem
                - dynamodb:UpdateItem
                - dynamodb:BatchWriteItem
                - dynamodb:Query
              Resource:
                - !GetAtt ContentTrackingTable.Arn
            # Run the lenses (Converse/InvokeModel via the agent runtime) and
            # embed the draft for voice retrieval.
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
                - bedrock:InvokeModelWithResponseStream
                - bedrock:Converse
                - bedrock:ConverseStream
              Resource:
                - !Sub "arn:${AWS::Partition}:bedrock:*::foundation-model/*"
                - !Sub "arn:${AWS::Partition}:bedrock:*:${AWS::AccountId}:inference-profile/*"
            # Query the voice index for the brand lens's grounding examples.
            - Effect: Allow
              Action:
                - s3vectors:GetVectors
                - s3vectors:QueryVectors
              Resource:
                - !GetAtt BlogVectorBucket.VectorBucketArn
                - !GetAtt BlogVoiceIndex.IndexArn

  # === "Ask your blog" grounding via Amazon Bedrock AgentCore Gateway ===
  #
  # The shared rsc-core AgentCore Runtime reaches the creator's blog through an
  # AgentCore Gateway that exposes ONE tool, search_blog, backed by a Lambda
  # target. The gateway IS the MCP server (no hand-rolled protocol): it validates
  # the caller's Cognito token (CUSTOM_JWT -> shared pool) and a REQUEST
  # interceptor forwards the verified sub to the tenant-scoped tool.
  #
  # Activation is staged so it can't break session creation: deploy, read the
  # BlogGatewayUrl output, add its host to the runtime's MCP allowlist
  # (readysetcloud/rsc-core#196) and make sure the runtime can present the
  # caller's Cognito token, then set the BlogGatewayUrl parameter. Until then the
  # gateway exists but no session references it.

  # The tool. A plain Lambda the gateway invokes (no Function URL). Embeds the
  # query and reads the content vector index, scoped to the caller's tenant (the
  # sub the interceptor injects as _callerSub). Inherits embedding/vector env
  # from Globals.
  BlogSearchToolFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        <<: *esbuild-properties
        EntryPoints:
          - index.mjs
    Properties:
      CodeUri: functions/blog-search-tool
      Handler: index.handler
      MemorySize: 512
      Timeout: 30
      Policies:
        - AWSLambdaBasicExecutionRole
        - Version: 2012-10-17
          Statement:
            # Embed the incoming query via Titan (same model as /blogs/ask).
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
              Resource:
                - !Sub "arn:${AWS::Partition}:bedrock:*::foundation-model/*"
                - !Sub "arn:${AWS::Partition}:bedrock:*:${AWS::AccountId}:inference-profile/*"
            # Tenant-scoped nearest-neighbour search over the content index.
            - Effect: Allow
              Action:
                - s3vectors:QueryVectors
                - s3vectors:GetVectors
              Resource:
                - !GetAtt BlogVectorBucket.VectorBucketArn
                - !GetAtt ContentVectorIndex.IndexArn

  # The identity bridge. A REQUEST interceptor the gateway runs before the
  # target: it decodes the gateway-validated Cognito JWT and injects the verified
  # sub into the tool arguments (the gateway->Lambda contract carries no caller
  # identity otherwise). No extra IAM — it only rewrites the request it's handed.
  BlogGatewayInterceptorFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        <<: *esbuild-properties
        EntryPoints:
          - index.mjs
    Properties:
      CodeUri: functions/blog-gateway-interceptor
      Handler: index.handler
      MemorySize: 256
      Timeout: 10

  # Execution role the gateway assumes to invoke the target + interceptor
  # Lambdas. Scoped to exactly those two functions (no wildcards), per AgentCore
  # security guidance.
  BlogGatewayRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: bedrock-agentcore.amazonaws.com
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                aws:SourceAccount: !Ref AWS::AccountId
      Policies:
        - PolicyName: invoke-blog-tools
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: lambda:InvokeFunction
                Resource:
                  - !GetAtt BlogSearchToolFunction.Arn
                  - !GetAtt BlogGatewayInterceptorFunction.Arn

  # The gateway (MCP server). CUSTOM_JWT inbound auth against the shared rsc-core
  # Cognito pool; the interceptor carries the caller identity to the tool.
  BlogGateway:
    Type: AWS::BedrockAgentCore::Gateway
    Properties:
      Name: !Sub "booked-blog-${Environment}"
      ProtocolType: MCP
      RoleArn: !GetAtt BlogGatewayRole.Arn
      AuthorizerType: CUSTOM_JWT
      AuthorizerConfiguration:
        CustomJWTAuthorizer:
          DiscoveryUrl: !Sub "https://cognito-idp.${AWS::Region}.amazonaws.com/${UserPoolId}/.well-known/openid-configuration"
          # The dashboard sends Cognito ID tokens (getFreshIdToken), which carry
          # `aud` = the app client id (not a `client_id` claim), so validate the
          # audience. The interceptor reads `sub` from the same token.
          AllowedAudience:
            - !Ref UserPoolClient
      InterceptorConfigurations:
        - InterceptionPoints: [REQUEST]
          InputConfiguration:
            PassRequestHeaders: true
          Interceptor:
            Lambda:
              Arn: !GetAtt BlogGatewayInterceptorFunction.Arn

  # The tool target: the search_blog Lambda + its inline schema. The gateway
  # invokes it with its execution role (GATEWAY_IAM_ROLE). _callerSub is a
  # reserved property the interceptor overwrites with the verified sub.
  BlogGatewayTarget:
    Type: AWS::BedrockAgentCore::GatewayTarget
    Properties:
      GatewayIdentifier: !Ref BlogGateway
      Name: blog
      CredentialProviderConfigurations:
        - CredentialProviderType: GATEWAY_IAM_ROLE
      TargetConfiguration:
        Mcp:
          Lambda:
            LambdaArn: !GetAtt BlogSearchToolFunction.Arn
            ToolSchema:
              InlinePayload:
                - Name: search_blog
                  Description: "Search the creator's OWN published blog posts for passages relevant to a query. Returns matching excerpts plus each post's title/slug so you can cite sources. Use this to ground any answer about their blog."
                  InputSchema:
                    Type: object
                    Properties:
                      query:
                        Type: string
                        Description: "Natural-language search query."
                      topK:
                        Type: integer
                        Description: "Max passages to return (1-20, default 8)."
                      blogId:
                        Type: string
                        Description: "Optional: restrict the search to a single post id."
                      _callerSub:
                        Type: string
                        Description: "Reserved. Set by the gateway from the verified caller identity; do not populate."
                    Required:
                      - query

  # Static hosting for the dashboard UI. Bucket is private; only the
  # CloudFront distribution (via OAC) can read it. SPA routing is
  # handled by rewriting 403/404 to /index.html so deep links survive a
  # refresh. The CI deploy step builds ui/, syncs the output here, and
  # invalidates the distribution.
  DashboardBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "content-tracking-dashboard-${Environment}-${AWS::AccountId}"
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced

  DashboardOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub "${AWS::StackName}-${Environment}-dashboard-oac"
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  # HSTS, X-Content-Type-Options, X-Frame-Options, Referrer-Policy.
  # Applied to every response served by the distribution. We pin
  # frame-ancestors to deny because nothing in the dashboard needs to
  # be embedded.
  DashboardResponseHeadersPolicy:
    Type: AWS::CloudFront::ResponseHeadersPolicy
    Properties:
      ResponseHeadersPolicyConfig:
        Name: !Sub "${AWS::StackName}-${Environment}-dashboard-headers"
        SecurityHeadersConfig:
          ContentTypeOptions:
            Override: true
          FrameOptions:
            FrameOption: DENY
            Override: true
          ReferrerPolicy:
            ReferrerPolicy: strict-origin-when-cross-origin
            Override: true
          StrictTransportSecurity:
            AccessControlMaxAgeSec: 63072000
            IncludeSubdomains: true
            Preload: true
            Override: true

  DashboardDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: !Sub "${AWS::StackName} dashboard (${Environment})"
        DefaultRootObject: index.html
        HttpVersion: http2
        IPV6Enabled: true
        # PriceClass_100 keeps cost down (US/EU edges only). Personal-scale
        # usage; revisit if a non-US/EU audience matters later.
        PriceClass: PriceClass_100
        Aliases: !If
          - DeployCustomDomain
          - [!Sub "booked.${BaseCustomDomain}"]
          - !Ref AWS::NoValue
        ViewerCertificate: !If
          - DeployCustomDomain
          - AcmCertificateArn: !Ref DashboardCertificate
            SslSupportMethod: sni-only
            MinimumProtocolVersion: TLSv1.2_2021
          - CloudFrontDefaultCertificate: true
        Origins:
          - Id: dashboard-origin
            DomainName: !GetAtt DashboardBucket.RegionalDomainName
            S3OriginConfig:
              OriginAccessIdentity: ""
            OriginAccessControlId: !GetAtt DashboardOAC.Id
        DefaultCacheBehavior:
          TargetOriginId: dashboard-origin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods: [GET, HEAD]
          CachedMethods: [GET, HEAD]
          Compress: true
          # CachingOptimized — AWS managed cache policy id. Honors
          # origin Cache-Control headers, which is exactly what the CI
          # sync uses to split index.html (no-cache) from /assets/*
          # (immutable, 1y).
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
          ResponseHeadersPolicyId: !Ref DashboardResponseHeadersPolicy
        CustomErrorResponses:
          # SPA routing — react-router needs /index.html for any path
          # the bucket doesn't have an object for. OAC + private bucket
          # returns 403 for missing keys (not 404), so we rewrite both.
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 0
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 0

  DashboardBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref DashboardBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowCloudFrontOACRead
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "${DashboardBucket.Arn}/*"
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub "arn:${AWS::Partition}:cloudfront::${AWS::AccountId}:distribution/${DashboardDistribution}"

  # Holds the generated vendor-report static HTML. Private bucket; only
  # the VendorReportsDistribution (via OAC) can read it, and access is
  # further gated by CloudFront signed URLs (trusted key group). The API
  # Lambda writes reports here and hands out short-lived signed URLs.
  # Reports age out after 90 days.
  VendorReportsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "content-tracking-vendor-reports-${Environment}-${AWS::AccountId}"
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced
      LifecycleConfiguration:
        Rules:
          - Id: ExpireReportsAfterRetention
            Status: Enabled
            ExpirationInDays: !Ref VendorReportsRetentionDays

  VendorReportsOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub "${AWS::StackName}-${Environment}-vendor-reports-oac"
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  # CloudFront public key used to verify signed-URL signatures. The
  # matching private key is held by the API Lambda (env var) and used to
  # sign report URLs. EncodedKey is the RSA public key PEM passed in as a
  # parameter.
  VendorReportsPublicKey:
    Type: AWS::CloudFront::PublicKey
    Properties:
      PublicKeyConfig:
        Name: !Sub "${AWS::StackName}-${Environment}-vendor-reports-key"
        CallerReference: !Sub "${AWS::StackName}-${Environment}-vendor-reports-key-v1"
        EncodedKey: !Ref VendorReportsSigningPublicKey
        Comment: !Sub "Verifies vendor-report signed URLs (${Environment})"

  VendorReportsKeyGroup:
    Type: AWS::CloudFront::KeyGroup
    Properties:
      KeyGroupConfig:
        Name: !Sub "${AWS::StackName}-${Environment}-vendor-reports-key-group"
        Items:
          - !Ref VendorReportsPublicKey

  # Vendor reports must never be indexed or leak a referrer. We also keep
  # the same baseline security headers as the dashboard policy.
  VendorReportsResponseHeadersPolicy:
    Type: AWS::CloudFront::ResponseHeadersPolicy
    Properties:
      ResponseHeadersPolicyConfig:
        Name: !Sub "${AWS::StackName}-${Environment}-vendor-reports-headers"
        SecurityHeadersConfig:
          ContentTypeOptions:
            Override: true
          FrameOptions:
            FrameOption: DENY
            Override: true
          ReferrerPolicy:
            ReferrerPolicy: no-referrer
            Override: true
          StrictTransportSecurity:
            AccessControlMaxAgeSec: 63072000
            IncludeSubdomains: true
            Preload: true
            Override: true
        CustomHeadersConfig:
          Items:
            # Referrer-Policy is handled by SecurityHeadersConfig above —
            # CloudFront rejects it as a custom header. X-Robots-Tag is not a
            # recognized security header, so it stays here.
            - Header: X-Robots-Tag
              Value: "noindex, nofollow"
              Override: true

  VendorReportsDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: !Sub "${AWS::StackName} vendor reports (${Environment})"
        HttpVersion: http2
        IPV6Enabled: true
        PriceClass: PriceClass_100
        Aliases: !If
          - DeployCustomDomain
          - [!Sub "reports.${BaseCustomDomain}"]
          - !Ref AWS::NoValue
        ViewerCertificate: !If
          - DeployCustomDomain
          - AcmCertificateArn: !Ref VendorReportsCertificate
            SslSupportMethod: sni-only
            MinimumProtocolVersion: TLSv1.2_2021
          - CloudFrontDefaultCertificate: true
        Origins:
          - Id: vendor-reports-origin
            DomainName: !GetAtt VendorReportsBucket.RegionalDomainName
            S3OriginConfig:
              OriginAccessIdentity: ""
            OriginAccessControlId: !GetAtt VendorReportsOAC.Id
        DefaultCacheBehavior:
          TargetOriginId: vendor-reports-origin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods: [GET, HEAD]
          CachedMethods: [GET, HEAD]
          Compress: true
          # Signed URLs are required — only requests carrying a valid
          # signature from a key in this group are served.
          TrustedKeyGroups:
            - !Ref VendorReportsKeyGroup
          # CachingOptimized — AWS managed cache policy id.
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
          ResponseHeadersPolicyId: !Ref VendorReportsResponseHeadersPolicy

  VendorReportsBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref VendorReportsBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowCloudFrontOACRead
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "${VendorReportsBucket.Arn}/*"
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub "arn:${AWS::Partition}:cloudfront::${AWS::AccountId}:distribution/${VendorReportsDistribution}"

  # Holds the PUBLIC media-kit teaser pages. Unlike the vendor/campaign
  # reports, these are served with NO signature requirement — the public
  # media kit is a brand-facing inbound front door anyone can view. The
  # bucket itself stays private (OAC); the PublicMediaKitDistribution is the
  # only reader. Kept in its own bucket so a public-access misconfig here
  # can never reach the signed-URL-only sponsor reports.
  PublicMediaKitBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "content-tracking-public-media-kit-${Environment}-${AWS::AccountId}"
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced

  PublicMediaKitOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub "${AWS::StackName}-${Environment}-public-media-kit-oac"
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  # The public kit is MEANT to be found, so — unlike the vendor-reports
  # policy — it carries an index/follow X-Robots-Tag and a referrer policy
  # that still works across origins. Baseline security headers match the
  # other distributions. Frames are denied (nothing should embed the kit).
  PublicMediaKitResponseHeadersPolicy:
    Type: AWS::CloudFront::ResponseHeadersPolicy
    Properties:
      ResponseHeadersPolicyConfig:
        Name: !Sub "${AWS::StackName}-${Environment}-public-media-kit-headers"
        SecurityHeadersConfig:
          ContentTypeOptions:
            Override: true
          FrameOptions:
            FrameOption: DENY
            Override: true
          ReferrerPolicy:
            ReferrerPolicy: strict-origin-when-cross-origin
            Override: true
          StrictTransportSecurity:
            AccessControlMaxAgeSec: 63072000
            IncludeSubdomains: true
            Preload: true
            Override: true
        CustomHeadersConfig:
          Items:
            - Header: X-Robots-Tag
              Value: "index, follow"
              Override: true

  PublicMediaKitDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: !Sub "${AWS::StackName} public media kit (${Environment})"
        HttpVersion: http2
        IPV6Enabled: true
        PriceClass: PriceClass_100
        Aliases: !If
          - DeployCustomDomain
          - [!Sub "kit.${BaseCustomDomain}"]
          - !Ref AWS::NoValue
        ViewerCertificate: !If
          - DeployCustomDomain
          - AcmCertificateArn: !Ref PublicMediaKitCertificate
            SslSupportMethod: sni-only
            MinimumProtocolVersion: TLSv1.2_2021
          - CloudFrontDefaultCertificate: true
        Origins:
          - Id: public-media-kit-origin
            DomainName: !GetAtt PublicMediaKitBucket.RegionalDomainName
            S3OriginConfig:
              OriginAccessIdentity: ""
            OriginAccessControlId: !GetAtt PublicMediaKitOAC.Id
        DefaultCacheBehavior:
          TargetOriginId: public-media-kit-origin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods: [GET, HEAD]
          CachedMethods: [GET, HEAD]
          Compress: true
          # No TrustedKeyGroups — this distribution serves anonymously. The
          # page objects honor their own Cache-Control (5 min) via the
          # CachingOptimized managed policy.
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
          ResponseHeadersPolicyId: !Ref PublicMediaKitResponseHeadersPolicy

  PublicMediaKitBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref PublicMediaKitBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowCloudFrontOACRead
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "${PublicMediaKitBucket.Arn}/*"
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub "arn:${AWS::Partition}:cloudfront::${AWS::AccountId}:distribution/${PublicMediaKitDistribution}"

  # Serves the public media kit at kit.<BaseCustomDomain>. Same alias hosted
  # zone (Z2FDTNDATAQYW2) as the other distribution records.
  PublicMediaKitDnsRecord:
    Type: AWS::Route53::RecordSet
    Condition: DeployCustomDomain
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Sub "kit.${BaseCustomDomain}"
      Type: A
      AliasTarget:
        DNSName: !GetAtt PublicMediaKitDistribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2
        EvaluateTargetHealth: false

  # ACM cert for the public media-kit custom domain. Same us-east-1 +
  # DNS-validation rationale as the other certificates.
  PublicMediaKitCertificate:
    Type: AWS::CertificateManager::Certificate
    Condition: DeployCustomDomain
    Properties:
      DomainName: !Sub "kit.${BaseCustomDomain}"
      ValidationMethod: DNS
      DomainValidationOptions:
        - DomainName: !Sub "kit.${BaseCustomDomain}"
          HostedZoneId: !Ref HostedZoneId

  # Z2FDTNDATAQYW2 is the CloudFront alias hosted zone — constant for
  # every distribution per AWS docs.
  DashboardDnsRecord:
    Type: AWS::Route53::RecordSet
    Condition: DeployCustomDomain
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Sub "booked.${BaseCustomDomain}"
      Type: A
      AliasTarget:
        DNSName: !GetAtt DashboardDistribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2
        EvaluateTargetHealth: false

  # Serves reports at reports.<BaseCustomDomain>. Same alias hosted zone
  # (Z2FDTNDATAQYW2) as the dashboard record above.
  VendorReportsDnsRecord:
    Type: AWS::Route53::RecordSet
    Condition: DeployCustomDomain
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Sub "reports.${BaseCustomDomain}"
      Type: A
      AliasTarget:
        DNSName: !GetAtt VendorReportsDistribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2
        EvaluateTargetHealth: false

  # ACM cert for the dashboard's custom domain. CloudFront requires the
  # cert in us-east-1; the rest of the stack lives there too so this
  # works without a separate cert stack. DNS validation auto-creates
  # the validation CNAMEs through the hosted zone the caller passed.
  DashboardCertificate:
    Type: AWS::CertificateManager::Certificate
    Condition: DeployCustomDomain
    Properties:
      DomainName: !Sub "booked.${BaseCustomDomain}"
      ValidationMethod: DNS
      DomainValidationOptions:
        - DomainName: !Sub "booked.${BaseCustomDomain}"
          HostedZoneId: !Ref HostedZoneId

  # ACM cert for the reports custom domain. Same us-east-1 + DNS-validation
  # rationale as DashboardCertificate above.
  VendorReportsCertificate:
    Type: AWS::CertificateManager::Certificate
    Condition: DeployCustomDomain
    Properties:
      DomainName: !Sub "reports.${BaseCustomDomain}"
      ValidationMethod: DNS
      DomainValidationOptions:
        - DomainName: !Sub "reports.${BaseCustomDomain}"
          HostedZoneId: !Ref HostedZoneId

Outputs:
  UserPoolClientId:
    Description: |
      Booked's Cognito app client id on the shared rsc-core user pool. The
      deploy workflow reads this and injects it into the dashboard build as
      VITE_USER_POOL_CLIENT_ID so @readysetcloud/ui/auth signs users in
      against this client.
    Value: !Ref UserPoolClient

  CoreApiUrl:
    Description: |
      Shared rsc-core Core API base URL. The deploy workflow injects it into the
      dashboard build as VITE_CORE_API_URL; the "Ask your blog" widget uses it to
      presign the wss:// connection and hides itself if it's unset.
    Value: !Ref CoreApiUrl

  ContentTrackingTableName:
    Description: DynamoDB single-table for Booked
    Value: !Ref ContentTrackingTable

  BlogVectorBucketName:
    Description: |
      S3 vector bucket holding content + voice embeddings. Pass to
      scripts/backfill-content-vectors.mjs --bucket to vectorize the back catalog.
    Value: !Sub "content-tracking-blog-vectors-${Environment}-${AWS::AccountId}"

  ContentVectorIndexName:
    Description: S3 vector index name for the generalized Content entity's embeddings.
    Value: content-vectors

  BlogVoiceIndexName:
    Description: S3 vector index name for voice samples (the Voice feature).
    Value: voice-samples

  StreamGenerateUrl:
    Description: |
      Function URL for streaming compose/ask. Set as VITE_STREAM_BASE_URL in the
      dashboard build so it can render generations live; if unset the UI falls
      back to the buffered REST endpoints.
    Value: !GetAtt StreamGenerateFunctionUrl.FunctionUrl

  StreamReviewUrl:
    Description: |
      Function URL for the live content review stream. Set as
      VITE_REVIEW_STREAM_BASE_URL in the dashboard build so reviews stream live;
      if unset the UI falls back to POST /content/{id}/reviews + polling.
    Value: !GetAtt StreamReviewFunctionUrl.FunctionUrl

  BlogGatewayUrl:
    Description: |
      MCP endpoint of the blog-search AgentCore Gateway. To turn "Ask your blog"
      grounding on: add this URL's host to the runtime's MCP allowlist
      (readysetcloud/rsc-core#196), make sure the runtime can present the
      caller's Cognito token to it, then set the BlogGatewayUrl parameter to this
      value. Until then the gateway is deployed but unreferenced.
    Value: !GetAtt BlogGateway.GatewayUrl

  HelloDurableFunctionAliasArn:
    Description: |
      Qualified ARN (alias) of the foundation durable function. Durable
      functions must be invoked via a qualified ARN, never $LATEST. The
      real crosspost/weekly-analytics functions will surface their own
      alias ARNs the same way.
    Value: !Ref HelloDurableFunction.Alias

  ContentTrackingApiBaseUrl:
    Description: |
      Base URL for the Booked REST API. Surfaces the custom domain
      (api.booked.<BaseCustomDomain>, root path, no /v1 prefix) when
      BaseCustomDomain is set, otherwise the autogenerated execute-api
      hostname with the /v1 stage path. Dashboard build picks this up
      via the deploy workflow's stack-output read.
    Value: !If
      - DeployCustomDomain
      - !Sub "https://api.booked.${BaseCustomDomain}"
      - !Sub "https://${ContentTrackingApi}.execute-api.${AWS::Region}.amazonaws.com/v1"

  DashboardBucketName:
    Description: S3 bucket holding the dashboard static bundle
    Value: !Ref DashboardBucket

  DashboardDistributionId:
    Description: CloudFront distribution id (used by the deploy workflow for invalidations)
    Value: !Ref DashboardDistribution

  DashboardUrl:
    Description: URL the dashboard is served at
    Value: !If
      - DeployCustomDomain
      - !Sub "https://booked.${BaseCustomDomain}"
      - !Sub "https://${DashboardDistribution.DomainName}"

  VendorReportsBucketName:
    Description: Private S3 bucket holding generated vendor-report HTML
    Value: !Ref VendorReportsBucket

  VendorReportsDistributionDomain:
    Description: Host that serves reports via signed URLs (custom domain when set)
    Value: !If
      - DeployCustomDomain
      - !Sub "reports.${BaseCustomDomain}"
      - !GetAtt VendorReportsDistribution.DomainName

  VendorReportsDistributionId:
    Description: CloudFront distribution id for vendor reports
    Value: !Ref VendorReportsDistribution

  PublicMediaKitBucketName:
    Description: Public S3 bucket holding published media-kit teaser pages
    Value: !Ref PublicMediaKitBucket

  PublicMediaKitDistributionId:
    Description: CloudFront distribution id for the public media kit
    Value: !Ref PublicMediaKitDistribution

  PublicMediaKitHost:
    Description: Host that serves the public media kit (custom domain when set)
    Value: !If
      - DeployCustomDomain
      - !Sub "kit.${BaseCustomDomain}"
      - !GetAtt PublicMediaKitDistribution.DomainName
