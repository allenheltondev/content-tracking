version = 0.1

# Secret parameter NewsletterMintApiKey is NOT defined here.
# Provide it via samconfig.local.toml (gitignored) or
# `sam deploy --parameter-overrides "NewsletterMintApiKey=..."`.
#
# CognitoUserPoolArn resolves from SSM `/readysetcloud/auth/user-pool-arn`
# (published by rsc-core) at deploy time, no override needed.

[default.build.parameters]
parallel = true
cached = false
beta_features = true

[default.deploy.parameters]
stack_name = "content-tracking"
profile = "sandbox"
resolve_s3 = true
s3_prefix = "content-tracking"
region = "us-east-1"
capabilities = "CAPABILITY_IAM"
parameter_overrides = [
  "Environment=sandbox",
  "NewsletterApiBaseUrl=/newsletter-service/sandbox/newsletter-api-base-url",
  "CampaignShortLinkBase=/newsletter-service/sandbox/campaign-short-link-base",
]

[ci.deploy.parameters]
stack_name = "content-tracking"
resolve_s3 = true
s3_prefix = "content-tracking"
region = "us-east-1"
capabilities = "CAPABILITY_IAM"
parameter_overrides = [
  "Environment=sandbox",
  "NewsletterApiBaseUrl=/newsletter-service/sandbox/newsletter-api-base-url",
  "CampaignShortLinkBase=/newsletter-service/sandbox/campaign-short-link-base",
]

[prod.deploy.parameters]
stack_name = "content-tracking"
resolve_s3 = true
s3_prefix = "content-tracking"
region = "us-east-1"
capabilities = "CAPABILITY_IAM"
parameter_overrides = [
  "Environment=production",
  "NewsletterApiBaseUrl=/newsletter-service/production/newsletter-api-base-url",
  "CampaignShortLinkBase=/newsletter-service/production/campaign-short-link-base",
]
