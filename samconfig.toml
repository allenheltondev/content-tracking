version = 0.1

# Secret parameters NewsletterMintApiKey and ExtensionTokenSigningKey
# are NOT defined here. Provide them via samconfig.local.toml
# (gitignored) or `sam deploy --parameter-overrides
# "NewsletterMintApiKey=..." "ExtensionTokenSigningKey=..."`. Generate
# a fresh signing key with
# `node scripts/generate-extension-signing-key.mjs`.
#
# UserPoolId is also not defined here. It feeds the Lambda authorizer's
# Cognito JWT verification and the app client the stack creates on the
# shared pool; provide it in samconfig.local.toml or via
# --parameter-overrides for ad-hoc deploys. CI sources it from the GitHub
# environment var vars.USER_POOL_ID. There is no UserPoolClientId
# parameter anymore — the stack mints its own app client (UserPoolClient)
# and exports the id as the UserPoolClientId output.
#
# CognitoUserPoolArn resolves from SSM `/readysetcloud/auth/user-pool-arn`
# (published by rsc-core) at deploy time, no override needed.

[default.build.parameters]
parallel = true
cached = false
beta_features = true

[default.deploy.parameters]
stack_name = "content-tracking"
profile = "sandbox"
resolve_s3 = true
s3_prefix = "content-tracking"
region = "us-east-1"
capabilities = "CAPABILITY_IAM"
parameter_overrides = [
  "Environment=staging",
  "NewsletterApiBaseUrl=/newsletter-service/staging/newsletter-api-base-url",
  "CampaignShortLinkBase=/newsletter-service/staging/campaign-short-link-base",
]

[ci.deploy.parameters]
stack_name = "content-tracking"
resolve_s3 = true
s3_prefix = "content-tracking"
region = "us-east-1"
capabilities = "CAPABILITY_IAM"
parameter_overrides = [
  "Environment=staging",
  "NewsletterApiBaseUrl=/newsletter-service/staging/newsletter-api-base-url",
  "CampaignShortLinkBase=/newsletter-service/staging/campaign-short-link-base",
]

[prod.deploy.parameters]
stack_name = "content-tracking"
resolve_s3 = true
s3_prefix = "content-tracking"
region = "us-east-1"
capabilities = "CAPABILITY_IAM"
parameter_overrides = [
  "Environment=production",
  "NewsletterApiBaseUrl=/newsletter-service/production/newsletter-api-base-url",
  "CampaignShortLinkBase=/newsletter-service/production/campaign-short-link-base",
]
